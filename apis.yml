aid: api-evangelist-alayacare
name: AlayaCare
description: >
  AlayaCare is a cloud-based home and community care management platform providing REST APIs
  for managing client profiles, scheduling visits, documenting clinical care, processing
  billing and accounting, and tracking patient outcomes. The platform serves home care
  agencies, nursing registries, and government-funded community care programs globally.
  APIs cover clients, employees, scheduling, clinical records, tasks, forms, medications,
  accounting, and file management, with integration via REST and AWS SQS event streaming.
  AlayaCare also offers AlayaMarket, a staffing marketplace API for matching supply and
  demand organizations, and AlayaCare Residential for residential aged care settings.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/alayacare/refs/heads/main/apis.yml

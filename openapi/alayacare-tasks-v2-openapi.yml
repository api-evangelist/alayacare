openapi: 3.1.0
info:
  title: External Tasks 2.0 API
  version: 1.0.0
  description: |
    **Internal IDs:**
    The following terms are used to reference IDs that identify resources in AlayaCare:
    - client_id
    - comment_id
    - employee_id
    - form_id
    - subtask_id
    - task_id
    - 
    **External IDs**
    External IDs are required to be unique.
    No other assumptions are made regarding their form; they are treated as strings.

    The following terms are used to reference IDs that identify resources in systems external to AlayaCare:
    - external_client_id
    - external_employee_id

    **Remarks**
    - All dates must be in ISO 8601 format.
    - Required fields marked with `*` cannot be null.
    - Currently filtering by date is timezone-naive and will assume any filters to be provided in the timezone of branch associated to the task.


security:
 - BasicAuth: []

servers:
  - url: https://homecare.alayacare.com
    description: Production server
  - url: https://homecare.staging.alayacare.com
    description: Staging server
  - url: https://homecare.uat.alayacare.com
    description: UAT server
  

paths:
  /tasks:
    get:
      summary: Retrieve tasks
      description: Retrieve tasks by using various criteria.
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/branches'
        - $ref: '#/components/parameters/branch_id'
        - $ref: '#/components/parameters/created_at_min'
        - $ref: '#/components/parameters/created_at_max'
        - $ref: '#/components/parameters/created_by'
        - $ref: '#/components/parameters/due_at_min'
        - $ref: '#/components/parameters/due_at_max'
        - $ref: '#/components/parameters/no_due_at'
        - $ref: '#/components/parameters/assigned_to_group_id'
        - $ref: '#/components/parameters/assigned_to_user_ids'
        - $ref: '#/components/parameters/assigned_to_external_employee_ids'
        - $ref: '#/components/parameters/assigned_to_user_id_groups'
        - $ref: '#/components/parameters/assigned_to_user_id_groups_mode'
        - $ref: '#/components/parameters/priorities'
        - $ref: '#/components/parameters/tags'
        - $ref: '#/components/parameters/statuses'
        - $ref: '#/components/parameters/is_assigned'
        - $ref: '#/components/parameters/is_assigned_to_user'
        - $ref: '#/components/parameters/contexts'
        - $ref: '#/components/parameters/context_external_client_id'
        - $ref: '#/components/parameters/client_group_ids'
        - $ref: '#/components/parameters/client_group_ids_mode'
        - $ref: '#/components/parameters/context_external_employee_id'
        - $ref: '#/components/parameters/employee_group_ids'
        - $ref: '#/components/parameters/employee_group_ids_mode'
        - $ref: '#/components/parameters/task_text'
      responses:
        '200':
          $ref: '#/components/schemas/PaginatedTaskList'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
    post:
      summary: Add a new task
      description: Add a new task.
      tags:
        - Tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
        description: Task
        required: true
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
  
  /tasks/count:
    get:
      summary: Retrieve total number of tasks by various criteria
      description: Retrieve number of tasks by using various criteria.
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/branches'
        - $ref: '#/components/parameters/branch_id'
        - $ref: '#/components/parameters/created_at_min'
        - $ref: '#/components/parameters/created_at_max'
        - $ref: '#/components/parameters/created_by'
        - $ref: '#/components/parameters/due_at_min'
        - $ref: '#/components/parameters/due_at_max'
        - $ref: '#/components/parameters/no_due_at'
        - $ref: '#/components/parameters/assigned_to_group_id'
        - $ref: '#/components/parameters/assigned_to_user_ids'
        - $ref: '#/components/parameters/assigned_to_external_employee_ids'
        - $ref: '#/components/parameters/assigned_to_user_id_groups'
        - $ref: '#/components/parameters/assigned_to_user_id_groups_mode'
        - $ref: '#/components/parameters/priorities'
        - $ref: '#/components/parameters/tags'
        - $ref: '#/components/parameters/statuses'
        - $ref: '#/components/parameters/is_assigned'
        - $ref: '#/components/parameters/is_assigned_to_user'
        - $ref: '#/components/parameters/contexts'
        - $ref: '#/components/parameters/context_external_client_id'
        - $ref: '#/components/parameters/client_group_ids'
        - $ref: '#/components/parameters/client_group_ids_mode'
        - $ref: '#/components/parameters/context_external_employee_id'
        - $ref: '#/components/parameters/employee_group_ids'
        - $ref: '#/components/parameters/employee_group_ids_mode'
        - $ref: '#/components/parameters/task_sources'
        - $ref: '#/components/parameters/task_text'
      responses:
        '200':
          $ref: '#/components/schemas/TaskCount'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
  
  /tasks/{task_id}:
    get:
      summary: Retrieve a task by id
      description: Get the full details of a task by using the `task_id` column.
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/task_id'
      responses:
        '200':
          $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
    put:
        summary: Update a task
        description: Update a Task
        tags:
          - Tasks
        parameters:
          - $ref: '#/components/parameters/task_id'
          - $ref: '#/components/parameters/update_contexts'
          - $ref: '#/components/parameters/update_escalation_dates'
          - $ref: '#/components/parameters/update_extensions'
          - $ref: '#/components/parameters/update_tags'
        requestBody:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Task
          required: true
        responses:
          '200':
            description: success
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Task'
          '400':
            $ref: '#/components/responses/400BadRequest'
          '401':
            $ref: '#/components/responses/401Unauthorized'
          '403':
            $ref: '#/components/responses/403Forbidden'
          '404':
            $ref: '#/components/responses/404NotFound'    
    patch:
      summary: Patch a task
      description: >-
        Patch a task, only replacing those fields that are specified and
        retaining

        the existing value for fields that are not specified.
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/task_id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskPatchRequest'
        description: Fields to patch
        required: true
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
    delete:
      summary: Delete a task
      description: Delete a task
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/task_id'
      responses:
        '204':
          description: success, no content
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
    

  /tasks/{task_id}/status/{status}:
      patch:
        summary: Change the status of a task by id
        description: Change the status of a task by id
        tags:
          - Tasks
        parameters:
          - $ref: '#/components/parameters/task_id'
          - $ref: '#/components/parameters/status_in_path'
        responses:
          '200':
            description: success
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Task'
          '400':
            $ref: '#/components/responses/400BadRequest'
          '401':
            $ref: '#/components/responses/401Unauthorized'
          '403':
            $ref: '#/components/responses/403Forbidden'
          '404':
            $ref: '#/components/responses/404NotFound'

  /tasks/clone:
    post:
      summary: Clone a task
      description: >-
        Clone a task, creating a new task with the same details as the original
        task,
        including all sub tasks. Some fields, such as creator, created_at,
        assigned
        user and group, and status will be set to defaults instead.
      tags:
        - Tasks
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloneTaskRequest'
        description: Clone Task Request
        required: true
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /tasks/{task_id}/comments:
    get:
      summary: Retrieve all comments for a task
      description: Retrieve all comments for a task.
      tags:
        - Comments
      parameters:
        - $ref: '#/components/parameters/task_id'

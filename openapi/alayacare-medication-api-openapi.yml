        - 0: prescriptions
        weekdays: []
    InvalidRequest:
      value:
        code: '400'
        message: There was a problem with your request.
      summary: Invalid data.
  responses:
    MedicationList:
      description: Medication list.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MedicationList'
          examples:
            MedicationListExample:
              $ref: '#/components/examples/MedicationList'
    InvalidRequest:
      description: Invalid data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
          examples:
            InvalidRequestExample:
              $ref: '#/components/examples/InvalidRequest'
    ValidationError:
      description: Conflict in the data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
    Medication:
      description: A medication information.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Medication'
          examples:
            MedicationListExample:
              $ref: '#/components/examples/Medication'
    AuthChallenge:
      description: Authentication required.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIError'
          examples:
            InvalidRequest:
              $ref: '#/components/examples/AuthChallenge'
  schemas:
    Medication:
      type: object
      allOf:
      - type: object
        properties:
          name:
            type: string
          brand_name:
            type: string
          status:
            type: string
          code:
            type: string
          ingredient_strength:
            type: string
            example: '350'
          ingredient_strength_unit:
            type: string
            example: mg
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_unit_setting?is_ingredient_strength=true"
          dosage:
            type: string
            example: '350'
          dosage_unit:
            type: string
            example: mg
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_unit_setting?is_dosage_quantity=true"
          dosage_form:
            type: string
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_unit_setting?is_dosage_form=true"
          drug_info_number:
            type: string
          drug_family:
            type: string
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_drug_family_setting"
          route:
            type: string
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_medication_route_setting"
          administration_type:
            type: string
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_administration_type_setting
          prn_reason:
            type: string
            description: Its only accepted when prn_as_needed is true
          prn_as_needed:
            type: boolean
          purpose:
            type: string
          types:
            type: array
            items:
              type: string
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_medication_type_setting
          website:
            type: string
          high_alert:
            type: boolean
          narcotic:
            type: boolean
          ordering_physician:
            type: string
          status_reason:
            type: string
          frequency_setting:
            type: string
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_frequency_setting"
          start_date:
            type: string
            description: 'Format: YYYY-MM-DD'
          start_time:
            type: string
            description: 'Format: HH:mm:ss'
          end_date:
            type: string
            description: 'Format: YYYY-MM-DD'
          end_time:
            type: string
            description: 'Format: HH:mm:ss'
          start_date_unknown:
            type: boolean
            default: false
          end_date_unknown:
            type: boolean
            default: false
          administration_instructions:
            type: string
          timing_notes:
            type: string
          administration_site_details:
            type: array
            items:
              type: string
            description: Options are the response of GET "/medication_settings/{branch_id}/medication_administration_site_details_setting"
          healthcare_professional_notified:
            type: string
          needs_education:
            type: boolean
          frequency:
            type: integer
            example: 2
          frequency_max:
            type: integer
          period:
            type: integer
            example: 1
          period_max:
            type: integer
          period_unit:
            type: string
          duration:
            type: integer
          duration_unit:
            type: string
          timings:
            type: array
            items:
              type: string
          weekdays:
            type: array
            items:
              type: string
            example: MO, TU, WE, TH, FR, SA, SU
          count:
            type: integer
          time_of_day:
            type: string
            description: 'Options are '
          days_of_month:
            type: array
            items:
              type: string
            description: Options are from 01 to 31
          when:
            type: string
          strict:
            type: boolean
          create_user_id:
            type: integer
          update_user_id:
            type: integer
          created_at:
            type: string
          updated_at:
            type: string
      - type: object
        properties:
          delivery_mode:
            type: string
            description: Required for infusion routes.
          concentration:
            type: number
            format: float
          concentration_unit:
            type: string
          infusion_fluid:
            type: string
          ongoing:
            type: boolean
          infusion_duration:
            type: integer
          infusion_duration_unit:
            type: string
          infusion_volume:
            type: number
            format: float
          infusion_volume_unit:
            type: string
          infusion_rate:
            type: number
            format: float
          infusion_rate_unit:
            type: string
          is_simplified_infusion:
            type: boolean
            nullable: false
            description: Required for infusion routes.
          pre_infusion_flush_fluid:
            type: string
          pre_infusion_flush_volume:
            type: number
            format: float
          pre_infusion_flush_volume_max:
            type: number
            format: float
          pre_infusion_flush_volume_unit:
            type: string
          post_infusion_flush_fluid:
            type: string
          post_infusion_flush_volume:
            type: number
            format: float
          post_infusion_flush_volume_max:
            type: number
            format: float
          post_infusion_flush_volume_unit:
            type: string
          basal_rate:
            type: number
            format: float
          basal_rate_max:
            type: number
            format: float
          basal_rate_unit:
            type: string
          bolus_frequency:
            type: integer
          bolus_frequency_unit:
            type: string
          bolus_rate:
            type: number
            format: float
          bolus_rate_max:
            type: number
            format: float
          bolus_rate_unit:
            type: string
          max_boluses:
            type: string
          infusion_instructions:
            type: string
            description: Required for simplified infusions.
    APIError:
      type: object
      description: Error returned from the API
      properties:
        code:
          type: string
          description: The error code
          example: '500'
        message:
          type: string
          example: An error occurred
          description: The error description
      required:
      - code
      - message
    CreateMedication:
      type: object
      required:
      - name
      - status
      - dosage
      - dosage_unit
      - route
      - administration_type
      - frequency_setting
      - start_date
      - start_time
      - start_date_unknown
      allOf:
      - $ref: '#/components/schemas/Medication'
    MedicationList:
      properties:
        items:
          $ref: '#/components/schemas/Medication'
        count:
          type: integer
        items_per_page:
          type: integer
        page:
          type: integer
        total_pages:
          type: integer
  parameters:
    sort_order:
      name: sort_order
      schema:
        type: string
        enum:
        - asc
        - desc
      in: query
      required: false
      description: 'Order in which the items should be sorted by. Ex: asc, desc'
    include:
      name: include
      schema:
        type: string
      in: query
      required: false
      description: 'Parameter used to include extra information in the request. Options: "status_reason" and "cms_485_status"'
    exclude_medication_ids:
      name: exclude_medication_ids
      schema:
        type: integer
      in: query
      description: Filter medications that do not contain specified id
    discrepancy_type:
      name: discrepancy_type
      schema:
        type: string
      in: query
      required: false
      description: Filter medications by discrepancy type. Options are the response of GET "/medication_settings/{branch_id}/medication_discrepancy_type_setting"
    status:
      name: status
      schema:
        type: string
      in: query
      required: false
      description: Filter medications by status. Options are the response of GET "/medication_settings/{branch_id}/medication_medication_status_setting"
    count:
      name: count
      schema:
        type: integer
        default: 10
      in: query
      required: false
      description: Max number of items to filter by
    end_date:
      name: end_date
      schema:
        type: string
      in: query
      required: false
      description: 'Filter medications by end datetime. Format: YYYY-MM-DD HH:mm:ss'
    sort_by:
      name: sort_by
      schema:
        type: string
      in: query
      required: false
      description: Parameter to sort items by
    start_date:
      name: start_date
      schema:
        type: string
      in: query
      required: false
      description: 'Filter medications by start datetime. Format: YYYY-MM-DD HH:mm:ss'
    is_narcotic:
      name: is_narcotic
      schema:
        type: boolean
        default: false
      in: query
      description: Filter medications by narcotic
    medication_ids:
      name: medication_ids
      schema:
        type: integer
      in: query
      description: Filter medications by id
    administration_type:
      name: administration_type
      schema:
        type: string
      in: query
      required: false
      description: Filter medications by administration type. Options are the response of GET "/medication_settings/{branch_id}/medication_administration_type_setting"
    is_high_alert:
      name: is_high_alert
      schema:
        type: boolean
        default: false
      in: query
      description: Filter medications by high_alert
    frequency_setting:
      name: frequency_setting
      schema:
        type: string
      in: query
      required: false
      description: Filter medications by frequency. Options are the response of GET "/medication_settings/{branch_id}/medication_frequency_setting"
    medications:
      name: medications
      schema:
        type: string
      in: query
      required: false
      description: Filter medications by term
    is_archived:
      name: is_archived
      schema:
        type: boolean
      in: query
    page:
      name: page
      schema:
        type: integer
        default: 1
      in: query
      required: false
      description: Page number to filter by
  requestBodies:
    CreateMedication:
      description: Medication create data
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateMedication'
          examples:
            CreateMedication:
              $ref: '#/components/examples/CreateMedication'
  securitySchemes:
    basic_auth:
      type: http
      description: Basic HTTP auth over https
      scheme: basic
definitions:
  DeliveryMode:
    type: string
    description: The delivery mode of the medication.
    enum:
    - ambulatory_pump_continuous
    - ambulatory_pump_intermittent
    - ambulatory_pump_pca
    - ambulatory_pump_taper
    - ambulatory_pump_other
    - iv_pump
    - iv_push
    - gravity
    example: ambulatory_pump_continuous
    x-nullable: true
  Type:
    type: string
    description: The medication type.
    enum:
    - prescriptions
    - over_the_counter
    - supplements
    - herbals
    - patches
    - inhalers
    - eye_drops
    - ointments
    - physician_samples
    - chelation
    - nutriceuticals
    - other
    example: prescriptions
  InformationSource:
    type: string
    description: The information source for the medication.
    enum:
    - client
    - family_caregiver
    - rx_vials
    - blister_packs
    - physician_rx
    - physician_samples
    - pharmacist_list
    - referral_source
    - staff_nurse
    - other
    example: staff_nurse
  TimeInstruction:
    type: array
    description: A list of time instructions for the medication administration.
    items:
      type: string
      enum:
      - daily
      - qam_once_a_day_am
      - qhs_once_a_day_bedtime
      - bid_twice_a_day
      - tid_three_times_a_day
      - qid_four_times_a_day
      - ac_before_meals
      - pc_after_meals
      - prn_as_required
      - other_use_note

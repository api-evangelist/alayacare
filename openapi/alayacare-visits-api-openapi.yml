parameters:
  client_id:
    name: client_id
    in: query
    required: false
    type: string
    description: 'Filter by external client ID

      External client ID is the client ID in the system of record.

      Ex. CRM client identifier

      '
  alayacare_client_id:
    name: alayacare_client_id
    in: query
    required: false
    type: string
    description: Filter by AlayaCare client ID
  alayacare_employee_id:
    name: alayacare_employee_id
    in: query
    required: false
    type: integer
    description: Filter by AlayaCare employee ID
  branch_id:
    description: 'Filter by branch ID `(default: current user branch)`

      '
    name: branch_id
    in: query
    required: false
    type: integer
  employee_id:
    name: employee_id
    in: query
    required: false
    type: string
    description: 'Filter by external employee ID

      External employee ID is the employee ID in the system of record.

      Ex. HR employee number

      '
  count:
    description: Number of items per page.
    name: count
    default: 100
    in: query
    required: false
    type: integer
  page:
    description: Filter by page number.
    name: page
    default: 1
    in: query
    required: false
    type: integer
  alayacare_service_id:
    name: alayacare_service_id
    in: query
    required: false
    type: integer
    description: Filter by AlayaCare service ID
  service_id:
    name: service_id
    in: query
    required: false
    type: string
    description: Filter by external service ID
responses:
  ErrorResponsePartialVisitLock:
    description: Partial success on locking visits
    schema:
      $ref: '#/definitions/VisitUpdatePartialSuccessResponse'
    examples:
      application/json:
        code: 207
        message: Partial success when locking visits. Visits are not approved or could not be found
        visit_ids:
        - ext_visit_1245
        - ext_visit_1246
        alayacare_visit_ids:
        - 1245
        - 1246
  ErrorResponseAuthentication:
    description: Authorization required
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 401
        message: Authorization required.
  ErrorResponseVisitLockInvalidRequest:
    description: Invalid request
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 400
        message: alayacare_visit_ids and/or visit_ids must be sent
  ErrorResponseVisitUpdateInvalidRequest:
    description: Invalid data submitted for visit creation
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 400
        message: client_id and alayacare_client_id are mutually exclusive
  ErrorResponseVisitCreateInvalidRequest:
    description: Invalid data submitted for visit creation
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 400
        message: client_id and alayacare_client_id are mutually exclusive
  ErrorResponseVisitNotFound:
    description: Visit not found
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 404
        message: Visit not found
  ErrorResponseDeliveryDateNotFound:
    description: Delivery date not found
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 404
        message: Delivery date not found

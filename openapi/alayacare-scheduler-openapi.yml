      interventions:
        $ref: '#/definitions/EVVVisit_Interventions'
      authorizations:
        $ref: '#/definitions/EVVVisit_Authorizations'
      client_active_services:
        description: List of active Client Services linked to the same Sandata payer as the visit
        type: array
        items:

    properties:
      clock_in:
        description: Work session start time
        type: string
        format: 'date-time'
        example: '2017-07-08T13:30:00+00:00'
      clock_out:
        description: Work session end time
        type: string
        format: 'date-time'
        example: '2017-07-08T14:30:00+00:00'
        x-nullable: true
      employee_id:
        description: Work session employee id
        type: integer
        example: 101
      clock_in_location:
        $ref: '#/definitions/Location'
      clock_out_location:
        $ref: '#/definitions/Location'

  VisitDailyActivity:
    type: object
    description: Activity of daily living
    properties:
      name:
        type: string
        description: ADL description
        example: Take out the trash
      completed:
        type: boolean
        description: Indicates if the ADL was completed during the visit
        example: false
      reason:
        type: string
        description: Reason why the ADL was not completed, in case it wasn't
        example: Not a garbage day
        x-nullable: true

  VisitTagList:
    allOf:
    - $ref: '#/definitions/PaginatedList'
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/VisitTag'

  VisitTagCreate:
    type: array
    description: An array of visit tags.
    items:
      $ref: '#/definitions/VisitTag'

  VisitTag:
    type: string
    description: Name of tag.
    example: 'First visit'

  VisitNoteCreate:
    description: Visit note
    type: object
    properties:
      text:
        type: string
        description: Content of the visit note
        maxLength: 1000
        example: A sample visit note.
    required:
    - text

  VisitInterventionsUpdate:
    description: Interventions
    type: object
    properties:
      interventions:
        type: string
        description: list of visit intervention ids
        example: "[1, 2, 3, 4]"


  VisitNote:
    allOf:
    - $ref: '#/definitions/VisitNoteCreate'
    properties:
      created_at:
        type: string
        format: 'date-time'
        description: Creation time of the note
        example: '2017-07-08T13:30:00+00:00'
    required:
    - created_at

  VisitFacilityDetails:
    description: Visit facility
    type: object
    x-nullable: true
    properties:
      id:
        type: integer
        description: AlayaCare facility ID
        example: 1
      name:
        type: string
        description: Facility name
        example: Clinic name
      external_id:
        type: string
        description: External facility ID
        example: sor_clinic_id_1
        x-nullable: true
      timezone:
        type: string
        description: Time Zone name in IANA format (iana.org/time-zones)
        example: America/Toronto
    required:
    - id
    - name

  VisitCancelCode:
    description: Visit cancellation code
    type: object
    x-nullable: true
    properties:
      id:
        type: integer
        description: AlayaCare cancel code ID
        example: 1
      code:
        type: string
        description: Cancel code
        example: CLNT_REQ_RESCHEDULE
      description:
        type: string
        description: Cancel code description
        example: Client requested reschedule
        x-nullable: true
    required:
    - id
    - code

  VisitCancelCodeList:
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: Paginated list of cancel codes
    properties:
      items:
        type: array
        items:
          allOf:
          - $ref: '#/definitions/VisitCancelCode'
          properties:
            branch:
              $ref: '#/definitions/Branch'

  VisitActivityCode:
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare activity code ID
        example: 1
      code:
        type: string
        description: Activity code
        example: '01- Assessment'
      description:
        type: string
        description: Activity code description
        example: New client assessment
    required:
    - id
    - code

  VisitSkill:
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare activity code ID
        example: 1
      description:
        type: string
        description: Skill description
        example: Driver License
    required:
    - id

  Address:
    type: object
    properties:
      order:
        type: integer
        description: Order of location in route
        example: 1
      is_home_address:
        type: boolean
        description: If address defined matches the client address from the client profile, this value is true. Otherwise, the value is false.
        example: True
      latitude:
        type: number
        description: Latitude of the address
        example: 45.5017
      longitude:
        type: number
        description: Longitude of the address
        example: 73.5673
      address_1:
        type: string
        description: First line of the address
        example: 4200 St Laurent Blvd
      address_2:
        type: string
        description: Second line of the address
        example: "800"
      city:
        type: string
        description: City
        example: Montreal
      state:
        type: string
        description: State or province
        example: QC
      zip_code:
        type: string
        description: ZIP or postal code
        example: H2W 2R2
      country:
        type: string
        description: Country
        example: Canada

  BaseVisitDetails:
    type: object
    properties:
      alayacare_employee_id:
        type: integer
        format: int64
        description: AlayaCare employee ID
        example: 101
        x-nullable: true
      alayacare_service_id:
        type: integer
        format: int64
        description: AlayaCare service ID
        example: 1
      alayacare_visit_id:
        type: integer
        format: int64
        description: AlayaCare visit ID
        example: 10001
      employee_id:
        type: string
        description: External employee ID
        example: sor_employee_id_1
        x-nullable: true
      service_id:
        type: string
        description: External service ID
        example: sor_service_id_1
        x-nullable: true
      visit_id:
        type: string
        description: External visit ID
        example: sor_visit_id_1
        x-nullable: true
      status:
       type: string
       description: Status of the visit based on status hierarchy from AlayaCare web application.
       example: scheduled
       enum:
        - scheduled
        - vacant
        - on_hold
        - cancelled
        - offered
        - clocked
        - late
        - completed
        - missed
        - approved
      start_at:
        type: string
        format: 'date-time'
        description: Visit start time (ISO 8601)
        example: '2017-07-08T13:30:00+00:00'
      end_at:
        type: string
        format: 'date-time'
        description: Visit end time (ISO 8601)
        example: '2017-07-08T14:00:00+00:00'
      cancelled:
        type: boolean
        description: Indicates if visit is cancelled
      employee:
        $ref: '#/definitions/EmployeeDetails'
      service:
        $ref: '#/definitions/VisitServiceDetails'
      funders:
        description: Visit funders
        type: array
        items:
          $ref: '#/definitions/VisitFunderDetails'
      work_sessions:
        type: array
        items:
          $ref: '#/definitions/VisitWorkSession'
      adls:
        type: array
        items:
          $ref: '#/definitions/VisitDailyActivity'
      notes:
        type: array
        items:
          $ref: '#/definitions/VisitNote'
      cancel_code:
        $ref: '#/definitions/VisitCancelCode'
      activity_codes:
        type: array
        items:
          $ref: '#/definitions/VisitActivityCode'
      skills:
        type: array
        items:
          $ref: '#/definitions/VisitSkill'
      tags:
        type: array
        items:
          $ref: '#/definitions/VisitTag'
      service_instructions:
        description: Service instructions
        type: string
        example: "Call in the morning to confirm each visit"
        x-nullable: true
      service_code_id:
        description: Visit override service code id.
        type: integer
        example: 1
        x-nullable: true
      service_code_name:
        description: Visit override service code name.
        type: string
        example: Default Appointment
        x-nullable: true
      route:
        type: array
        items:
          $ref: '#/definitions/Address'
    required:
    - alayacare_service_id
    - alayacare_visit_id
    - start_at
    - end_at
    - cancelled
    - employee
    - service
    - work_sessions
    - adls
    - notes
    - cancel_code
    - activity_codes
    - tags
    - service_instructions

  VisitDetails:
    allOf:
    - $ref: "#/definitions/BaseVisitDetails"
    properties:
      alayacare_visit_guid:
        type: integer
        format: int64
        description: AlayaCare visit GUID
        example: 10002
      alayacare_client_id:
        type: integer
        format: int64
        description: AlayaCare client ID
        example: 1001
      client_id:
        type: string
        description: External client ID
        example: sor_client_id_1
        x-nullable: true
      client:
        $ref: '#/definitions/ClientBranchDetails'
      facility:
        $ref: '#/definitions/VisitFacilityDetails'
      timekeeping:
        $ref: '#/definitions/VisitTimekeeping'
    required:
    - alayacare_client_id
    - client

  FacilityVisitDetails:
    allOf:
    - $ref: "#/definitions/BaseVisitDetails"
    properties:
      alayacare_facility_id:
        format: int64
        description: AlayaCare ID of the facility
        example: 1001
      facility_id:
        type: string
        description: External ID of the facility
        example: facility_ext_id
        x-nullable: true
      facility:
        $ref: '#/definitions/ClientDetails'
    required:
    - alayacare_facility_id
    - facility_id

  BaseVisitUpdate:
    description: AlayaCare visit entity data for updates
    type: object
    properties:
      visit_id:
        description: |
          External visit ID
          Allows correlating the visit in AlayaCare to visit data on an external system.
          If not specified AlayaCare visit ID would be used as default value.
        type: string
        example: sor_visit_id_1
        x-nullable: true
      employee_id:
        description: |
          External employee ID
          If no employee is specified a vacant visit will be created.
        type: string
        example: sor_employee_id_1
        x-nullable: true
      alayacare_employee_id:
        description: |
          AlayaCare employee ID
          If no employee is specified a vacant visit will be created.
        type: integer
        example: 101
      service_id:
        description: |
          External service ID
          Can be omitted if the client has a single active service.
        type: string
        example: sor_service_record_1
        x-nullable: true
      alayacare_service_id:
        description: |
          AlayaCare service ID
          Can be omitted if the client has a single active service.
        type: integer
        example: 1
      start_at:
        type: string
        format: 'date-time'
        description: Visit start time (ISO 8601)
        example: '2017-07-08T13:30:00+00:00'
      end_at:
        type: string
        format: 'date-time'
        description: Visit end time (ISO 8601)
        example: '2017-07-08T14:00:00+00:00'
      cancelled:
        type: boolean
        description: Indicates if visit is cancelled
        default: false
      cancel_code_id:
        type: integer
        description: |
          AlayaCare ID of the cancel code.
          Value must be `null` if visit is not cancelled.
        example: 101
        x-nullable: true
      service_instructions:
        description: Service instructions
        type: string
        example: "Call in the morning to confirm each visit"
        x-nullable: true

  VisitUpdate:
    allOf:
    - $ref: '#/definitions/BaseVisitUpdate'
    properties:
      client_id:
        description: External client ID
        type: string
        example: sor_client_id_1
      alayacare_client_id:
        description: AlayaCare client ID
        type: integer
        example: 1001

  FacilityVisitUpdate:
    allOf:
    - $ref: '#/definitions/BaseVisitUpdate'

  VisitCreate:
    allOf:
    - $ref: '#/definitions/VisitUpdate'
    description: AlayaCare visit entity data for creation
    required:
    - start_at
    - end_at

  FacilityVisitCreate:
    allOf:
    - $ref: '#/definitions/FacilityVisitUpdate'
    description: date for creating a facility visit
    properties:
      alayacare_facility_id:
        format: int64
        description: AlayaCare ID of the facility
        example: 1001
      facility_id:
        type: string
        description: External ID of the facility
        example: facility_ext_id
        x-nullable: true
    required:
    - start_at
    - end_at

  DeliveryDateInformation:
    properties:
      alayacare_visit_id:
        type: integer
        description: AlayaCare visit ID
        example: 17432
      delivery_date:
        type: string
        description: Delivery date for visit in UTC format
        example: "2022-12-13"

  #Visit Interventions models

  IvrVisitInterventions:
    description: A list of visit interventions
    type: object
    required:
    - intervention_id
    - completed
    - position

    properties:
      intervention_id:
        description: ID of the intervention configured in the client's careplan
        type: integer
        example: 101
      completed:
        description: Completion of the instance of the intervention in the visit
        type: boolean
        example: true
      comment:
        description: Comment entered in the visit intervention
        type: string
        example: 'Vitals recorded. Blood pressure normal.'
        x-nullable: true
      position:
        type: integer
        example: 1
      duration:
        description: Duration of the intervention in minutes
        type: integer
        example: 10
        x-nullable: true
      work_session_uuid:
        description: UUID of the work session
        type: string
        example: 'uuid'
        x-nullable: true

  VisitInterventionsList:
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: Paginated list of visits
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/VisitInterventions'

  VisitInterventions:
    description: A list of visit interventions
    type: object
    properties:
      intervention_id:
        type: integer
        description: ID of the intervention configured in the client's careplan
        example: 101
      completed:
        type: boolean
        example: true
        description: Completion of the instance of the intervention in the visit
      comment:
        type: string
        description: Comment entered in the visit intervention.
          Will return the `not_completed_reason_name` if it is set but there is
          no comment
        example: 'Vitals recorded. Blood pressure normal.'
      not_completed_reason_name:
        type: string
        description: Reason code for not completed the visit intervention
        example: 'client_declined'
      status:
        type: string
        enum: ['not_documented', 'not_done', 'done']
        description: The status of the visit intervention
      intervention:
        $ref: '#/definitions/Intervention'
      position:
        type: integer
        example: 1
      created_at:
        type: string
        format: 'date-time'
        description: Visit start time (ISO 8601)
        example: '2017-07-08T13:30:00+00:00'
      created_by:
        type: object
        description: User who created the intervention in the visit
        properties:
          id:
            type: integer
            example: 1001
          first_name:
            type: string
            example: John
          last_name:
            type: string
            example: Smith
      updated_at:
        type: string
        format: 'date-time'
        description: Visit updated time (ISO 8601)
        example: '2018-07-08T13:30:00+00:00'
      updated_by:
        type: object
        description: User who last updated the intervention in the visit
        properties:
          id:
            type: integer
            example: 1001
          first_name:
            type: string
            example: John
          last_name:
            type: string
            example: Smith
      visit_id:
        description: External ID of the visit
        type: string
        example: 'external_id_123'
      alayacare_visit_id:
        description: Alayacare ID of the visit
        type: integer
        example: 2384

  Intervention:
    type: object
    properties:
      careplan_id:
        type: integer
        description: ID of the client's careplan
        example: 709
      client_id:
        type: string
        description: Alayacare client external ID
        example: 'external_id_client_123'
      alayacare_client_id:
        type: integer
        description: Alayacare client ID
        example: 1001
      name:
        type: string
        description: Name of the intervention
        example: 'Blood pressure measurement'
      completions:
        type: array
        description: Date-time of completion of the intervention (ISO 8601)
        items:
          type: object
      is_required:
        type: boolean
        description: Intervention is required or not to clock out of the visit
      module:
        type: string
        description: Alayacare Module to which the intervention is attached
        example: 'Vitals'
      status:
        type: string
        description: Status of the intervention in the Careplan
        example: 'active'
        enum:
        - draft
        - active
        - completed
        - archived
      type:
        type: string
        description: One of the types defined in the setting "Care Documentation > Care Plan Intervention Types"
        example: Nursing


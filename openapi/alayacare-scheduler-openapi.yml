        format: 'date-time'
        description: Visit updated time (ISO 8601)
        example: '2017-07-08T13:30:00+00:00'
      timezone:
        type: string
        description: Timezone name in IANA format (iana.org/time-zones). If not set, returns the branch timezone.
        example: America/Toronto

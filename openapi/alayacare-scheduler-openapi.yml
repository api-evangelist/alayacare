swagger: '2.0'
info:
  version: '1.0.17'
  title: AlayaCare Scheduler API
  description: |
    **External IDs:**
    The following terms are used to reference ids that identify resources in systems external to AlayaCare:
    - client_id
    - employee_id
    - service_id
    - funder_id
    - visit_id
    - facility_id

    External IDs are required to be unique. No other assumptions are made regarding their format; they are treated as strings.

    **AlayaCare IDs:**
    The following terms are used to reference ids that identify resources in AlayaCare:
    - alayacare_client_id
    - alayacare_employee_id
    - alayacare_service_id
    - alayacare_funder_id
    - alayacare_visit_id
    - alayacare_facility_id

    **Remarks**
    All dates must be in ISO 8601 format with timezone data
  contact:
    name: AlayaCare

host: homecare.alayacare.ca
basePath: /ext/api/v2/scheduler
securityDefinitions:
  basic_auth:
    type: basic
    description: Basic HTTP auth over https
schemes:
- https
consumes:
- application/json
produces:
- application/json

paths:
  /cancelcodes:
    get:
      tags: [Visits]
      summary: Get a list of cancel codes
      parameters:
      - $ref: '#/parameters/page'
      - $ref: '#/parameters/count'
      - $ref: '#/parameters/branch_id'
      responses:
        "200":
          description: A list of cancel codes
          schema:
            $ref: '#/definitions/VisitCancelCodeList'

  /visits:
    get:
      tags: [Visits]
      summary: Get list of visits
      description: |
        **Note:** This endpoint returns only patient/client visits (where the client is a patient). To retrieve facility visits, use the `/facility_visits` endpoint instead.
        - `client_id` and `alayacare_client_id` are mutually exclusive, specifying both is an invalid request.
        - `employee_id` and `alayacare_employee_id` are mutually exclusive, specifying both is an invalid request.
        - `service_id` and `alayacare_service_id` are mutually exclusive, specifying both is an invalid request.
        - If the `start_date_from` filter is not specified, it will default to **now**.
        - If the `start_date_to` filter is not specified, it will default to **7 days from now**.
      parameters:
      - name: tags
        in: query
        required: false
        type: array
        items:
          type: string
        description: |
          Filter on a list of tags and return values for at least one matching tag. Filter by multiple tag names using **OR**.
      - name: start_date_from
        in: query
        required: false
        type: string
        format: 'date-time'
        description: |
          Filter by visit start date time greater or equal than specified value.
          If not specified will default to now.
          Expected format is ISO 8601 converted to UTC timezone.
          `start_at` can be used as this filter name
          Ex: `2018-02-03T08:00:00-05:00`
      - name: start_date_to
        in: query
        required: false
        type: string
        format: date-time
        description: |
          Filter by visit start date time less than or equal than specified value.
          If not specified will default to 7 days from now.
          Expected format is ISO 8601 converted to UTC timezone.
          `end_at` can be used as this filter name
          Ex: `2019-02-18T08:00:00-05:00`
      - name: end_date_from
        in: query
        required: false
        type: string
        format: 'date-time'
        description: |
          Filter by visit end date time greater or equal than specified value.
          Expected format is ISO 8601 converted to UTC timezone.
          Ex: `2019-02-03T08:00:00-05:00`
      - name: end_date_to
        in: query
        required: false
        type: string
        format: date-time
        description: |
          Filter by visit end date time less than or equal than specified value.
          Expected format is ISO 8601 converted to UTC timezone.
          Ex: `2018-02-18T08:00:00-05:00`
      - name: is_cancelled
        in: query
        required: false
        type: boolean
        description: |
          If true, returns only visits with a valid cancel code, not including 'On Hold'.
          If false, returns only visits with 'On Hold' codes or *no* cancel code.
      - name: is_on_hold
        in: query
        required: false
        type: boolean
        description: |
          If true, returns only visits with an 'On Hold' cancel code.
          If false, returns only visits with *no* cancel code or with a cancel code other than 'On Hold'.
      - name: is_vacant
        in: query
        required: false
        type: boolean
        description: |
          If true, returns only visits with *no* employee assigned.
          If false, returns only visits with an employee assigned.
      - name: status
        in: query
        required: false
        type: string
        description: Status of the visit based on status hierarchy from AlayaCare web application, one or more using **OR**.
        enum:
          - scheduled
          - vacant
          - on_hold
          - cancelled
          - offered
          - clocked
          - late
          - completed
          - missed
          - approved
      - $ref: '#/parameters/branch_id'
      - $ref: '#/parameters/client_id'
      - $ref: '#/parameters/alayacare_client_id'
      - $ref: '#/parameters/employee_id'
      - $ref: '#/parameters/alayacare_employee_id'
      - $ref: '#/parameters/service_id'
      - $ref: '#/parameters/alayacare_service_id'
      - $ref: '#/parameters/page'
      - $ref: '#/parameters/count'
      responses:
        "200":
          description: A list of visits
          schema:
            $ref: '#/definitions/VisitList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
    post:
      tags: [Visits]
      summary: Create a new visit
      description: |
        - `client_id` or `alayacare_client_id` is required, not specifying one is an invalid request.
        - `client_id` and `alayacare_client_id` are mutually exclusive, specifying both is an invalid request.
        - `employee_id` and `alayacare_employee_id` are mutually exclusive, specifying both is an invalid request..
        - `service_id` and `alayacare_service_id` are mutually exclusive, specifying both is an invalid request..
        **Remarks**
        A visit can be created without specifying the service if the client has a single **active** service.
        If no employee is specified a vacant visit will be created.
        A cancelled visit (`cancelled`= `true`) must include a cancel code ID.
      parameters:
        - name: body
          description: Visit data in JSON format.
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitCreate'
      responses:
        "201":
          description: Visit successfully created.
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitCreateInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /visits/{alayacare_visit_id}:
    parameters:
    - name: alayacare_visit_id
      description: AlayaCare visit ID
      in: path
      type: integer
      required: true
    get:
      tags: [Visits]
      summary: Get visit details using AlayaCare ID
      description: |
        **Note:** This endpoint returns only patient/client visits (where the client is a patient).
        If the visit belongs to a facility, this endpoint will return a `404`. Use `GET /facility_visits/{alayacare_visit_id}` instead.
      responses:
        "200":
          description: Visit details
          schema:
            $ref: '#/definitions/VisitDetails'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    put:
      tags: [Visits]
      summary: Update visit details using AlayaCare ID
      description: |
        **Note:** This endpoint only supports patient/client visits. To update a facility visit, use `PUT /facility_visits/{alayacare_visit_id}` instead.

        A cancelled visit (`cancelled`= `true`) must include a cancel code ID.
      parameters:
        - name: body
          description: Visit data in JSON format
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitUpdate'
      responses:
        "200":
          description: Visit successfully updated
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitUpdateInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    delete:
      tags: [Visits]
      summary: Delete visit using AlayaCare ID
      responses:
        "204":
          description: Visit successfully deleted
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visits/by_id/{visit_id}:
    parameters:
    - name: visit_id
      description: External visit ID
      in: path
      type: string
      required: true
    get:
      tags: [Visits]
      summary: Get visit details using external ID
      responses:
        "200":
          description: Visit details
          schema:
            $ref: '#/definitions/VisitDetails'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    put:
      tags: [Visits]
      summary: Update visit details using external ID
      description: A cancelled visit (`cancelled`= `true`) must include a cancel code ID.
      parameters:
        - name: body
          description: Visit data in JSON format
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitUpdate'
      responses:
        "200":
          description: Visit successfully updated
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitUpdateInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    delete:
      tags: [Visits]
      summary: Delete visit using external ID
      responses:
        "204":
          description: Visit successfully deleted
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'


  /visits/lock:
    put:
      tags: [Visits]
      summary: Lock list of visits using Alayacare visit ID or external visit ID
      description: |
        **Remarks**
        - Only Approved visits can be locked using `alayacare_visit_id` or `visit_id`.
        - Visits cannot be **unlocked**.
      parameters:
        - name: body
          description: Visit data in JSON format
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitIDList'
      responses:
        "200":
          description: Visit successfully locked
        "207":
          $ref: '#/responses/ErrorResponsePartialVisitLock'
        "400":
          $ref: '#/responses/ErrorResponseVisitLockInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /visits/{alayacare_visit_id}/delivery_date:
    parameters:
      - name: alayacare_visit_id
        description: AlayaCare visit ID
        in: path
        type: integer
        required: true
    get:
      tags: [Visits]
      summary: Get the delivery date of a visit given the ID
      responses:
        "200":
          description: Delivery date for visit
          schema:
            $ref: '#/definitions/DeliveryDateInformation'
        "404":
          $ref: '#/responses/ErrorResponseDeliveryDateNotFound'

  /visits/{client_id}/next_visit_id:
    parameters:
      - name: client_id
        description: Client ID
        in: path
        type: integer
        required: true
      - name: with_canceled
        description: |
          If false, get the next visit without a cancel code
        in: query
        required: false
        default: true
        type: boolean
      - name: date_utc
        description: Date to filter the next visit. If not specified, date is now.
        in: query
        required: false
        type: string
        format: date-time
    get:
      tags: [Visits]
      summary: Get the next visit ID for a client
      responses:
        "200":
          description: Next visit ID for client
          schema:
            $ref: '#/definitions/NextVisitId'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visits/tags:
    get:
      tags: [Visit tags]
      summary: Get all available tags for visits
      responses:
        "200":
          description: A list of available tags for visits
          schema:
            $ref: '#/definitions/VisitTagList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /visits/{alayacare_visit_id}/tags:
    parameters:
    - name: alayacare_visit_id
      description: AlayaCare visit ID
      in: path
      type: integer
      required: true
    post:
      tags: [Visit tags]
      summary: Add tags to a visit using AlayaCare ID
      parameters:
        - name: body
          description: An array of visit tags
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitTagCreate'
      responses:
        "201":
          description: Visit tags successfully added.
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitTagInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    put:
      tags: [Visit tags]
      summary: Update tags of a visit using AlayaCare ID
      description: Tags sent in the payload will overwrite existing tags on the visit
      parameters:
        - name: body
          description: An array of visit tags
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitTagCreate'
      responses:
        "200":
          description: Visit tags successfully updated
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitTagInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visits/by_id/{visit_id}/tags:
    parameters:
    - name: visit_id
      description: External visit ID
      in: path
      type: string
      required: true
    post:
      tags: [Visit tags]
      summary: Add tags to a visit using External ID
      parameters:
        - name: body
          description: An array of visit tags
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitTagCreate'
      responses:
        "201":
          description: Visit tags successfully added.
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitTagInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    put:
      tags: [Visit tags]
      summary: Update tags of a visit using External ID
      description: Tags sent in the payload will overwrite existing tags on the visit
      responses:
        "200":
          description: Visit tags successfully updated
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitTagInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visits/{alayacare_visit_id}/notes:
    parameters:
    - name: alayacare_visit_id
      description: AlayaCare visit ID
      in: path
      type: integer
      required: true
    post:
      tags: [Visit notes]
      summary: Add note to a visit using AlayaCare ID
      parameters:
        - name: body
          description: Visit note data in JSON format
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitNoteCreate'
      responses:
        "201":
          description: Visit note successfully created.
          schema:
            $ref: '#/definitions/Visit'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visits/by_id/{visit_id}/notes:
    parameters:
    - name: visit_id
      description: External visit ID
      in: path
      type: string
      required: true
    post:
      tags: [Visit notes]
      summary: Add note to a visit using External ID
      parameters:
        - name: body
          description: Visit note data in JSON format
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitNoteCreate'
      responses:
        "201":
          description: Visit note successfully created.
          schema:
            $ref: '#/definitions/Visit'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visits/{alayacare_visit_id}/interventions:
    get:
      tags: [Visit interventions]
      summary: Get a list of interventions for a visit using it's Alayacare ID
      parameters:
        - name: alayacare_visit_id
          description: The ID of the visit
          type: integer
          in: path
          required: true
        - name: is_required
          description: Filter for interventions that are required to finish a visit
          type: boolean
          in: query
          required: false
        - name: has_comment
          description: Filter for interventions that have a comment or
            not_completed_reason_name
          type: boolean
          in: query
          required: false
        - name: is_completed
          description: Filter for interventions that have been completed
          type: boolean
          in: query
          required: false
      responses:
        "200":
          description: Visit details
          schema:
            $ref: '#/definitions/VisitInterventionsList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "403":
          $ref: '#/responses/ErrorResponseCareplanFeatureFlagState'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

    put:
      tags: [Visit interventions]
      summary: Link Interventions to a visit
      description: |
        - The full list of Interventions must be provided in the request body, it will override the previously available list.
        - Only active `interventions` on the patient active Careplan can be added
        - Only the admin user can update the visit interventions when the work session is not open.
      parameters:
        - name: body
          description: List of interventions to apply to a visit
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitInterventionsUpdate'
        - name: alayacare_visit_id
          description: The ID of the visit
          type: integer
          in: path
          required: true

      responses:
        "200":
          description: A list of interventions for a visit
          schema:
            $ref: '#/definitions/VisitInterventionsList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "403":
          $ref: '#/responses/ErrorResponseCareplanFeatureFlagState'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'


  /visits/{alayacare_visit_id}/interventions/ivr:
    put:
      tags: [Visit interventions]
      summary: Update interventions in a visit using it's Alayacare ID
      description: |
        - The full list of Interventions must be provided in the request body, it will override the previously available list.
        - User credentials MUST have an admin role.
        - (Employee internal id) MUST be informed on the url path as a param, like this: '?completions_by={employee_internal_id}'.
        - Position should be always 0. It does not cover the interventions tries.
        - The Employee '?completions_by={employee_internal_id} must be clocked-in to the visit.
      parameters:
        - name: body
          description: List of interventions to apply to a visit
          in: body
          required: true
          schema:
            $ref: '#/definitions/IvrVisitInterventions'
        - name: alayacare_visit_id
          description: The ID of the visit
          type: integer
          in: path
          required: true
        - name: completions_by
          description: Employee internal id
          type: integer
          in: query
          required: true

      responses:
        "204":
          description: Success with no content. Interventions were updated.
        "400":
          description: |
            Make sure that:
            - completions_by is informed.
            - the Visit is assigned for the same (employee internal id) informed at completions_by query param.
            - the Visit is clocked-in.
            - the Employee is clocked-in to the visit.
            - position is 0.
            - intervention already exists.

        "403":
          description: Make sure that your api credentials have an admin role.
        "404":
          description: Make sure that visit_id is valid.


  /visits/by_id/{visit_id}/interventions:
    get:
      tags: [Visit interventions]
      summary: Get a list of interventions for a visit using it's Alayacare external ID
      parameters:
        - name: visit_id
          description: The ID of the visit
          type: integer
          in: path
          required: true
        - name: is_required
          description: Filter for interventions that are required to finish a visit
          type: boolean
          in: query
          required: false
        - name: has_comment
          description: Filter for interventions that have a comment
          type: boolean
          in: query
          required: false
        - name: is_completed
          description: Filter for interventions that have been completed
          type: boolean
          in: query
          required: false
      responses:
        "200":
          description: A list of interventions for a visit
          schema:
            $ref: '#/definitions/VisitInterventionsList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "403":
          $ref: '#/responses/ErrorResponseCareplanFeatureFlagState'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

    put:
      tags: [Visit interventions]
      summary: Update interventions in a visit using it's Alayacare external ID
      description: |
        - The full list of Interventions must be provided in the request body, it will override the previously available list.
        - Only active `interventions` on the patient active careplan can be added
        - Only the admin user can update the visit interventions when the work session is not open..
      parameters:
        - name: body
          description: List of interventions to apply to a visit
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitInterventionsUpdate'
        - name: visit_id
          description: The ID of the visit
          type: integer
          in: path
          required: true

      responses:
        "200":
          description: A list of interventions for a visit
          schema:
            $ref: '#/definitions/VisitInterventionsList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "403":
          $ref: '#/responses/ErrorResponseCareplanFeatureFlagState'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visits/{alayacare_visit_id}/accounting:
    parameters:
    - name: alayacare_visit_id
      description: AlayaCare visit ID
      in: path
      type: integer
      required: true
    get:
      tags: [Visit accounting]
      summary: Get visit accounting
      responses:
        "200":
          description: Visit accounting.
          schema:
            $ref: '#/definitions/VisitAccounting'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visits/by_id/{visit_id}/accounting:
    parameters:
    - name: visit_id
      description: External visit ID
      in: path
      type: integer
      required: true
    get:
      tags: [Visit accounting]
      summary: Get visit accounting
      responses:
        "200":
          description: Visit accounting.
          schema:
            $ref: '#/definitions/VisitAccounting'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /facility_visits/{alayacare_visit_id}/accounting:
    parameters:
    - name: alayacare_visit_id
      description: AlayaCare visit ID
      in: path
      type: integer
      required: true
    get:
      tags: [Visit accounting]
      summary: Get visit accounting
      responses:
        "200":
          description: Visit accounting.
          schema:
            $ref: '#/definitions/VisitAccounting'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /facility_visits/by_id/{visit_id}/accounting:
    parameters:
    - name: visit_id
      description: External visit ID
      in: path
      type: integer
      required: true
    get:
      tags: [Visit accounting]
      summary: Get visit accounting
      responses:
        "200":
          description: Visit accounting.
          schema:
            $ref: '#/definitions/VisitAccounting'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /visit_verification/visits/{alayacare_visit_id}:
    parameters:
    - name: alayacare_visit_id
      description: AlayaCare visit ID
      in: path
      type: integer
      required: true
    get:
      tags: [Visit Verification]
      summary: Get extended visit verification information using AlayaCare ID
      responses:
        "200":
          description: Visit details
          schema:
            $ref: '#/definitions/VisitVerificationDetails'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "403":
          $ref: '#/responses/ErrorResponseUnauthorized'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /adls/client/{alayacare_client_id}:
    parameters:
    - name: alayacare_client_id
      in: path
      required: true
      type: string
      description: AlayaCare client ID
    get:
      tags: [Activities of Daily Living (ADL)]
      summary: Get a list of a client's ADLs using AlayaCare client ID
      description: |
        - `service_id` and `alayacare_service_id` are mutually exclusive, specifying both is an invalid request.
      parameters:
      - $ref: '#/parameters/service_id'
      - $ref: '#/parameters/alayacare_service_id'
      responses:
        "200":
          description: A list of ADLs for a client
          schema:
            $ref: '#/definitions/DailyActivityList'
        "400":
          $ref: '#/responses/ErrorResponseAdlsInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "403":
          $ref: '#/responses/ErrorResponseCareplanFeatureFlagState'
        "404":
          $ref: '#/responses/ErrorResponseClientNotFound'

  /adls/client/by_id/{client_id}:
    parameters:
    - name: client_id
      in: path
      required: true
      type: string
      description: External client ID
    get:
      tags: [Activities of Daily Living (ADL)]
      summary: Get a list of a client's ADLs using external client ID
      description: |
        - `service_id` and `alayacare_service_id` are mutually exclusive, specifying both is an invalid request.
      parameters:
      - $ref: '#/parameters/service_id'
      - $ref: '#/parameters/alayacare_service_id'
      responses:
        "200":
          description: A list of ADLs for a client
          schema:
            $ref: '#/definitions/DailyActivityList'
        "400":
          $ref: '#/responses/ErrorResponseAdlsInvalidRequest'
        "403":
          $ref: '#/responses/ErrorResponseCareplanFeatureFlagState'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseClientNotFound'

  /profile/service:
    get:
      tags: [Profile]
      summary: Get a list of service profile attributes
      parameters:
      - $ref: '#/parameters/page'
      - $ref: '#/parameters/count'
      - $ref: '#/parameters/filter_partial_search'
      responses:
        '200':
          description: A list of profile attributes
          schema:
            $ref: '#/definitions/ProfileAttributeList'
        '401':
          $ref: '#/responses/ErrorResponseAuthentication'


  /service_codes:
    get:
      tags: [ Service Codes ]
      summary: Get list of service codes
      description: |
        Get a list of service codes
        - `client_id` and `alayacare_client_id` are mutually exclusive, specifying both is an invalid request.
        - `funder_id` and `alayacare_funder_id` are mutually exclusive, specifying both is an invalid request.
        -  Field `client_id` must be specified along with `funder_id`
      parameters:
        - name: client_id
          description: Filter by client id
          in: query
          type: integer
          required: false
        - name: alayacare_client_id
          description: Filter by external client id
          in: query
          type: string
          required: false
        - name: funder_id
          description: Filter by funder id
          in: query
          type: integer
          required: false
        - name: alayacare_funder_id
          description: Filter by external funder id
          in: query
          type: string
          required: false
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      responses:
        "200":
          description: The list of service codes
          schema:
            $ref: '#/definitions/ServiceCodeList'
        "400":
          $ref: '#/responses/ErrorResponseMutuallyExclusive'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /facilities:
    get:
      tags: [Facilities]
      summary: Get a list of facilities
      description: Get a list of facilities
      parameters:
      - name: name
        description: Filter by facility name
        in: query
        type: string
        required: false
      - $ref: '#/parameters/page'
      - $ref: '#/parameters/count'
      - $ref: '#/parameters/branch_id'
      responses:
        "200":
          description: The list of facilities
          schema:
            $ref: '#/definitions/FacilityList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /facility_visits:
    get:
      tags: [Facilities]
      summary: Get a list of facility visits
      description: |
        Returns visits where the client is a facility. For patient/client visits, use the `/visits` endpoint instead.
      parameters:
      - name: tags
        in: query
        required: false
        type: array
        items:
          type: string
        description: |
          Filter on a list of tags and return values for at least one matching tag. Filter by multiple tags using **OR**.
      - name: start_at
        in: query
        required: false
        type: string
        format: 'date-time'
        description: |
          Filter by visit start time greater or equal than specified value.
          If not specified will default to now.
          Expected format is ISO 8601.
          Ex: `2018-02-03T08:00:00-05:00`
      - name: end_at
        in: query
        required: false
        type: string
        format: date-time
        description: |
          Filter by visit start time less than or equal than specified value.
          If not specified will default to 7 days from now.
          Ex: `2018-02-18T08:00:00-05:00`
      - name: status
        in: query
        required: false
        type: string
        description: Status of the visit based on status hierarchy from AlayaCare web application, one or more using **OR**.
        enum:
          - scheduled
          - vacant
          - on_hold
          - cancelled
          - offered
          - clocked
          - late
          - completed
          - missed
          - approved
      - $ref: '#/parameters/facility_id'
      - $ref: '#/parameters/alayacare_facility_id'
      - $ref: '#/parameters/employee_id'
      - $ref: '#/parameters/alayacare_employee_id'
      - $ref: '#/parameters/service_id'
      - $ref: '#/parameters/alayacare_service_id'
      - $ref: '#/parameters/page'
      - $ref: '#/parameters/count'
      responses:
        "200":
          description: the list of facilities
          schema:
            $ref: '#/definitions/FacilityVisitList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

    post:
      tags: [Facilities]
      summary: Create a new facility visit
      description: |
        - `facility_id` or `alayacare_facility_id` is required, not specifying one is an invalid request.
        - `facility_id` and `alayacare_facility_id` are mutually exclusive, specifying both is an invalid request.
        - `employee_id` and `alayacare_employee_id` are mutually exclusive, specifying both is an invalid request.
        - `service_id` and `alayacare_service_id` are mutually exclusive, specifying both is an invalid request.
        **Remarks**
        A visit can be created without specifying the service if the facility has a single **active** service.
        If no employee is specified a vacant visit will be created.
        A cancelled visit (`cancelled`= `true`) must include a cancel code ID.
      parameters:
        - name: body
          description: Visit data in JSON format.
          in: body
          required: true
          schema:
            $ref: '#/definitions/FacilityVisitCreate'
      responses:
        "201":
          description: Visit successfully created.
          schema:
            $ref: '#/definitions/FacilityVisit'
        "400":
          $ref: '#/responses/ErrorResponseVisitCreateInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /facility_visits/{alayacare_visit_id}:
    parameters:
    - name: alayacare_visit_id
      description: AlayaCare visit ID
      in: path
      type: integer
      required: true
    get:
      tags: [Facilities]
      summary: Get facility visit details
      description: |
        Returns details of a visit where the client is a facility. For patient/client visits, use `GET /visits/{alayacare_visit_id}` instead.
      responses:
        "200":
          description: Facility visit details
          schema:
            $ref: '#/definitions/FacilityVisitDetails'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    put:
      tags: [Facilities]
      summary: Update facility visit details
      description: |
        Updates a visit where the client is a facility. For patient/client visits, use `PUT /visits/{alayacare_visit_id}` instead.

        A cancelled visit (`cancelled` = `true`) must include a cancel code ID.
      parameters:
        - name: body
          description: Visit data in JSON format
          in: body
          required: true
          schema:
            $ref: '#/definitions/FacilityVisitUpdate'
      responses:
        "200":
          description: Visit successfully updated
          schema:
            $ref: '#/definitions/FacilityVisit'
        "400":
          $ref: '#/responses/ErrorResponseVisitUpdateInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /facility_visits/by_id/{visit_id}:
    parameters:
    - name: visit_id
      description: External visit ID
      in: path
      type: string
      required: true
    get:
      tags: [Facilities]
      summary: Get facility visit details
      responses:
        "200":
          description: Facility visit details
          schema:
            $ref: '#/definitions/FacilityVisitDetails'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    put:
      tags: [Facilities]
      summary: Update facility visit details
      description: A cancelled visit (`cancelled` = `true`) must include a cancel code ID.
      parameters:
        - name: body
          description: Visit data in JSON format
          in: body
          required: true
          schema:
            $ref: '#/definitions/FacilityVisitUpdate'
      responses:
        "200":
          description: Visit successfully updated
          schema:
            $ref: '#/definitions/FacilityVisit'
        "400":
          $ref: '#/responses/ErrorResponseVisitUpdateInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /facility_visits/{alayacare_visit_id}/tags:
    parameters:
    - name: alayacare_visit_id
      description: AlayaCare visit ID
      in: path
      type: integer
      required: true
    post:
      tags: [Visit tags]
      summary: Add tags to a Facility Visit using AlayaCare ID
      parameters:
        - name: body
          description: An array of visit tags
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitTagCreate'
      responses:
        "201":
          description: Visit tags successfully added.
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitTagInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    put:
      tags: [Visit tags]
      summary: Update tags of a Facility Visit using AlayaCare ID
      description: Tags sent in the payload will overwrite existing tags on the visit
      parameters:
        - name: body
          description: An array of visit tags
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitTagCreate'
      responses:
        "200":
          description: Visit tags successfully updated
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitTagInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /facility_visits/by_id/{visit_id}/tags:
    parameters:
    - name: visit_id
      description: External visit ID
      in: path
      type: string
      required: true
    post:
      tags: [Visit tags]
      summary: Add tags to a visit using External ID
      parameters:
        - name: body
          description: An array of visit tags
          in: body
          required: true
          schema:
            $ref: '#/definitions/VisitTagCreate'
      responses:
        "201":
          description: Visit tags successfully added.
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitTagInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'
    put:
      tags: [Visit tags]
      summary: Update tags of a visit using External ID
      description: Tags sent in the payload will overwrite existing tags on the visit
      responses:
        "200":
          description: Visit tags successfully updated
          schema:
            $ref: '#/definitions/Visit'
        "400":
          $ref: '#/responses/ErrorResponseVisitTagInvalidRequest'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
        "404":
          $ref: '#/responses/ErrorResponseVisitNotFound'

  /evv_visits:
      get:
        tags: [EVV]
        summary: Get a list of evv visits
        description: Get a list of evv visits
        parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - name: start_date_from
          in: query
          required: true
          type: string
          format: 'date-time'
          description: |
            "Filter by visit start time greater or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-03T08:00:00-05:00`"
        - name: start_date_to
          in: query
          required: true
          type: string
          format: date-time
          description: |
            Filter by visit start time less than or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-18T08:00:00-05:00`
        - name: created_date_from
          in: query
          required: false
          type: string
          format: 'date-time'
          description: |
            "Filter by visit created time greater or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-03T08:00:00-05:00`"
        - name: created_date_to
          in: query
          required: false
          type: string
          format: date-time
          description: |
            Filter by visit created time less than or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-18T08:00:00-05:00`
        - name: updated_date_from
          in: query
          required: false
          type: string
          format: 'date-time'
          description: |
            "Filter by visit updated time greater or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-03T08:00:00-05:00`"
        - name: updated_date_to
          in: query
          required: false
          type: string
          format: date-time
          description: |
            Filter by visit updated time less than or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-18T08:00:00-05:00`
        - name: evv_status
          description: Status of the visit based on evv visit status hierarchy from AlayaCare web application
          in: query
          type: string
          required: false
          enum:
            - scheduled
            - deleted
            - missed
            - approved
            - billed
        - name: evv_vendor
          description: Filter by funder evv vendor
          in: query
          type: string
          required: false
          enum:
            - None
            - Sandata
            - eMedNY
            - Vesta
            - Tellus Rendered Services
            - hhax
        - $ref: '#/parameters/branch_id'
        - name: client_attributes
          description: Filter client attributes by name
          in: query
          type: string
          collectionFormat: multi
          required: false
        - name: employee_attributes
          description: Filter employee attributes by name
          in: query
          type: string
          collectionFormat: multi
          required: false
        - name: funder_attributes
          description: Filter funder attributes by name
          in: query
          type: string
          collectionFormat: multi
          required: false
        - name: service_attributes
          description: Filter service attributes by name
          in: query
          type: string
          collectionFormat: multi
          required: false
        - name: include
          description: Include extra information
          in: query
          type: string
          collectionFormat: multi
          required: false
          enum:
            - diagnoses
        responses:
          "200":
            description: List of evv visits
            schema:
              $ref: '#/definitions/EVVVisitList'
          "401":
            $ref: '#/responses/ErrorResponseAuthentication'

parameters:
  page:
    description: Filter by page number.
    name: page
    default: 1
    in: query
    required: false
    type: integer
  count:
    description: Number of items per page.
    name: count
    default: 100
    in: query
    required: false
    type: integer
  branch_id:
    description: |
      Filter by branch ID `(default: current user branch)`
    name: branch_id
    in: query
    required: false
    type: integer
  client_id:
    name: client_id
    in: query
    required: false
    type: string
    description: |
      Filter by external client ID
      External client ID is the client ID in the system of record.
      Ex. CRM client identifier
  alayacare_client_id:
    name: alayacare_client_id
    in: query
    required: false
    type: string
    description: Filter by AlayaCare client ID
  employee_id:
    name: employee_id
    in: query
    required: false
    type: string
    description: |
      Filter by external employee ID
      External employee ID is the employee ID in the system of record.
      Ex. HR employee number
  alayacare_employee_id:
    name: alayacare_employee_id
    in: query
    required: false
    type: integer
    description: Filter by AlayaCare employee ID
  service_id:
    name: service_id
    in: query
    required: false
    type: string
    description: Filter by external service ID
  alayacare_service_id:
    name: alayacare_service_id
    in: query
    required: false
    type: integer
    description: Filter by AlayaCare service ID
  facility_id:
    name: facility_id
    in: query
    required: false
    type: string
    description: |
      Filter by external facility ID
      External facility ID is the facility ID in the system of record.
      Ex. CRM facility identifier
  alayacare_facility_id:
    name: alayacare_facility_id
    in: query
    required: false
    type: string
    description: Filter by AlayaCare facility ID
  filter_partial_search:
    name: filter (partial search)
    description: |
      Substring search on profile tag and description values.
      Ex: `name`
    in: query
    type: string
    required: false

definitions:

  #General models

  Branch:
    description: AlayaCare branch
    type: object
    properties:
      id:
        type: integer
        description: Branch ID
        example: 1000
      name:
        type: string
        description: Branch name
        example: Toronto branch

  PayCode:
    type: object
    properties:
      id:
        type: integer
        description: Pay Code ID
        example: 1
      code:
        type: string
        description: Pay Code Code
        example: "1"
      description:
        type: string
        description: Pay Code Description
        example: "1"
      rate:
        type: number
        description: Rate
        example: 23.345
      unit:
        type: string
        description: Unit
        example: hours | visits | amount

  VisitAccounting:
    type: object
    properties:
      id:
        type: integer
        description: Visit ID
        example: 1
      hours_approved:
        type: number
        description: Hours Approved
        example: 1.00
      pay_code_regular:
        $ref: '#/definitions/PayCode'
      pay_code_overtime:
        $ref: '#/definitions/PayCode'

  FacilityList:
    type: object
    allOf:
      - $ref: "#/definitions/PaginatedList"
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/Facility'

  Facility:
    description: AlayaCare facility
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare facility ID
        example: 1
      name:
        type: string
        description: AlayaCare facility name
        example: Toronto Facility
      profile:
        $ref: '#/definitions/FacilityProfile'
      branch:
        $ref: '#/definitions/Branch'
    required:
      - id
      - name

  FacilityProfile:
    description: |
      Collection of key/value pairs where keys are existing attributes in the agency profile, defined through
      the AlayaCare web application.
      On the example below default profile keys for the facility profile are used.
      Example profile attributes:
      + `name`: string
      + `city`: string
      + `title`: string
      + `state`: string
      + `contact_type`: string
      + `fax`: string
      + `company`: string
      + `phone_other`: string
      + `phone_main`: string
      + `address`: string
      + `country`: string
      + `zip`: string
      + `address_suite`: string
      + `remarks`: string
    type: object
    properties:
      name:
        description: Facility name
        type: string
        example: Alayacare

  ClientDetails:
    description: Visit client details
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare client ID
        example: 1001
      external_id:
        type: string
        description: External client ID
        example: sor_client_id_1
        x-nullable: true
      profile_id:
        type: integer
        description: AlayaCare client profile ID
        example: 7890
      full_name:
        type: string
        description: Client full name
        example: John Smith
      timezone:
        type: string
        description: Time Zone name in IANA format (iana.org/time-zones)
        example: America/Toronto
    required:
    - id
    - full_name

  ClientBranchDetails:
    description: Visit client details
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare client ID
        example: 1001
      external_id:
        type: string
        description: External client ID
        example: sor_client_id_1
        x-nullable: true
      profile_id:
        type: integer
        description: AlayaCare client profile ID
        example: 7890
      full_name:
        type: string
        description: Client full name
        example: John Smith
      timezone:
        type: string
        description: Time Zone name in IANA format (iana.org/time-zones)
        example: America/Toronto
      branch_id:
        type: integer
        description: AlayaCare branch ID
        example: 1000
    required:
    - id
    - full_name

  EmployeeDetails:
    description: Visit employee details
    type: object
    x-nullable: true
    properties:
      id:
        type: integer
        description: AlayaCare employee ID
        example: 1001
      external_id:
        type: string
        description: External employee ID
        example: sor_employee_id_1
        x-nullable: true
      profile_id:
        type: integer
        description: AlayaCare client profile ID
        example: 7891
      full_name:
        type: string
        description: Employee full name
        example: Jane Smith
      email:
        type: string
        description: Employee email
        example: employee_1@workplace.com
      timezone:
        type: string
        description: Time Zone name in IANA format (iana.org/time-zones)
        example: America/Toronto
    required:
    - id
    - full_name

  SuccessResponse:
    description: Success response.
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare ID
        example: 1001
      external_id:
        type: string
        description: External ID
        example: entity_external_id
    required:
    - id
    - external_id

  VisitUpdatePartialSuccessResponse:
    type: object
    properties:
      code:
        type: integer
        example: 207
        description: Response code
      message:
        type: string
        example: "Partial success when locking visits. Visits are not approved or could not be found"
        description: Detailed error message
      alayacare_visit_ids:
        type: array
        description: List of Alayacare visit IDs
        items:
          type: integer
          description: Alayacare visit ID.
          example: 1245
      visit_ids:
        type: array
        description: List of Alayacare external visit IDs
        items:
          type: string
          description: Alayacare external visit ID.
          example: 'ext_visit_1245'


  ErrorResponse:
    description: Error response
    type: object
    properties:
      code:
        type: integer
        example: 400
        description: Response code
      message:
        type: string
        example: 'Invalid request'
        description: Detailed error message
    required:
    - code
    - message

  #Visit models

  BaseVisit:
    type: object
    properties:
      alayacare_employee_id:
        type: integer
        description: AlayaCare employee ID
        example: 101
        x-nullable: true
      alayacare_service_id:
        type: integer
        description: AlayaCare service ID
        example: 1
      alayacare_visit_id:
        type: integer
        description: AlayaCare visit ID
        example: 10001
      employee_id:
        type: string
        description: External employee ID
        example: sor_employee_id_1
        x-nullable: true
      service_id:
        type: string
        description: External service ID
        example: sor_service_id_1
        x-nullable: true
      visit_id:
        type: string
        description: External visit ID
        example: sor_visit_id_1
        x-nullable: true
      status:
       type: string
       description: Status of the visit based on status hierarchy from AlayaCare web application.
       example: scheduled
       enum:
        - scheduled
        - vacant
        - on_hold
        - cancelled
        - offered
        - clocked
        - late
        - completed
        - missed
        - approved
      start_at:
        type: string
        format: 'date-time'
        description: Visit start time (ISO 8601)
        example: '2017-07-08T13:30:00+00:00'
      end_at:
        type: string
        format: 'date-time'
        description: Visit end time (ISO 8601)
        example: '2017-07-08T14:00:00+00:00'
      notes:
        type: array
        items:
          $ref: '#/definitions/VisitNote'
      tags:
        type: array
        items:
          $ref: '#/definitions/VisitTag'
      cancelled:
        type: boolean
        description: Indicates if visit is cancelled
      cancel_code:
        $ref: '#/definitions/VisitCancelCode'
    required:
    - alayacare_service_id
    - alayacare_visit_id
    - start_at
    - end_at
    - cancelled
    - cancel_code

  VisitListDetails:
    allOf:

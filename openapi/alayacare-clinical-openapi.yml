swagger: '2.0'
info:
  version: '1.0.4'
  title: 'External Clinical API'
  description: |
    External Clinical API

    **Internal IDs**
    The following terms are used to reference IDs that identify resources in AlayaCare:
    - id
    - created_by
    - client_id
    - risk_id
    - medication_id
    - admin_id
    - vital_id

    **External IDs**
    The following terms are used to reference IDs that identify resources systems external to AlayaCare:
    - external_id
    - external_client_id

    External IDs are required to be unique.
    No other assumptions are made regarding their format they are treated as strings.

    **Remarks**
    - All dates must be in ISO 8601 format.
    - Required fields marked with `*` cannot be null.

    **Progress Notes**
      API for creating and viewing client progress notes.

    **Risks**
    API for creating, viewing, updating, and removing client risks.

    **Medication**
      API for creating, editing, and viewing medications and medication administrations.

    **Vitals**
      API for creating, editing and viewing vitals.

    Each individual vital type is identified by a `name`. Dependent vitals are given the same `group`. Currently this is only used to link names `pressure_min` and `pressure_max` with the group `blood_pressure`, as these values should be recorded together.

    The metadata of the vitals includes the configuration and thresholds, the default and available units, and any other required options for each vital type.


host: homecare.alayacare.ca
basePath: /ext/api/v2/clinical
securityDefinitions:
  basic_auth:
    type: basic
    description: Basic HTTP auth over https
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /note_types:
    parameters:
      - name: filter
        description: Substring search on note types
        in: query
        type: string
    get:
      tags: [Note Types]
      summary: A list of progress note types
      responses:
        200:
          description: A list of progress notes types
          schema:
            $ref: '#/definitions/NoteTypesList'
        401:
          $ref: '#/responses/AuthChallenge'

  /progress_notes/{client_id}:
    parameters:
      - name: client_id
        description: AlayaCare ID of the client
        in: path
        type: string
        required: true

    get:
      tags: [Progress Notes]
      summary: Get a list of progress notes by a client's AlayaCare ID
      parameters:
      - name: note_type
        description: Filter on the note type category of the progress note
        in: query
        type: string
      - name: is_hidden
        description: Filter on hidden progress notes
        in: query
        type: boolean
      - name: created_at
        description: |
            Filter progress notes by creation date greater or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-03T08:00:00-05:00`
        type: string
        format: 'date-time'
        in: query
      - name: created_by
        description: Filter by the AlayaCare ID of the employee who created the progress note
        type: integer
        in: query
      - name: id
        description: Filter on the id of the progress note
        type: string
        format: uuid
        in: query
      - name: include_textonly
        description: Include notes content as simple text
        type: boolean
        in: query
      responses:
        200:
          description: A list of progress notes
          schema:
            $ref: '#/definitions/ProgressNotesList'
        401:
          $ref: '#/responses/AuthChallenge'

    post:
      summary: Create a progress note
      tags: [Progress Notes]
      description: |
        * A subset of HTML is accepted in the content. Supported HTML is based upon the following library: https://bleach.readthedocs.io/en/latest/ 
        * `is_hidden` is optional, if omitted the progress note will be created with is_hidden set to `false`.
      parameters:
      - name: body
        description: Client data in JSON format
        in: body
        required: true
        schema:
          $ref: '#/definitions/ProgressNoteCreate'
      responses:
        201:
          description: Progress note created successfully
          schema:
            $ref: '#/definitions/SuccessProgressNoteCreate'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/CreateNoteInvalidRequest'
        404:
          $ref: '#/responses/ClientNotFound'

  /progress_notes/by_id/{external_client_id}:
    parameters:
      - name: external_client_id
        description: External ID of the client
        in: path
        type: string
        required: true
    get:
      tags: [Progress Notes]
      summary: Get a list of progress notes by client's external ID
      parameters:
      - name: note_type
        description: Filter on the note type category of the progress note
        in: query
        type: string
      - name: is_hidden
        description: Filter on hidden progress notes
        in: query
        type: boolean
      - name: created_at
        description: |
            Filter progress notes by creation date greater or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-03T08:00:00-05:00`
        type: string
        format: 'date-time'
        in: query
      - name: created_by
        description: Filter by the AlayaCare ID of the employee who created the progress note
        type: integer
        in: query
      - name: id
        description: Filter on the guid of the progress note
        type: string
        format: uuid
        in: query
      - name: include_textonly
        description: Include notes content as simple text
        type: boolean
        in: query
      responses:
        200:
          description: A list of progress notes
          schema:
            $ref: '#/definitions/ProgressNotesList'
        401:
          $ref: '#/responses/AuthChallenge'

    post:
      summary: Create a progress note by external client ID
      tags: [Progress Notes]
      description: |
        * A subset of HTML is accepted in the content. Supported HTML is based upon the following library: https://bleach.readthedocs.io/en/latest/ 
        * `is_hidden` is optional, if omitted the progress note will be created with is_hidden set to `false`.
      parameters:
      - name: body
        description: Client data in JSON format
        in: body
        required: true
        schema:
          $ref: '#/definitions/ProgressNoteCreate'
      responses:
        201:
          description: Progress note created successfully
          schema:
            $ref: '#/definitions/SuccessProgressNoteCreate'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/CreateNoteInvalidRequest'
        404:
          $ref: '#/responses/ClientNotFound'

  /progress_note/{progress_note_id}:
    parameters:
      - name: progress_note_id
        description: ID of a progress note
        type: string
        format: uuid
        in: path
        required: true
    get:
      summary: Get a single progress note by ID
      tags: [Progress Notes]
      parameters:
      - name: include_textonly
        description: Include notes content as simple text
        type: boolean
        in: query
      responses:
        200:
          description: A single progress note
          schema:
            $ref: '#/definitions/ProgressNoteDetails'
        400:
          $ref: '#/responses/InvalidRequest'
        401:
          $ref: '#/responses/AuthChallenge'
        404:
          $ref: '#/responses/NotFound'

  /clients/{client_id}/risks:
    parameters:
      - name: client_id
        description: The AlayaCare ID of a client
        in: path
        type: integer
        required: true
    get:
      tags: [Client Risks]
      summary: Get a list of client risks by a client's AlayaCare ID
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      responses:
        200:
          description: A list of client risks
          schema:
            $ref: '#/definitions/RiskList'
        401:
          $ref: '#/responses/AuthChallenge'
        404:
          $ref: '#/responses/ClientNotFound'
    post:
      tags: [Client Risks]
      summary: Create a client risk
      parameters:
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/RiskCreate'
      description: |
      responses:
        201:
          description: A client risk
          schema:
            $ref: '#/definitions/RiskDetails'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/ClientRiskInvalidRequest'
        404:
          $ref: '#/responses/ClientNotFound'

  /clients/{client_id}/risks/{risk_id}:
    parameters:
      - name: client_id
        description: The AlayaCare ID of a client
        in: path
        type: integer
        required: true
      - name: risk_id
        description: ID of the client risk
        in: path
        required: true
        type: string

    put:
      tags: [Client Risks]
      summary: Update client risks by a client's AlayaCare ID
      parameters:
        - name: risk
          description: Client risk data for update in JSON format.
          in: body
          required: true
          schema:
            $ref: '#/definitions/RiskUpdate'
      responses:
        200:
          description: Client's risk updated successfuly
          schema:
            $ref: '#/definitions/RiskUpdate'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/ClientRiskInvalidRequest'

    delete:
      tags: [Client Risks]
      summary: Remove a client's risk by a client's AlayaCare ID
      responses:
        204:
          description: Risk successfully deleted
        401:
          $ref: '#/responses/AuthChallenge'
        404:
          $ref: '#/responses/ClientRiskNotFound'

  /clients/by_id/{external_client_id}/risks:
    parameters:
      - name: external_client_id
        description: The external ID of a client
        in: path
        type: string
        required: true
    get:
      tags: [Client Risks]
      summary: Get client risks by external client ID
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      responses:
        200:
          description: A list of a client's risks
          schema:
            $ref: '#/definitions/RiskList'
        401:
          $ref: '#/responses/AuthChallenge'
        404:
          $ref: '#/responses/ClientNotFound'

    post:
      tags: [Client Risks]
      summary: Create a client risk by external client ID
      parameters:
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/RiskCreate'
      description: |
      responses:
        201:
          description: A client risk
          schema:
            $ref: '#/definitions/RiskDetails'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/ClientRiskInvalidRequest'
        404:
          $ref: '#/responses/ClientNotFound'

  /clients/by_id/{external_client_id}/risks/{risk_id}:
    parameters:
    - name: external_client_id
      description: External ID of a client
      in: path
      type: integer
      required: true
    - name: risk_id
      description: ID of the client risk
      in: path
      required: true
      type: string
    put:
      tags: [Client Risks]
      summary: Update client risks by external client ID
      parameters:
        - name: risk
          description: Client risk data for update in JSON format.
          in: body
          required: true
          schema:
            $ref: '#/definitions/RiskUpdate'
      responses:
        200:
          description: Client's risk updated successfuly
          schema:
            $ref: '#/definitions/RiskUpdate'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/ClientRiskInvalidRequest'
        404:
          $ref: '#/responses/ClientNotFound'

    delete:
      tags: [Client Risks]
      summary: Remove a client's risk by external client ID
      responses:
        204:
          description: Risk successfully deleted
        401:
          $ref: '#/responses/AuthChallenge'
        404:
          $ref: '#/responses/ClientRiskNotFound'

  /medications:
    get:
      tags: [Medication]
      summary: Get a list of medications
      description: |
        The fields `count_administered_today` and `last_administered_at` will NOT be populated.
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - name: client_id
          description: The ID of a client.
          type: integer
          in: query
        - name: external_client_id
          description: The external ID of a client.
          type: string
          in: query
        - name: status
          description: The status of a medication.
          type: string
          in: query
        - name: with_last_administration
          description: The fields `count_administered_today` and `last_administered_at` will be populated.
          type: boolean
          in: query
      responses:
        200:
          description: A list of medications
          schema:
            $ref: '#/definitions/MedicationList'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
    post:
      tags: [Medication]
      summary: Create a medication
      parameters:
        - description: Medication data in JSON format
          name: medication
          in: body
          required: true
          schema:
            $ref: '#/definitions/MedicationCreate'
      responses:
        201:
          description: Medication created successfully
          schema:
            $ref: '#/definitions/CreateSuccess'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'

  /medications/{medication_id}:
    parameters:
    - description: Medication ID
      name: medication_id
      in: path
      required: true
      type: string
      format: uuid
    get:
      tags: [Medication]
      summary: Get details of a medication
      parameters:
      - description: The fields `count_administered_today` and `last_administered_at` will be populated.
        name: with_last_administration
        in: query
        type: boolean
      responses:
        200:
          description: Medication details
          schema:
            $ref: '#/definitions/Medication'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
        404:
          $ref: '#/responses/NotFound'
    put:
      tags: [Medication]
      summary: Update a medication
      parameters:
        - description: Medication data in JSON format
          name: medication
          in: body
          required: true
          schema:
            $ref: '#/definitions/MedicationUpdate'
      responses:
        200:
          description: Medication updated successfully
          schema:
            $ref: '#/definitions/CreateSuccess'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
        404:
          $ref: '#/responses/NotFound'
  /medications/{medication_id}/administrations:
    parameters:
    - description: Medication ID
      name: medication_id
      in: path
      required: true
      type: string
      format: uuid
    get:
      tags: [Medication Administration]
      summary: Get a list of medication administrations
      description: The fields that are populated on the when administering a medication depend on the medication `delivery_mode`.
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      responses:
        200:
          description: A list of medication administrations
          schema:
            $ref: '#/definitions/MedicationAdministrationList'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
        404:
          $ref: '#/responses/NotFound'
    post:
      tags: [Medication Administration]
      summary: Create a medication administration.
      parameters:
        - description: Medication administration data
          name: medication_administration
          in: body
          required: true
          schema:
            $ref: '#/definitions/MedicationAdministrationCreate'
      responses:
        201:
          description: Administration created successfully
          schema:
            type: object
            description: Success returned from the API when creating or updating an entity.
            properties:
              id:
                type: string
                description: The entity ID.
                example: '70ad613a-376c-4389-bb45-78374dddd03e'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'

  /medications/{medication_id}/administrations/{admin_id}:
    parameters:
    - description: Medication ID
      name: medication_id
      in: path
      required: true
      type: string
      format: uuid
    - description: Medication Administration ID
      name: admin_id
      in: path
      required: true
      type: string
      format: uuid
    get:
      tags: [Medication Administration]
      summary: Get details of a medication administration
      responses:
        200:
          description: Medication administration details
          schema:
            $ref: '#/definitions/MedicationAdministration'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
        404:
          $ref: '#/responses/NotFound'

  /vitals/client/{client_id}/metadata:
    parameters:
    - description: Client ID
      name: client_id
      in: path
      required: true
      type: integer
    get:
      tags: [Vital Metadata]
      summary: Get a list of the metadata for a client's vitals by the client's AlayaCare ID
      responses:
        200:
          description: Metadata details
          schema:
            $ref: '#/definitions/VitalMetadataList'
        401:
          $ref: '#/responses/AuthChallenge'
        404:
          $ref: '#/responses/NotFound'

  /vitals/client/by_id/{external_client_id}/metadata:
    parameters:
    - description: External client ID
      name: external_client_id
      in: path
      required: true
      type: string
    get:
      tags: [Vital Metadata]
      summary: Get a list of the metadata for a client's vitals by the client's external ID
      responses:
        200:
          description: Metadata details
          schema:
            $ref: '#/definitions/VitalMetadataList'
        401:
          $ref: '#/responses/AuthChallenge'
        404:
          $ref: '#/responses/NotFound'
  /vitals/client/{client_id}:
    parameters:
    - description: Client ID
      name: client_id
      in: path
      required: true
      type: integer
    get:
      tags: [Vitals]
      summary: Get a list of a client's vital recordings by the client's AlayaCare ID
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - name: group[]
          description: The group or comma-separated groups of the vitals.
          type: string
          in: query
        - name: name[]
          description: The name or comma-separated names of the vitals.
          type: string
          in: query
        - name: end_at
          description: The end date for the vital creation date range, using ISO 8601 date-time formatting.
          type: string
          in: query
        - name: start_at
          description: The start date for the vital creation date range, using ISO 8601 date-time formatting.
          type: string
          in: query
      responses:
        200:
          description: Client's vitals details
          schema:
            $ref: '#/definitions/VitalList'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
    post:
      tags: [Vitals]
      summary: Record a vital for a client using the client's AlayaCare ID
      parameters:
        - description: Vital data in JSON format
          name: vital
          in: body
          required: true
          schema:
            $ref: '#/definitions/VitalCreate'
      responses:
        201:
          description: Vital successfully created
          schema:
            $ref: '#/definitions/Vital'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'

  /vitals/client/by_id/{external_client_id}:
    parameters:
    - description: External client ID
      name: external_client_id
      in: path
      required: true
      type: string
    get:
      tags: [Vitals]
      summary: Get a list of a client's vital recordings by the client's external ID
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - name: group[]
          description: The group or comma-separated groups of the vitals.
          type: string
          in: query
        - name: name[]
          description: The name or comma-separated names of the vitals.
          type: string
          in: query
        - name: end_at
          description: The end date for the vital creation date range, using ISO 8601 date-time formatting.
          type: string
          in: query
        - name: start_at
          description: The start date for the vital creation date range, using ISO 8601 date-time formatting.
          type: string
          in: query
      responses:
        200:
          description: Client's vitals details
          schema:
            $ref: '#/definitions/VitalList'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
    post:
      tags: [Vitals]
      summary: Record a vital for a client using the client's external ID
      parameters:
        - description: Vital data
          name: vital
          in: body
          required: true
          schema:
            $ref: '#/definitions/VitalCreate'
      responses:
        201:
          description: Create successful.
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'

  /vitals/{vital_id}:
    parameters:
    - description: Vital ID
      name: vital_id
      in: path
      required: true
      type: string
      format: uuid
    get:
      tags: [Vitals]
      summary: Get details of a vital recording
      responses:
        200:
          description: A vital
          schema:
            $ref: '#/definitions/Vital'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
        404:
          $ref: '#/responses/NotFound'
    put:
      tags: [Vitals]
      summary: Update a vital recording
      parameters:
        - description: Medication data
          name: medication
          in: body
          required: true
          schema:
            $ref: '#/definitions/VitalCreate'
      responses:
        200:
          description: Update successful.
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'
        404:
          $ref: '#/responses/NotFound'

  /vitals/client/{client_id}/latest:
    parameters:
    - description: Client ID
      name: client_id
      in: path
      required: true
      type: integer
    get:
      tags: [Latest Vitals]
      summary: Get a list of the latest vital recordings by the client's AlayaCare ID
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      responses:
        200:
          description: A list of vitals
          schema:
            $ref: '#/definitions/VitalLatestList'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'

  /vitals/client/by_id/{external_client_id}/latest:
    parameters:
    - description: External client ID
      name: external_client_id
      in: path
      required: true
      type: string
    get:
      tags: [Latest Vitals]
      summary: Get a list of the latest vital recordings by the client's external ID
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      responses:
        200:
          description: A list of vitals
          schema:
            $ref: '#/definitions/VitalLatestList'
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'

  /vitals/configured:
    get:
      tags: [Configured Vitals]
      summary: Get a list of clients with vitals configured
      responses:
        200:
          description: A list of client IDs
          schema:
            type: object
            properties:
              configured:
                type: array
                items:
                  type: integer
                  description: AlayaCare client ID
                  example: 1234
        401:
          $ref: '#/responses/AuthChallenge'
        400:
          $ref: '#/responses/InvalidRequest'

  /interventions/client/{client_id}:
    parameters:
    - name: client_id
      in: path
      required: true
      type: integer
      description: AlayaCare client ID
    get:
      tags: [Care Plan Interventions]
      summary: Get a list of a client's care plan interventions using AlayaCare client ID
      description: |
        - `service_id` and `external_service_id` are mutually exclusive, specifying both is an invalid request.
      parameters:
      - $ref: '#/parameters/service_id'
      - $ref: '#/parameters/external_service_id'
      - name: status
        description: Filter by status of the intervention
        in: query
        type: string
        enum:
        - active
        - completed
        - archived
        required: false
      responses:
        200:
          description: A list of interventions for a client
          schema:
            $ref: '#/definitions/InterventionList'
        400:
          $ref: '#/responses/ErrorResponseAdlsInvalidRequest'
        401:
          $ref: '#/responses/AuthChallenge'
        403:
          $ref: '#/responses/ErrorResponseCareplanFeatureFlagState'
        404:
          $ref: '#/responses/ClientNotFound'

  /interventions/client/by_id/{external_client_id}:
    parameters:
    - name: external_client_id
      in: path
      required: true
      type: string
      description: External client ID
    get:
      tags: [Care Plan Interventions]
      summary: Get a list of a client's interventions using external client ID
      description: |
        - `service_id` and `external_service_id` are mutually exclusive, specifying both is an invalid request.
      parameters:
      - $ref: '#/parameters/service_id'
      - $ref: '#/parameters/external_service_id'
      - name: status
        description: Filter by status of the intervention
        in: query
        type: string
        enum:
        - active
        - completed
        - archived
        required: false
      responses:
        200:
          description: A list of interventions for a client
          schema:
            $ref: '#/definitions/InterventionList'
        400:
          $ref: '#/responses/ErrorResponseAdlsInvalidRequest'
        401:
          $ref: '#/responses/AuthChallenge'
        403:
          $ref: '#/responses/ErrorResponseCareplanFeatureFlagState'
        404:
          $ref: '#/responses/ClientNotFound'


responses:

  AuthChallenge:
    description: Authentication required.
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 401
        message: Please verify your access level for this url.

  NotFound:
    description: Not found.
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 404
        message: Progress note not found

  ClientNotFound:
    description: Not found.
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 404
        message: Client not found.

  InvalidRequest:
    description: Invalid data.
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 400
        message: Invalid request

  CreateNoteInvalidRequest:
    description: Invalid data submitted for creation
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
          code: 400,
          message: "Invalid note type"


  ClientRiskInvalidRequest:
    description: Invalid data submitted for client risk creation
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 400
        message: Invalid risk category

  ClientRiskNotFound:
    description: Client risk not found
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        code: 404
        message: Client risk uid not found

  ErrorResponseCareplanFeatureFlagState:
    description: Authorization required
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        {
          "code": 403,
          "message": "You do not have the required permissions to perform this action."
        }

  ErrorResponseAdlsInvalidRequest:
    description: Invalid request
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        {
          "code": 400,
          "message": "service_id and external_service_id are mutually exclusive"
        }


definitions:
  ErrorResponse:
    description: Error response
    type: object
    properties:
      code:
        type: integer
        description: Response code
      message:
        type: string
        description: Detailed error message
    required:
    - code
    - message

  PaginatedList:
    description: Base model of all paginated lists
    type: object
    properties:
      count:
        type: integer
        description: Number of items in the response
        example: 1
      page:
        type: integer
        description: Current page number
        example: 1
      total_pages:
        type: integer
        description: Total number of pages availbale
        example: 1
      items:
        type: array
        items:
          type: object
    required:
    - count
    - page
    - total_pages
    - items

  ProgressNotesList:
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: Paginated list of a client's progress notes
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/ProgressNote'

  ProgressNote:
    description: A progress note
    type: object
    properties:
      id:
        type: string
        description: uuid of the progress note
        format: uuid
        example: '5aea440b-7e10-4b5d-8b44-fda4efb2dc95'
      is_hidden:
        type: boolean
        default: false
      note_type:
        type: string
        description: Note type category of the progress note
        example: progress_nursing
      content:
        type: string
        format: html
        description: Content of the progress note. A subset of HTML is accepted.
        example: 'Client achieved 1 of 5 goals today when client walked up stairs unassissted.'
      created_at:
        type: string
        format: 'date-time'
        description: Date progress note was created (ISO 8601)
        example: '2017-07-08T13:30:00+00:00'
      created_by:
        type: integer
        description: AlayaCare ID of the employee who created the progress note.
        example: 1001
      textonly:
        type: string
        description: Content of the progress note as simple text (only if include_textonly is true)
        example: 'Client achieved 1 of 5 goals today when client walked up stairs unassissted.'

  ProgressNoteDetails:
    description: A progress note
    type: object
    properties:
      id:
        type: string
        description: uuid of the progress note
        example: '5aea440b-7e10-4b5d-8b44-fda4efb2dc95'
      is_hidden:
        type: boolean
        default: false
      note_type:
        type: string
        description: Note type category of the progress note
        example: progress_nursing
      content:
        type: string
        format: html
        description: Content of the progress note. A subset of HTML is accepted.
        example: 'Client achieved 1 of 5 goals today when client walked up stairs unassissted.'
      created_at:
        type: string
        format: 'date-time'
        description: Date progress note was created (ISO 8601)
        example: '2017-07-08T13:30:00+00:00'
      created_by:
        type: integer
        description: AlayaCare ID of the employee who created the progress note.
        example: 1001
      client_id:
        type: integer
        description: Alayacare ID of the client
        example: 1010
      external_client_id:
        type: string
        description: External ID of the client
        example: 'client_101'
      textonly:
        type: string
        description: Content of the progress note as simple text (only if include_textonly is true)
        example: 'Client achieved 1 of 5 goals today when client walked up stairs unassissted.'

  ProgressNoteCreate:
    description: Progress note data required for creation.
    type: object
    required:
      - note_type
      - content
    properties:
      is_hidden:
        type: boolean
        default: false
      note_type:
        type: string
        description: Note type category of the progress note
        example: progress_nursing
      content:
        type: string
        format: html
        description: Content of the progress note.  A subset of HTML is accepted.
        example: 'Client achieved 1 of 5 goals today when client walked up stairs unassissted.'

  NoteTypesList:
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: Paginated list of a client's progress notes
    properties:
      items:
        type: array
        items:
          properties:
            note_type:
              type: string
              description: Progress note type
              example: progress_nursing

  RiskList:
    description: A list of client risks
    type: object
    properties:
      count:
        type: integer
        description: Number of items in the response
        example: 1
      page:
        type: integer
        description: Current page number
        example: 1
      total_pages:
        type: integer
        description: Total number of pages available
        example: 1
      items:
        type: array
        items:
          $ref: '#/definitions/RiskDetails'

  RiskDetails:
    description: Details of the client risk
    type: object
    properties:
      risk_id:
        type: string
        description: Unique ID of the client risk
        example: "abc-123"
      client_id:
        type: integer
        description: AlayaCare ID of the client
        example:  1957
      external_client_id:
        type: string
        description: External client ID
        example: "sor_id_1"
      category:
        type: string
        description: Risk category (case-sensitive)
        example: "Allergy"
        enum:
          - Allergy
          - Environment
          - Infectious Diseases
          - Funder
          - General
          - Pets
      risk:
        type: string
        description: Free text description of the client risk
        example: Allergic to penicillin
      severity:
        $ref: '#/definitions/RiskSeverity'
      created_by:
        type: object
        description: User who created the client risk entry
        properties:
          name:
            type: string
            description: Name of the employee who created the risk
            example: John Smith
      created_at:
        type: string
        format: 'date-time'
        description: Date client risk was created (ISO 8601) - Time saved at `T00:00:00+00:00`
        example: '2017-07-08T00:00:00+00:00'

  RiskCategory:
    description: Risk category (case-sensitive)
    type: string
    example: "Allergy"
    enum:
    - Allergy
    - Environment
    - Infectious Diseases
    - Funder
    - General
    - Pets

  RiskSeverity:
    description: Risk severity - 0 to 5
    type: integer
    example: 3
    enum:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5

  RiskCreate:
    description: Client risk data
    type: object
    required:
      - category
      - risk
      - severity
    properties:
      category:
        $ref: '#/definitions/RiskCategory'
      risk:
        type: string
        description: Free text description of the client risk
        example: Allergic to penicillin
        minLength: 1
      severity:
        $ref: '#/definitions/RiskSeverity'

  RiskUpdate:
    description: Client risk data
    type: object
    properties:
      category:
        $ref: '#/definitions/RiskCategory'
      risk:
        type: string
        description: Free text description of the client risk
        example: Allergic to penicillin
      severity:
        $ref: '#/definitions/RiskSeverity'

  CreateSuccess:
    type: object
    description: Success returned from the API when creating or updating an entity.
    properties:
      id:
        type: string
        description: The entity ID.
        example: '70ad613a-376c-4389-bb45-78374dddd03e'
      type:
        type: string
        description: The clinical document type.
        example: 'medication'
      uri:
        type: string
        description: The entity URI.
        example: '/medication/70ad613a-376c-4389-bb45-78374dddd03e'

  SuccessProgressNoteCreate:
    type: object
    description: Progress note created successfully
    properties:
      id:
        type: string
        description: The entity ID.
        example: '70ad613a-376c-4389-bb45-78374dddd03e'
      type:
        type: string
        description: The clinical document type.
        example: 'progress_note'
      uri:
        type: string
        description: The entity URI.
        example: '/progress_note/70ad613a-376c-4389-bb45-78374dddd03e'

  AdministeredByNurse:
    type: string
    description: Whether the medication is administered by a nurse or whether it is self-administered.

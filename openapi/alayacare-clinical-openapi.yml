  MedicationAdministrationList:
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: Paginated list of the medication administration
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/MedicationAdministration'

  VitalName:
    type: string
    description: The name identifying the vital type.
    enum:
      - blood_glucose
      - bmi
      - height
      - pulse
      - pressure_min
      - pressure_max
      - weight
      - respiratory_rate
      - spo2
      - temperature
    example: 'pressure_max'

  VitalUnits:
    type: string
    description: The unit used to record the vital.
    enum:
    - c
    - f
    - kgs
    - lb
    - bpm
    - breaths_pm
    - mmhg
    - cm
    - in
    - mmol_l
    - mg_dl
    - kg_m2
    - '%'
    example: 'mmhg'

  VitalOptionPosition:
    type: string
    description: The position of the client when recording a vital like `blood_pressure` or `pulse`.
    enum:
    - lying
    - sitting
    - standing
    example: 'sitting'

  VitalOptionRoute:
    type: string
    description: The route that awas used when recording a vital like `temperature`.
    enum:
    - axillary
    - oral
    - rectal
    - tympanic
    example: 'oral'

  VitalMetadataOptions:
    type: object
    description: The metadata options available for the vital.
    required:
    - units
    properties:
      type:
        type: string
        description: The options type.
        example: 'object'
      properties:
        type: object
        properties:
          position:
            type: object
            properties:
              enum:
                type: array
                description: The list of available options for the position.
                items:
                  type: string
                  example: ['lying', 'sitting', 'standing']
              type:
                type: string
                description: The `enum` options type.
                example: 'string'
          route:
            type: object
            properties:
              enum:
                type: array
                description: The list of available options for the route.
                items:
                  type: string
                  example: ['axillary', 'oral', 'rectal', 'tympanic']
              type:
                type: string
                description: The `enum` options type.
                example: 'string'
      units:
        type: array
        description: A list of units available for the vital.
        items:
          type: object
          properties:
            label:
              type: string
              description: The unit label.
              example: 'mmHg'
            value:
              type: string
              description: The unit code.
              example: 'mmhg'

  VitalMetadata:
    type: object
    description: Vital metadata
    required:
    - active
    - label
    - groups
    - max
    - min
    - name
    - options
    - unit
    properties:
      active:
        type: boolean
        description: Whether the vital is active.
        example: true
      groups:
        type: array
        description: The groups to which the vital belongs. If no groups are set, this will be set to `name`.
        items:
          type:  string
          example: 'blood_pressure'
      label:
        type: string
        description: The vital label.
        example: 'Systolic Blood pressure'
      max:
        type: number
        description: The maximum threshold for the vital.
        example: 120
      min:
        type: number
        description: The minimum threshold for the vital.
        example: 60
      name:
        $ref: '#/definitions/VitalName'
      options:
        $ref: '#/definitions/VitalMetadataOptions'
      unit:
        type: string
        description: The default unit used for the vital.
        example: 'mmhg'

  VitalMetadataList:
    type: object
    description: A list of vital metadata
    required:
    - metadata
    properties:
      metadata:
        type: array
        items:
          $ref: '#/definitions/VitalMetadata'

  VitalOptions:
    type: object
    x-nullable: true
    description: Additional options required for some vital types.
    properties:
      position:
        $ref: '#/definitions/VitalOptionPosition'
      route:
        $ref: '#/definitions/VitalOptionRoute'

  VitalCreate:
    type: object
    description: Vital details
    required:
    - client_id
    - external_client_id
    - name
    - value
    - unit
    properties:
      client_id:
        type: integer
        description: The client ID.
        example: 1234
      external_client_id:
        type: string
        description: The external client ID.
        example: client_1234
      comments:
        x-nullable: true
        type: string
        description: A comment.
        example: 'No unexpected results'
      group:
        x-nullable: true
        type: string
        description: The vital group. This is used to group together separate vitals that are measured together like low and high blood pressure. If no group, this should be set to `name`.
        example: 'blood_pressure'
      name:
        $ref: '#/definitions/VitalName'
      options:
        $ref: '#/definitions/VitalOptions'
      session_guid:
        type: string
        description: A unique identifier to group vitals recorded together within the same `group`.
        example: '97a3e055-2fd1-469d-a058-b173499e37ff'
      source:
        type: string
        description: A description of how the vital was recorded. This may be set if the client recorded the vital themselves.
        example: 'default'
      unit:
        $ref: '#/definitions/VitalUnits'
      user_guid:
        x-nullable: true
        type: integer
        description: The `guid` of the user that created the vital. This will generally be the `guid` of the employee, unless the `source` or `user_type` indicate otherwise.
        example: 234
      user_type:
        type: string
        description: The type of user that created the vital. Generally this will not be set unless thesomeone other than an employee created the vital.
        x-nullable: true
        example: null
      value:
        type: number
        description: The value of the recorded vital.
        example: 38.4

  Vital:
    allOf:
    - $ref: '#/definitions/VitalCreate'
    type: object
    description: Vital details
    required:
    - client_id
    - id
    - name
    - date
    - value
    - unit
    properties:
      date:
        type: string
        description: The created date using ISO 8601 date-time formatting.
        example: '2018-01-01T00:30:00+00:00'
      id:
        type: string
        description: The vital ID.
        example: 'adedb729-54fa-473e-b929-9c71ef5c248e'

  VitalList:
    type: object
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: A list of vitals
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/Vital'

  VitalLatest:
    type: object
    description: Latest vital details
    required:
    - name
    - group
    - date
    - value
    - unit
    properties:
      comments:
        type: string
        description: A comment.
        example: 'No unexpected results'
      date:
        type: string
        description: The created date using ISO 8601 date-time formatting.
        example: '2018-01-01T00:30:00+00:00'
      group:
        type: string
        description: The vital group. This is used to group together separate vitals that are measured together like low and high blood pressure. If no group, this should default to `name`.
        example: 'blood_pressure'
      name:
        $ref: '#/definitions/VitalName'
      session_guid:
        type: string
        description: A unique identifier to group vitals recorded together within the same `group`.
        example: '97a3e055-2fd1-469d-a058-b173499e37ff'
      source:
        type: string
        description: A description of how the vital was recorded. This may be set if the client recorded the vital themselves.
        example: 'default'
      threshold_level:
        type: string
        description: The level of threshold that was reached. This will be `null` if no threshold was reached.
        enum:
        - low
        - medium
        - high
        example: 'high'
      threshold_reached:
        type: string
        description: The threshold that was reached.
        enum:
        - min
        - max
        example: 'max'
      unit:
        $ref: '#/definitions/VitalUnits'
      value:
        type: number
        description: The value of the recorded vital.
        example: 38.4

  VitalLatestList:
    type: object
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: A list of the latest vital for each type.
    properties:
      items:
        type: object
        description: The vital details for each vital type.
        properties:
          presure_max:
            $ref: '#/definitions/VitalLatest'

  #Interventions models

  InterventionService:
    description: Intervention service
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare service ID
        example: 1
      external_id:
        type: string
        description: External service ID
        example: sor_service_external_id_1
        x-nullable: true

  Intervention:
    type: object
    description: Care plan intervention
    properties:
      name:
        type: string
        description: Intervention name
        example: brush teeth
      description:
        type: string
        description: Intervention description
        example: brush teeth
      status:
        type: string
        description: Status of the intervention
        enum:
        - draft
        - active
        - completed
        - archived
      type:
        type: string
        description: One of the types defined in the setting "Care Documentation > Care Plan Intervention Types"
        example: Nursing
      start_date:
        type: string
        description: Intervention start date
        example: '2018-01-01'
      end_date:
        type: string
        description: Intervention end date
        example: '2018-01-01'
      services:
        type: array
        items:
          $ref: '#/definitions/InterventionService'

  InterventionList:
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: Paginated list of interventions
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/Intervention'


parameters:
  count:
    name: count
    default: 100
    in: query
    required: false
    type: integer
    description: Number of items per page. If not specified will default to 100.
  page:
    name: page
    default: 1
    in: query
    required: false
    type: integer
    description: Filter by page number. If not specified will default to 1.
  service_id:
    name: service_id
    in: query
    required: false
    type: integer
    description: Filter by alayacare service ID
  external_service_id:
    name: external_service_id
    in: query
    required: false
    type: string
    description: Filter by external service ID
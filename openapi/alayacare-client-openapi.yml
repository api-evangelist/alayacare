openapi: 3.0.0
info:
  title: Patients - Clients
  version: 1.0.18-oas3
  description: |
    **AlayaCare IDs:**
    The following terms are used to reference IDs that identify resources in AlayaCare:
    - client_id
    - status_id
    - contact_id

    **External IDs**
    The following terms are used to reference IDs that identify resources systems external to AlayaCare:
    - external_client_id
    - external_contact_id

    External IDs are required to be unique.
    No other assumptions are made regarding their format they are treated as strings.
    External IDs are unique to a single profile_id.

    **Profile IDs**
    The following term is used to describe a profile resource in AlayaCare:
    - profile_id

    Profile IDs can be shared across clients, contacts, and employees in the
    case that an entity shares one or more of those roles.

    **Client Status Considerations**
    - Clients can have multiple status configured depending on their business needs. Rules for configuring client status follow the internal AlayaCare application logic.
    - Updating the `status` of a client will have repercussions in the AlayaCare application.

    Please refer to this link for more information: https://alayacare.zendesk.com/hc/en-us/articles/360015538392
  contact:
    name: AlayaCare
servers:
  - url: '{server}/ext/api/v2/patients'
    variables:
      server:
        default: https://demo3.alayacare.ca
tags:
  - name: Branches
    description: Branch related endpoints.
  - name: Groups
    description: Client group related endpoints.
  - name: Profile
    description: Profile attribute related endpoints.
  - name: Clients
    description: Client related endpoints.
  - name: Client Status
    description: Client status related endpoints.
  - name: Client Contacts
    description: Client contact related endpoints.
  - name: Service Status
    description: Service status related endpoints.
  - name: Care Provider Notes
    description: Care provider note related endpoints.
paths:
  /branches:
    get:
      tags:
        - Branches
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/count'
      summary: Get a list of branches
      operationId: listBranches
      description: Returns a paginated list of branches.
      responses:
        '200':
          description: A list of branches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
  /groups:
    get:
      tags:
        - Groups
      summary: Get a list of client groups
      operationId: listGroups
      description: Returns a paginated list of client groups.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/branch_id'
      responses:
        '200':
          description: A list of groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupsList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
  /profile/client:
    get:
      tags:
        - Profile
      summary: Get a list of client profile attributes
      operationId: listClientProfileAttributes
      description: Returns a paginated list of client profile attributes.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/filter_partial_search'
      responses:
        '200':
          description: A list of profile attributes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileAttributeList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
  /profile/client_contact:
    get:
      tags:
        - Profile
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/filter_partial_search'
      summary: Get a list of client contact profile attributes
      operationId: listClientContactProfileAttributes
      description: Returns a paginated list of client contact profile attributes.
      responses:
        '200':
          description: A list of profile attributes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileAttributeList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
  /clients:
    get:
      tags:
        - Clients
      summary: List clients
      operationId: listClients
      description: Returns a paginated list of clients, optionally filtered.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/count'
        - $ref: '#/components/parameters/branch'
        - name: filter
          in: query
          description: |
            Substring search on client profile attributes. Mulitiple filter parameters can be used at once to apply all filtering criteria.
            example: ?filter=smith&filter=123-456-6789
          schema:
            type: string
        - $ref: '#/components/parameters/status'
        - name: group
          in: query
          description: Filter by group ID, one or more using **OR**. Default format is comma-separated (`?group=1,2`). Repeated params (`?group=1&group=2`) are also accepted.
          style: form
          explode: false
          schema:
            type: array
            items:
              type: integer
        - name: ac_id
          in: query
          description: Filter by AlayaCare ID (ID starting with ACxxxxxxxx). Accepts one value per request.
          schema:
            type: string
      responses:
        '200':
          description: A list of clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
    post:
      tags:
        - Clients
      summary: Create client
      operationId: createClient
      description: |
        - Client created with status: **pending**
        - If no branch is specified client will be created in the current user branch
        - Only one of `profile_id` or a `demographics` object can be specified
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
        description: Client data in JSON format
        required: true
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponseClientCreate'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                response:
                  value:
                    code: 400
                    message: Field first_name is required in demographics.
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                response:
                  value:
                    code: 409
                    message: 'Client already exists with external ID: sor_client_external_id_1'
  /clients/{client_id}:
    parameters:
      - name: client_id
        description: AlayaCare ID of the client
        in: path
        required: true
        schema:
          type: integer
    get:
      tags:
        - Clients
      summary: Get client details using its AlayaCare Client ID
      operationId: detailClient
      description: Returns client details for a single client by AlayaCare client ID.
      parameters:
        - name: exclude_user_deactivated_groups
          in: query
          description: |
            Flag that filters the result indicating if the deactivated user groups must be excluded from the result.
            example: ?exclude_user_deactivated_groups=true
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDetails'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
    put:
      tags:
        - Clients
      summary: Update client details using its AlayaCare Client ID
      operationId: updateClient
      description: |
        * Changing the `status` of a client is not supported by this endpoint. Any `status` sent will be ignored.
      requestBody:
        $ref: '#/components/requestBodies/ClientUpdate'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponseClientUpdate'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                response:
                  value:
                    code: 409
                    message: 'Client already exists with external ID: sor_client_external_id_1'
  /clients/by_id/{external_client_id}:
    parameters:
      - name: external_client_id
        description: External ID of the client to retrieve
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Clients
      summary: Get client details using External Client ID
      operationId: detailClientByExt
      description: Returns client details for a single client by external client ID.
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDetails'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          $ref: '#/components/responses/ErrorResponseMultipleClientsFound'
    put:
      tags:
        - Clients
      summary: Update client details using External Client ID
      operationId: updateClientByExt
      description: |
        * Changing the `status` of a client is not supported by this endpoint. Any `status` sent will be ignored.
      requestBody:
        $ref: '#/components/requestBodies/ClientUpdate'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponseClientUpdate'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          description: |
            Conflict. Possible causes:
              1. the external ID given in the body is already used by another client;
              2. multiple clients share the external ID given in the path and they should be merged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                response:
                  value:
                    code: 409
                    message: 'Client already exists with external ID: sor_client_external_id_1'
  /clients/{client_id}/contacts:
    parameters:
      - name: client_id
        description: AlayaCare ID of the client
        in: path
        required: true
        schema:
          type: integer
      - name: is_billing
        description: Filter by billing contact flag
        in: query
        schema:
          type: boolean
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/count'
      - $ref: '#/components/parameters/filter_profile_attributes'
    get:
      tags:
        - Clients
      summary: Get list of client contacts using AlayaCare Client ID
      operationId: listClientContacts
      description: Returns a paginated list of contacts for a client by AlayaCare client ID.
      responses:
        '200':
          description: Client contact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
  /clients/by_id/{external_client_id}/contacts:
    parameters:
      - name: external_client_id
        description: AlayaCare external ID of the client
        in: path
        required: true
        schema:
          type: string
      - name: is_billing
        description: Filter by billing contact flag
        in: query
        schema:
          type: boolean
      - $ref: '#/components/parameters/page'
      - $ref: '#/components/parameters/count'
      - $ref: '#/components/parameters/filter_profile_attributes'
    get:
      tags:
        - Clients
      summary: Get list of client contacts using AlayaCare Client external ID
      operationId: listClientContactsByExt
      description: Returns a paginated list of contacts for a client by external client ID.
      responses:
        '200':
          description: Client contact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          $ref: '#/components/responses/ErrorResponseMultipleClientsFound'
  /clients/{client_id}/blocked_employees:
    parameters:
      - name: client_id
        description: AlayaCare ID of the client
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Clients
      summary: Get list of employees blocked by this client or blocking this client
      operationId: listClientBlockedEmployees
      description: Returns employees blocked by or blocking the client (by AlayaCare client ID).
      responses:
        '200':
          description: List of blocked employees.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedEmployeeList'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
  /clients/by_id/{external_client_id}/blocked_employees:
    parameters:
      - name: external_client_id
        description: AlayaCare external ID of the client
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Clients
      summary: Get list of employees blocked by this client or blocking this client using external client id
      operationId: listClientBlockedEmployeesByExt
      description: Returns employees blocked by or blocking the client (by external client ID).
      responses:
        '200':
          description: List of blocked employees.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedEmployeeList'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          $ref: '#/components/responses/ErrorResponseMultipleClientsFound'
  /clients/{client_id}/picture:
    parameters:
      - name: client_id
        description: AlayaCare ID of the client
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Clients
      summary: Get client profile picture pre-authorized URL
      operationId: getClientPicture
      description: Returns a pre-authorized URL for the client profile picture (by AlayaCare client ID).
      responses:
        '200':
          description: Profile picture URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePictureUrl'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
  /clients/by_id/{external_client_id}/picture:
    parameters:
      - name: external_client_id
        description: External ID of the client
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Clients
      summary: Get client profile picture pre-authorized URL using external client id
      operationId: getClientPictureByExt
      description: Returns a pre-authorized URL for the client profile picture (by external client ID).
      responses:
        '200':
          description: Profile picture URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePictureUrl'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          $ref: '#/components/responses/ErrorResponseMultipleClientsFound'
  /clients/tags:
    get:
      tags:
        - Clients
      summary: Get all available tags for clients
      operationId: listClientTags
      description: Returns all available tags for clients.
      responses:
        '200':
          description: A list of available tags for patients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTagList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
    post:
      tags:
        - Clients
      summary: Create a client tag
      operationId: createClientTag
      description: Creates a new client tag.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: |
                    Name of tag to create.
                    This can only contain letters, digits and spaces
                  example: Tag
              required:
                - name
        required: true
      responses:
        '204':
          description: Successfully created client tag
        '400':
          $ref: '#/components/responses/ErrorResponseClientTagValidationError'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '409':
          $ref: '#/components/responses/ErrorResponseClientTagAlreadyExists'
  /clients/tags/rename:
    post:
      tags:
        - Clients
      summary: Rename an existing client tag
      operationId: renameClientTag
      description: Renames an existing client tag.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                old_name:
                  type: string
                  description: |
                    Name of the existing tag to update.
                  example: Old Tag
                new_name:
                  type: string
                  description: |
                    New name of the tag.
                    This can only contain letters, digits and spaces
                  example: New Tag
              required:
                - old_name
                - new_name
        required: true
      responses:
        '204':
          description: Successfully renamed client tag
        '400':
          $ref: '#/components/responses/ErrorResponseClientTagValidationError'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientTagNotFound'
        '409':
          $ref: '#/components/responses/ErrorResponseClientTagAlreadyExists'
  /clients/{client_id}/tags:
    parameters:
      - name: client_id
        description: AlayaCare client ID
        in: path
        required: true
        schema:
          type: string
    post:
      tags:
        - Clients
      summary: Add tags to a Client using its AlayaCare Client ID
      operationId: addTagsToClient
      description: Tags sent in the payload will overwrite existing tags on the Client
      requestBody:
        $ref: '#/components/requestBodies/ClientTagCreate'
      responses:
        '201':
          description: Client tags succesfully added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/ErrorResponseClientTagInvalidRequest'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
    put:
      tags:
        - Clients
      summary: Update tags of a Client using its AlayaCare Client ID
      operationId: updateClientTags
      description: Tags sent in the payload will be added to existing tags on the Client
      requestBody:
        $ref: '#/components/requestBodies/ClientTagCreate'
      responses:
        '200':
          description: Client tags successfuly updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/ErrorResponseClientTagInvalidRequest'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
  /clients/by_id/{external_client_id}/tags:
    parameters:
      - name: external_client_id
        description: External Client ID
        in: path
        required: true
        schema:
          type: string
    post:
      tags:
        - Clients
      summary: Add tags to a Client using External Client ID
      operationId: addTagsToClientByExt
      description: Tags sent in the payload will overwrite existing tags on the Client
      requestBody:
        $ref: '#/components/requestBodies/ClientTagCreate'
      responses:
        '201':
          description: Client tags succesfully added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/ErrorResponseClientTagInvalidRequest'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          $ref: '#/components/responses/ErrorResponseMultipleClientsFound'
    put:
      tags:
        - Clients
      summary: Update tags of a Client using External Client ID
      operationId: updateClientTagsByExt
      description: Tags sent in the payload will be added to existing tags on the Client
      requestBody:
        $ref: '#/components/requestBodies/ClientTagCreate'
      responses:
        '200':
          description: Client tags successfuly updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          $ref: '#/components/responses/ErrorResponseClientTagInvalidRequest'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          $ref: '#/components/responses/ErrorResponseMultipleClientsFound'
  /clients/{client_id}/status:
    parameters:
      - name: client_id
        description: AlayaCare ID of the client
        in: path
        required: true
        schema:
          type: integer
    get:
      tags:
        - Client Status
      summary: Get client status details using its AlayaCare Client ID
      operationId: listClientStatuses
      description: Returns a paginated list of client status records for a client by AlayaCare client ID.
      parameters:
        - name: status
          description: Filter by a single client status.
          in: query
          schema:
            type: string
            enum:
              - active
              - pending
              - on_hold
              - waiting_list
              - discharged
        - name: effective_date
          description: |
            Filter for client status that are effective on a date greater or equal than specified value.
            Expected format is ISO 8601.
            Ex: `2018-02-03T08:00:00-05:00`
          in: query
          schema:
            type: string
            format: date-time
        - name: filter
          in: query
          description: Substring search on client status `note` and reason `name`
          schema:
            type: string
      responses:
        '200':
          description: List of client status details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientStatusList'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
    post:
      tags:
        - Client Status
      summary: Create a client status using its AlayaCare Client ID
      operationId: createClientStatus
      description: |
        * `reason_id` can only be set and is mandatory for `on_hold` and `discharged` status. See resource `status_reasons` in `accounting-api-external` for a list of available client status reasons
        * `end_date` can only be set for `on_hold` status
        * Specific rules for configuring client status follow the internal AlayaCare application logic
      requestBody:
        $ref: '#/components/requestBodies/ClientStatusCreate'
      responses:
        '200':
          description: Client status created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientStatusCreated'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                response:
                  value:
                    code: 400
                    message: Field 'status' is required
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientNotFound'
        '409':
          description: Conflict
          content:
            application/json:
              examples:
                response:
                  value:
                    code: 409
                    message: 'Branch conflict: Reason cannot be assigned to the client'
  /clients/{client_id}/status/{status_id}:
    parameters:
      - name: client_id
        description: AlayaCare ID of the client
        in: path
        required: true
        schema:
          type: integer
      - name: status_id
        description: AlayaCare ID of the status
        in: path
        required: true
        schema:
          type: integer
    get:
      tags:
        - Client Status
      summary: Get a client status details using its AlayaCare Client and Status ID
      operationId: detailClientStatus
      description: Returns details for a client status by AlayaCare client ID and status ID.
      responses:
        '200':
          description: Client status details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientStatusDetails'
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientStatusNotFound'
    put:
      tags:
        - Client Status
      summary: Update a client status using its AlayaCare Client and Status ID
      operationId: updateClientStatus
      description: |
        * `end_date` can only be edited for `on_hold` and `pending` status
        * `effective_date` can only be edited for `on_hold`, `discharged` and `pending` status
        * `reason_id` can only be edited and is mandatory for `on_hold` and `discharged` status. See resource `status_reasons` in `accounting-api-external` for a list of available client status reasons
        * Specific rules for configuring client status follow the internal AlayaCare application logic
      requestBody:
        $ref: '#/components/requestBodies/ClientStatusUpdate'
      responses:
        '200':
          description: Client status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientStatusCreated'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                response:
                  value:
                    code: 400
                    message: Field 'reason_id' is invalid
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/components/responses/ErrorResponseClientStatusNotFound'
    delete:
      tags:
        - Client Status
      summary: Remove a client status using its AlayaCare Client and Status ID
      operationId: deleteClientStatus
      description: |
        * Only `on_hold`, `waiting_list` and `discharged` status can be deleted
      responses:
        '204':
          description: Client status successfully deleted
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                response:
                  value:
                    code: 400
                    message: Status cannot be deleted
        '401':
          $ref: '#/components/responses/ErrorResponseAuthentication'

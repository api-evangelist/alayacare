components:
  parameters:
    page:
      description: Filter by page number.
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
    count:
      description: Number of items per page.
      name: count
      in: query
      required: false
      schema:
        type: integer
        default: 100
    branch:
      description: Filter by branch id.
      name: branch
      in: query
      required: false
      schema:
        type: integer
    branch_id:
      description: Filter by branch id.
      name: branch_id
      in: query
      required: false
      schema:
        type: integer
    status:
      description: Filter by client status, one or more using OR. Default format is comma-separated (`?status=active,pending`). Repeated params (`?status=active&status=pending`) are also accepted.
      name: status
      in: query
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          enum:
            - active
            - pending
            - on_hold
            - waiting_list
            - discharged
    ttl:
      description: 'Pre-authorized URL time to live in seconds. `(default: 86400)`'
      name: ttl
      in: query
      required: false
      schema:
        type: integer
    filter_partial_search:
      name: filter_partial_search
      description: |
        Substring search on profile tag and description values.
        Ex: `name`
      in: query
      required: false
      schema:
        type: string
    filter_profile_attributes:
      name: filter
      in: query
      description: |
        Substring search on profile attributes values.

        Example profile attributes:
        + `first_name`: string
        + `last_name`: string
        + `city`: string
        + `title`: string
        + `state`: string
        + `gender`: string
        + `relationship`: string
        + `contact_type`: string

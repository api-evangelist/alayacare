                code: '404'
                message: Funder not found
    ErrorResponseMutuallyExclusive:
      description: Mutually exclusive
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            response:
              value:
                code: 400
                message: funder_id and alayacare_funder_id are mutually exclusive
    ErrorVisitNotFound:
      description: The visit referenced by visit_id was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            response:
              value:
                code: '404'
                message: Visit not found
    ErrorResponseVisitPremiumConflict:

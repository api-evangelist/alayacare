    InboxReferralDetailResponse:
      description: |
        API response for the complete representation of an assigned referral on the inbox API.
        This schema is similar to the `InboxAnonReferral` except that it includes the complete
        representation of the referral instead of the anonymous representation.
      type: object
      properties:
        referral:
          title: "InboxReferralDetailReferralResponse"
          allOf:
            - $ref: '#/components/schemas/ReferralReasonCodeCore'
            - type: object
              properties:
                id:
                  type: string
                  format: uuid
                sequence_id:
                  type: string
                  format: uuid
                offer_id:
                  type: string
                  format: uuid
                shift_id:
                  type: string
                  format: uuid
                care_type:
                  $ref: '#/components/schemas/CareTypeCore'
                referral_type:
                  $ref: '#/components/schemas/ReferralTypeCore'
                start_at:
                  type: string
                  format: date-time
                end_at:
                  type: string
                  format: date-time
                comment:
                  type: string
                cancellation_comment:
                  type: string
                  maxLength: 1000
                status:
                  $ref: '#/components/schemas/ReferralStatusCore'
                created_at:
                  type: string
                  format: date-time
                updated_at:
                  type: string
                  format: date-time
              required:
                - id
                # sequence_id was made optional as a simple way for AC Cloud api.intake to
                # process referrals. But sequence_id must be required in all referral
                # responses from AlayaMarket. The OpenAPI spec should be updated to reflect
                # this requirement as soon as possible to reduce confusion.
                # - sequence_id
                - care_type
                - referral_type
                - start_at
                - status
                - created_at
        demand:
          # better to call sender (CCAC)? or demand_persona?
          $ref: '#/components/schemas/OrganizationLeanCore'
        alayacare:
          $ref: '#/components/schemas/InboxReferralAlayaCareResponse'
        case_manager:
          $ref: '#/components/schemas/CaseManagerCore'
        price:
          $ref: '#/components/schemas/PriceCore'
        client:
          $ref: '#/components/schemas/InboxClientResponse'
        service:
          title: InboxReferralDetailServiceResponse
          type: object
          properties:
            id:
              type: string
              format: uuid
            use_client_address:
              type: boolean
            address:
              $ref: '#/components/schemas/AddressCore'
            name:

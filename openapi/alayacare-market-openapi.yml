openapi: "3.0.1"
info:
  title:
    Fn::Sub: "${OfferApiName}"
  version: "1.0"
servers:
- url: https://api.{env}.alayamarket.{region}/offers
  variables:
    env:
      description: The server environment.
      enum:
        - staging
        - sandbox
        - prod
      default: prod
    region:
      description: The server top-level domain indicating the region.
      enum:
        - ca
        - com
        - com.au
      default: ca
paths:
  /v1/status/healthz:
    get:
      tags:
        - offer status
      responses:
        200:
          description: Current healthz status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusHealthzResponse'
      # This endpoint does not require authentication
      security:
        - NONE: [ ]
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/outbox/bundle/offers:
    post:
      tags:
        - offer outbox bundle
      description: |
        # Authorization
        Required role: `org_admin`

        # Description
        Create a Bundle Offer by the Demand organization.
        This will generate multiple offers with type: `service` linked with a common
        `bundle_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboxBundleOfferCreateRequest'
      responses:
        201:
          description: "Successfully created offer bundle."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxBundleOfferCreateResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"
  /v1/outbox/shift/offers:
    post:
      tags:
        - offer outbox bundle
      description: |
        # Authorization
        Required role: `org_admin`

        # Description
        Create a Shift Offer by the Demand organization. 
        This will generate multiple offers with type: `visit` linked with a common `shift_id`. 
        Multiple open or assigned offers with offer_type: `visit` are not permitted for the same visit. This is to prevent conflicting acceptances and assignations.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboxShiftOfferCreateRequest'
      responses:
        201:
          description: "Successfully created Offer"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxShiftOfferCreateResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/outbox/offers:
    post:
      tags:
        - offer outbox
      description: |
        # Authorization
        Required role: `org_admin`

        # Description
        Create an Offer by the Demand organization.  
        Multiple open or assigned offers with offer_type: `visit` are not permitted for the same visit. This is to prevent conflicting acceptances and assignations.

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboxOfferCreateRequest'
      responses:
        201:
          description: "Successfully created Offer"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxOfferDetailResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"
    get:
      # missing query parameters for offer_type, care_type, etc.
      tags:
        - offer outbox
      description: |
        # Authorization
        Required role: `org_admin`

        # Description
        Get a collection of Offers created by the Demand organization.
      parameters:
        - in: query
          name: care_type
          schema:
            $ref: '#/components/schemas/CareTypeCore'
        - in: query
          name: offer_type
          schema:
            $ref: '#/components/schemas/OfferTypeCore'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OfferStatusCore'
        - in: query
          name: client_outbox_id
          schema:
            type: string
        - in: query
          name: visit_outbox_id
          schema:
            type: string
        - in: query
          name: is_accepted
          schema:
            type: boolean
            description: Offers accepted by at least one match.
        - in: query
          name: expires_after
          schema:
            type: string
            format: date-time
            description: Offers that expire after this date-time.
        - in: query
          name: expires_before
          schema:
            type: string
            format: date-time
            description: Offers that expire before this date-time.
        - $ref: '#/components/parameters/ShiftIdQueryParam'
        - in: query
          name: demand_label
          schema:
            type: string
            description: Offers associated with any given label set by the demand
              organization.
        - $ref: '#/components/parameters/PageNumberParam'
        - $ref: '#/components/parameters/ItemsPerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        200:
          description: 'Successfully returned Offer Outbox Collection'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxOfferPageResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/outbox/offers/{offer_id}:
    parameters:
      - $ref: '#/components/parameters/OfferIdPathParam'
    get:
      tags:
        - offer outbox
      description: |
        # Authorization

        Required role: `org_admin`

        # Description
        Get the details of an Offer created by the Demand organization.
      responses:
        200:
          description: 'Successfully returned Offer Outbox Scalar'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxOfferDetailResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/outbox/offers/{offer_id}/matches:
    parameters:
    - $ref: '#/components/parameters/OfferIdPathParam'
    get:
      tags:
        - offer outbox
      description: |
        # Authorization

        Required role: `org_admin`

        # Description
        Get the Offer Matches of an Offer created by the Demand organization.
      parameters:
        - in: query
          name: response
          schema:
            $ref: '#/components/schemas/OfferMatchResponseCore'
          description: |
            Response of an Offer Match to filter on. <br>
            Multiple values are supported (in an `OR` fashion). <br>
        - in: query
          name: sequence_id
          schema:
            type: string
            format: uuid
          description: |
            Sequence ID of the Offer Match to filter on.
            Multiple values are supported (in an `OR` fashion).
        - $ref: '#/components/parameters/PageNumberParam'
        - $ref: '#/components/parameters/ItemsPerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        200:
          description: 'Successfully returned Offer Matches.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxOfferMatchPageResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/outbox/offers/{offer_id}/close:
    parameters:
      - $ref: '#/components/parameters/OfferIdPathParam'
    post:
      tags:
        - offer outbox
      description: |
        # Authorization
        Required role: `org_admin`

        Required offer state: `sent`


        # Description
        Close an Offer created by the Demand organization that has not yet been assigned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboxOfferCloseRequest'
      responses:
        204:
          description: "Successfully marked Offer as Cancelled"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/outbox/offers/{offer_id}/assign:
    parameters:
      - $ref: '#/components/parameters/OfferIdPathParam'
    post:
      tags:
        - offer outbox
      description: |
        # Authorization
        Required role: `org_admin`.

        Required offer state: `accepted`.

        # Description
        Assign an Offer created by the Demand Organization to a
        Supply Organization that accepted the Offer.  
        The offer assignment setting of the Demand organization must be set to `manual`, otherwise this action is forbidden.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboxOfferAssignRequest'
      responses:
        204:
          description: "Successfully marked Offer as Assigned."
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/inbox/offers:
    get:
      tags:
        - offer inbox
      description: |
        # Authorization
        Required role: `org_admin`

        # Description
        Get a collection of Offers matched to the Supply Organization.
      parameters:
        - in: query
          name: status
          description: |
            Filter on an Offer Match status. Filtering on multiple statuses is not supported.
          schema:
            $ref: '#/components/schemas/OfferMatchStatusCore'
        - $ref: '#/components/parameters/ShiftIdQueryParam'
        - $ref: '#/components/parameters/PageNumberParam'
        - $ref: '#/components/parameters/ItemsPerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        200:
          description: "Successfully returned Offer Inbox Collection."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxOfferPageResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/inbox/offers/{offer_id}:
    parameters:
      - $ref: '#/components/parameters/OfferIdPathParam'
    get:
      tags:
        - offer inbox
      description: |
        # Authorization
        Required role: `org_admin`

        # Description
        Get the anonamyzed details of Offers matched to the Supply
        organization. This must contain no PHI.
      responses:
        200:
          description: "Successfully returned Offer Inbox Scalar"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxOfferDetailResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/inbox/offers/{offer_id}/accept:
    parameters:
      - $ref: '#/components/parameters/OfferIdPathParam'
    post:
      tags:
        - offer inbox
      description: |
        # Authorization
        Required role: `org_admin`

        Required offer state: `sent`

        # Description
        Accept an Offer matched to the Supply organization.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxOfferAcceptRequest'
      responses:
        204:
          description: "Successfully marked Offer as Accepted"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/inbox/offers/{offer_id}/decline:
    parameters:
      - $ref: '#/components/parameters/OfferIdPathParam'
    post:
      tags:
        - offer inbox
      description: |
        # Authorization
        Required role: `org_admin`

        Required offer state: `sent`

        # Description
        Decline an Offer matched to the Supply organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxOfferDeclineRequest'
      responses:
        204:
          description: "Successfully marked Offer as Declined"
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/sys_admin/offers:
    get:
      tags:
        - offer sys_admin
      description: |
        # Authorization
        Required role: `sys_admin`

        # Description
        Get a collection of Offers.
      parameters:
        - in: query
          name: id
          schema:
            type: string
            format: uuid
        - in: query
          name: demand_persona_id
          schema:
            type: string
            format: uuid
        - in: query
          name: care_type
          schema:
            $ref: '#/components/schemas/CareTypeCore'
        - in: query
          name: offer_type
          schema:
            $ref: '#/components/schemas/OfferTypeCore'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OfferStatusCore'
        - in: query
          name: client_outbox_id
          schema:
            type: string
        - in: query
          name: visit_outbox_id
          schema:
            type: string
        - in: query
          name: is_accepted
          schema:
            type: boolean
            description: Offers accepted by at least one match.
        - in: query
          name: expires_after
          schema:
            type: string
            format: date-time
            description: Offers that expire after this date-time.
        - in: query
          name: expires_before
          schema:
            type: string
            format: date-time
            description: Offers that expire before this date-time.
        - $ref: '#/components/parameters/ShiftIdQueryParam'
        - $ref: '#/components/parameters/PageNumberParam'
        - $ref: '#/components/parameters/ItemsPerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        200:
          description: 'Successfully returned Offer Collection'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxOfferPageResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/sys_admin/offers/{offer_id}:
    parameters:
      - $ref: '#/components/parameters/OfferIdPathParam'
    get:
      tags:
        - offer sys_admin
      description: |
        # Authorization
        Required role: `sys_admin`

        # Description
        Get the details of an Offer.
      responses:
        200:
          description: 'Successfully returned offer details.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SysAdminOfferDetailResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/sys_admin/offers/{offer_id}/matches:
    parameters:
    - $ref: '#/components/parameters/OfferIdPathParam'
    get:
      tags:
        - offer sys_admin
      description: |
        # Authorization

        Required role: `sys_admin`

        # Description
        Get the Offer Matches of an Offer.
      parameters:
        - in: query
          name: response
          schema:
            $ref: '#/components/schemas/OfferMatchResponseCore'
          description: |
            Response of an Offer Match to filter on.
            Multiple values are supported (in an `OR` fashion).
        - in: query
          name: sequence_id
          schema:
            type: string
            format: uuid
          description: |
            Sequence ID of the Offer Match to filter on.
            Multiple values are supported (in an `OR` fashion).
        - $ref: '#/components/parameters/PageNumberParam'
        - $ref: '#/components/parameters/ItemsPerPageParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        200:
          description: 'Successfully returned Offer Matches.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxOfferMatchPageResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/demand_personas/settings/assignment:
    post:
      tags:
        - organization settings
      description: |
        # Authorization
        Required role: `org_admin`

        # Description
        Set offer assignment setting for an organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboxOfferAssignmentSettingUpdateRequest'
      responses:
        204:
          description: "Setting succesfully saved."
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"
    get:
      tags:
        - organization settings
      description: |
        # Authorization
        Required role: `org_admin`

        # Description
        Get offer assignment setting for an organization.
      responses:
        200:
          description: Offer assignment setting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxOfferAssignmentSettingUpdateResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/sys_admin/demand_personas/{demand_persona_id}/settings/assignment:
    parameters:
      - in: path
        name: demand_persona_id
        schema:
          type: string
          format: uuid
        required: true
        description: ID of an organization.
    post:
      tags:
        - organization settings sys_admin
      description: |
        # Authorization
        Required role: `sys_admin`

        # Description
        Set offer assignment setting for an organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutboxOfferAssignmentSettingUpdateRequest'
      responses:
        204:
          description: "Setting succesfully saved."
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"
    get:
      tags:
        - organization settings sys_admin
      description: |
        # Authorization
        Required role: `sys_admin`

        # Description
        Get offer assignment setting for an organization.
      responses:
        200:
          description: Offer assignment setting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxOfferAssignmentSettingUpdateResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/sys_admin/take_rates/demand_take_rates:
    get:
      tags:
        - take rates
      description: |
        # Authorization
        Required role: `sys_admin`

        # Description
        Get a collection of take rates specific to demand organizations.
      parameters:
        - in: query
          name: demand_persona_id
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: 'Successfully returned demand take rates collection'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandTakeRateCollectionResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/sys_admin/take_rates/demand_take_rates/{demand_persona_id}:
    parameters:
      - in: path
        name: demand_persona_id
        schema:
          type: string
          format: uuid
        required: true
        description: ID of an organization.
    post:
      tags:
        - take rates
      description: |
        # Authorization
        Required role: `sys_admin`

        # Description
        Set the take rate specific to a demand organization.

        Note: a null take rate means the system will clear the demand-specific take rate
        and apply the next available take rate (e.g., the regional take rate).

        A take rate of 0 is a take rate of 0%.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandTakeRateCreateRequest'
      responses:
        204:
          description: 'Successfully set the demand-specific take rate.'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/sys_admin/take_rates/regional_take_rate:
    get:
      tags:
        - take rates
      description: |
        # Authorization
        Required role: `sys_admin`

        # Description
        Get a regional take rate.
      responses:
        200:
          description: 'Successfully returned regional take rate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionalTakeRateDetailResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"
    post:
      tags:
        - take rates
      description: |
        # Authorization
        Required role: `sys_admin`

        # Description
        Set the regional take rate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegionalTakeRateUpdateRequest'
      responses:
        200:
          description: 'Successfully returned regional take rate'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionalTakeRateDetailResponse'
      x-amazon-apigateway-integration:
        uri:

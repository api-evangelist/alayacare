        type: "aws_proxy"

  /v1/inbox/form_submissions:
    post:
      tags:
        - form submission inbox
      description: |
        # Authorization
        Required role: supply `org_admin` assigned to the associated referral.

        # Description
        Save a form submission.

        One of `service_id` or `visit_id` must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboxFormSubmissionCreationRequest'
      responses:
        201:
          description: "Successfully created form submission."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxFormSubmissionCreationResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"
  
  /v1/inbox/form_templates/by_demand_persona_id/{demand_persona_id}/by_schema_id/{schema_id}/latest:
    parameters:
      - $ref: '#/components/parameters/DemandPersonaIdPathParam'
      - $ref: '#/components/parameters/FormSchemaIdPathParam'
    get:
      tags:
        - form template inbox
      description: |
        # Authorization
        Required role: supply `org_admin` in the trusted network
        of the demand organization of the form.

        # Description
        Returns the latest form version available for a given schema_id within a demand organization.
      responses:
        200:
          description: "Successfully retrieved the form template."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxFormTemplateDetailResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/outbox/form_submissions/{form_submission_id}:
    parameters:
      - $ref: '#/components/parameters/FormSubmissionIdPathParam'
    get:
      tags:
        - form submission outbox
      description: |
        # Authorization
        Required role: demand `org_admin` assigned to the referral 
        associated to the form submission.

        # Description
        Read a form submission.
      responses:
        200:
          description: "Successfully retrieved the form submission."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxFormSubmissionDetailResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

  /v1/outbox/form_submissions/fields/{form_submission_field_id}/attachment/presigned:
    parameters:
      - $ref: '#/components/parameters/FormSubmissionFieldIdPathParam'
    get:
      tags:
        - form submission outbox
      description: |
        # Authorization
        Required role: demand `org_admin` assigned to the referral 
        associated to the form submission.

        # Description
        Get the pre-signed URL for the file attached to a form submission field as
        a demand organization.
      responses:
        200:
          description: "Successfully got the pre-signed URL."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgAdminFilePresignedDetailResponse'
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OfferApiFunctionV2.Arn}:live/invocations"
        httpMethod: "POST"
        passthroughBehavior: "when_no_match"
        type: "aws_proxy"

      # By default, All endpoints are using the CognitoAuthorizer
security:
  - CognitoAuthorizer: [ ]

x-amazon-apigateway-request-validators:
  body:

        format: uuid
      required: true
      description: ID of a demand organization.
    FileIdPathParam:
      in: path
      name: file_id
      schema:
        type: string
        format: uuid
      required: true
      description: ID of a file.
    FormSubmissionIdPathParam:
      in: path
      name: form_submission_id
      schema:
        type: string
        format: uuid
      required: true
      description: ID of a form submission.
    FormSchemaIdPathParam:
      in: path
      name: schema_id
      schema:
        type: string
        format: uuid
      required: true
      description: Schema id of a form.
    FormSubmissionFieldIdPathParam:
      in: path
      name: form_submission_field_id
      schema:
        type: string
        format: uuid
      required: true
      description: ID of a form submission field.
    MessageIdPathParam:
      in: path
      name: message_id
      schema:
        type: string
        format: uuid
      required: true
      description: ID of a message.
    OfferIdPathParam:
      in: path
      name: offer_id
      schema:
        type: string
        format: uuid
      required: true
      description: ID of an offer
    VisitIdPathParam:
      in: path
      name: visit_id
      schema:
        type: string
        format: uuid
      required: true
      description: ID of a visit.
    OfferIdQueryParam:
      in: query
      name: offer_id
      schema:
        type: string
        format: uuid
    ReferralIdQueryParam:
      in: query
      name: referral_id
      schema:
        type: string
        format: uuid
    ReferralIdPathParam:
      in: path
      name: referral_id
      schema:
        type: string
        format: uuid
      required: true
    SequenceIdQueryParam:
      in: query
      name: sequence_id
      schema:
        type: string
        format: uuid
      required: true
    ServiceIdQueryParam:
      in: query
      name: service_id
      schema:
        type: string
        format: uuid
    ShiftIdQueryParam:
      in: query
      name: shift_id
      schema:
        type: string
        format: uuid
    RevisionsQueryParam:
      in: query
      name: revisions
      schema:
        type: string
        description: Filter in all revisions for a given referral, or only the latest
          revision, or only the archived revision(s).
        enum:
          - all
          - latest
          - archived
        default: latest
    ItemsPerPageParam:
      in: query
      name: items_per_page
      schema:
        $ref: '#/components/schemas/ItemsPerPageCore'
    PageNumberParam:
      in: query
      name: page
      schema:
        $ref: '#/components/schemas/PageNumberCore'
    SortByParam:
      in: query
      name: sort_by
      schema:
        $ref: '#/components/schemas/SortByCore'
    SortOrderParam:
      in: query
      name: sort_order
      schema:
        $ref: '#/components/schemas/SortOrderCore'
    MessageSenderTypeQueryParam:
      in: query
      name: sender_type
      schema:
        $ref: '#/components/schemas/MessageSenderTypeCore'
    MessageCategoryQueryParam:
      in: query
      name: category
      schema:
        $ref: '#/components/schemas/MessageCategoryCore'

  schemas:
    StatusHealthzResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OutboxOfferCore:
      # Core fields on an offer expected to be present on requests and responses.
      type: object
      properties:
        care_type:
          $ref: '#/components/schemas/CareTypeCore'
        offer_type:
          $ref: '#/components/schemas/OfferTypeCore'
        expires_at:
          type: string
          format: date-time
        comment:
          type: string
        demand_labels:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - care_type
        - offer_type
        - expires_at

    OutboxOfferCreateRequest:
      type: object
      properties:
        offer:
          $ref: '#/components/schemas/OutboxOfferCore'
        alayacare:
          $ref: '#/components/schemas/OutboxAlayaCareCore'
        case_manager:
          $ref: '#/components/schemas/CaseManagerCore'
        direct_supply_persona_ids:
          description: |
            Identifiers of one (or more) supply organization for direct-to-supplier
            matching.
          type: array
          items:
            type: string
            format: uuid
        price:
          $ref: '#/components/schemas/OutboxOfferPriceCore'
        client:
          $ref: '#/components/schemas/OutboxOfferClientRequest'
        service:
          $ref: '#/components/schemas/OutboxServiceRequest'
        visits:
          type: array
          items:
            $ref: '#/components/schemas/OutboxOfferVisitRequest'
      required:
        - offer
        - client
        - service

    OutboxShiftOfferCore:
      # Core fields on a shift offer.
      type: object
      properties:
        care_type:
          $ref: '#/components/schemas/CareTypeCore'
        expires_at:
          type: string
          format: date-time
        comment:
          type: string
        demand_labels:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - care_type
        - expires_at

    OutboxShiftOfferItem:
      # Core fields on an offer that is part of a shift offer.
      type: object
      properties:
        price:
          $ref: '#/components/schemas/OutboxOfferPriceCore'
        client:
          $ref: '#/components/schemas/OutboxOfferClientRequest'
        service:
          $ref: '#/components/schemas/OutboxServiceRequest'
        visits:
          type: array
          items:
            $ref: '#/components/schemas/OutboxOfferVisitRequest'
      required:
        - client
        - service
        - visits

    OutboxShiftOfferCreateRequest:
      type: object
      properties:
        offer:
          $ref: '#/components/schemas/OutboxShiftOfferCore'
        direct_supply_persona_ids:
          description: |
            Identifiers of one (or more) supply organization for direct-to-supplier
            matching.
          type: array
          items:
            type: string
            format: uuid
        case_manager:
          $ref: '#/components/schemas/CaseManagerCore'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OutboxShiftOfferItem'
      required:
        - offer
        - items

    OutboxShiftOfferCreateResponse:
      type: object
      properties:
        shift:
          title: OutboxShiftOfferCreateShiftResponse
          description: The `shift` object included in the response when creating a shift offer.
          type: object
          properties:
            id:
              type: string
              format: uuid
          required:
            - id
        items:
          type: array
          items:
            title: OutboxShiftOfferCreateItemsResponse
            description: The `item` objects included in the response when creating a shift offer.
            type: object
            properties:
              offer:
                title: OutboxShiftOfferCreateItemOfferResponse
                description: The `offer` object included in the response when creating a shift offer.
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  care_type:
                    $ref: '#/components/schemas/CareTypeCore'
                  start_at:
                    type: string
                    format: date-time
                    description: Derived from the visits
                  end_at:
                    type: string
                    format: date-time
                    description: Derived from the visits
                  expires_at:
                    type: string
                    format: date-time
                  created_at:
                    type: string
                    format: date-time
                  demand_labels:
                    type: array
                    items:
                      type: string
                    minItems: 1
                required:
                  - id
                  - care_type
                  - start_at
                  - end_at
                  - expires_at
                  - created_at
              client:
                title: OutboxShiftOfferCreateItemClientResponse
                description: The `client` object included in the response when creating a shift offer.
                type: object
                properties:
                  outbox_id:
                    type: string
                    minLength: 1
                  demographics:
                    title: OutboxShiftOfferCreateItemClientDemographicsResponse
                    description: The `client` `demographics` object included in the response when creating a shift offer.
                    type: object
                    properties:
                      first_name:
                        type: string
                        minLength: 1
                      last_name:
                        type: string
                        minLength: 1
                    required:
                      - first_name
                      - last_name
                required:
                  - outbox_id
                  - demographics
              service:
                title: OutboxShiftOfferCreateItemServiceResponse
                description: The `service` object included in the response when creating a shift offer.
                type: object
                properties:
                  outbox_id:
                    type: string
                    minLength: 1
                  name:
                    type: string
                    minLength: 1
                required:
                  - outbox_id
                  - name
              visits:
                title: OutboxShiftOfferCreateItemVisitsResponse
                description: The `visits` object included in the response when creating a shift offer.
                type: array
                items:
                  properties:
                    id:
                      type: string
                      format: uuid
                    outbox_id:
                      type: string
                      minLength: 1
                  required:
                    - id
                    - outbox_id
              response_counts:
                $ref: '#/components/schemas/OfferResponseCountsCore'
            required:
              - offer
              - client
              - service
              - visits
              - response_counts
      required:
        - shift
        - items

    OutboxBundleOfferCreateRequest:
      type: object
      properties:
        offer:
          title: OutboxBundleOfferCreateOfferRequest
          type: object
          properties:
            expires_at:
              type: string
              format: date-time
            comment:
              type: string
          required:
            - expires_at
        direct_supply_persona_ids:
          description: |
            Identifiers of one (or more) supply organization for direct-to-supplier
            matching.
          type: array
          items:
            type: string
            format: uuid
        case_manager:
          $ref: '#/components/schemas/CaseManagerCore'
        items:
          type: array
          maxItems: 10
          items:
            title: OutboxBundleOfferCreateItemRequest
            type: object
            properties:
              care_type:
                $ref: '#/components/schemas/CareTypeCore'
              demand_labels:
                type: array
                items:
                  type: string
                minItems: 1
              price:
                $ref: '#/components/schemas/OutboxOfferPriceCore'
              client:
                $ref: '#/components/schemas/OutboxOfferClientRequest'
              service:
                $ref: '#/components/schemas/OutboxServiceRequest'
              alayacare:
                $ref: '#/components/schemas/OutboxAlayaCareCore'
            required:
              - care_type
              - client
              - service
      required:
        - offer
        - items

    OutboxBundleOfferCreateResponse:
      type: object
      properties:
        bundle:
          title: OutboxBundleOfferCreateBundleResponse
          type: object
          properties:
            id:
              type: string
              format: uuid
              description: |
                The ID of the bundle. Referred to as `shift_id` when retrieving the offer
                in all other contexts.
          required:
            - id
        items:
          type: array
          items:
            title: OutboxBundleOfferCreateItemsResponse
            type: object
            properties:
              offer:
                title: OutboxBundleOfferCreateItemOfferResponse
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  care_type:
                    $ref: '#/components/schemas/CareTypeCore'
                  status:
                    $ref: '#/components/schemas/OfferStatusCore'
                  start_at:
                    type: string
                    format: date-time
                    description: Derived from the visits
                  end_at:
                    type: string
                    format: date-time
                    description: Derived from the visits
                  expires_at:
                    type: string
                    format: date-time
                  created_at:
                    type: string
                    format: date-time
                  demand_labels:
                    type: array
                    items:
                      type: string
                    minItems: 1
                required:
                  - id
                  - care_type
                  - start_at
                  - expires_at
                  - created_at
              client:
                title: OutboxBundleOfferCreateItemClientResponse
                type: object
                properties:
                  outbox_id:
                    type: string
                    minLength: 1
                  demographics:
                    title: OutboxBundleOfferCreateItemClientDemographicsResponse
                    type: object
                    properties:
                      first_name:
                        type: string
                        minLength: 1
                      last_name:
                        type: string
                        minLength: 1
                    required:
                      - first_name
                      - last_name
                required:
                  - outbox_id
                  - demographics
              service:
                title: OutboxBundleOfferCreateItemServiceResponse
                type: object
                properties:
                  outbox_id:
                    type: string
                    minLength: 1
                  name:
                    type: string
                    minLength: 1
                required:
                  - outbox_id
                  - name
              response_counts:
                $ref: '#/components/schemas/OfferResponseCountsCore'
            required:
              - offer
              - client
              - service
              - response_counts
      required:
        - bundle
        - items

    OutboxOfferCollectionResponse:
      description: |
        API response of an offer on the outbox API.
      type: object
      properties:
        offer:
          $ref: '#/components/schemas/OutboxOfferExtendedCore'
        client:
          title: OutboxOfferCollectionClientResponse
          type: object
          properties:
            outbox_id:
              type: string
            demographics:
              $ref: '#/components/schemas/DemographicLeanCore'
          required:
            - demographics
            - outbox_id
        service:
          title: OutboxOfferServiceLeanResponse
          type: object
          properties:
            outbox_id:
              type: string
            name:
              type: string
              minLength: 1
          required:
            - name
            - outbox_id
        response_counts:
          $ref: '#/components/schemas/OfferResponseCountsCore'
      required:
        - offer
        - client
        - service
        - response_counts

    OutboxOfferExtendedCore:
      allOf:
        - $ref: '#/components/schemas/OutboxOfferCore'
        - $ref: '#/components/schemas/OfferReasonCodeCore'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            shift_id:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/OfferStatusCore'
            start_at:
              type: string
              format: date-time
              description: Derived from the visits
            end_at:
              type: string
              format: date-time
              description: Derived from the visits
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required:
            - id
            - status
            - start_at
            - created_at

    OfferResponseCountsCore:
      type: object
      properties:
        modified_at:
          type: string
          format: date-time
          description: The creation or last update of the offer or any responses to it.
        sent:
          type: integer
          minimum: 0
          description: The number of recipients to whom the offer was sent.
        accepted:
          type: integer
          minimum: 0
          description: The number of accepted offers.
        declined:
          type: integer
          minimum: 0
          description: The number of declined offers.

    OutboxOfferDetailResponse:
      # Full blown representation of an offer, with related/nested entities
      allOf:
        - type: object
          properties:
            offer:
              $ref: '#/components/schemas/OutboxOfferExtendedCore'
            demand:
              $ref: '#/components/schemas/OrganizationLeanCore'
            supply:
              $ref: '#/components/schemas/OrganizationLeanCore'
            alayacare:
              $ref: '#/components/schemas/OutboxAlayaCareCore'
            case_manager:
              $ref: '#/components/schemas/CaseManagerCore'
            direct_supply_persona_ids:
              description: |
                Identifiers of one (or more) supply organization for direct-to-supplier
                matching.
              type: array
              items:
                type: string
                format: uuid
            price:
              $ref: '#/components/schemas/OutboxOfferPriceCore'
            client:
              $ref: '#/components/schemas/OutboxOfferClientResponse'
            service:
              $ref: '#/components/schemas/OutboxServiceResponse'
            visits:
              type: array
              items:
                $ref: '#/components/schemas/OutboxOfferVisitResponse'
            response_counts:
              $ref: '#/components/schemas/OfferResponseCountsCore'
          required:
            - offer
            - demand
            - client
            - service
            - response_counts

    OutboxOfferMatchCollectionResponse:
      description: |
        API response for the representation of Offer Matches on the outbox API.
      type: object
      properties:
        match:
          $ref: '#/components/schemas/OfferMatchCore'
        supply:
          # better to call destination (CCAC)?
          $ref: '#/components/schemas/OrganizationLeanCore'

    OutboxOfferPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageCore'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/OutboxOfferCollectionResponse'

    OutboxOfferMatchPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageCore'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/OutboxOfferMatchCollectionResponse'

    InboxOfferCollectionResponse:
      description: |
        API response for the core representation of an offer response on the inbox API.
      type: object
      properties:
        offer:
          $ref: '#/components/schemas/InboxOfferCore'
        match:
          $ref: '#/components/schemas/OfferMatchCore'

    InboxReferralCollectionResponse:
      description: |
        API response for the core representation of a referral response on the inbox API.
      type: object
      properties:
        referral:
          title: "InboxReferralCollectionReferralResponse"
          allOf:
            - $ref: '#/components/schemas/ReferralReasonCodeCore'
            - type: object
              properties:
                id:
                  type: string
                  format: uuid
                sequence_id:
                  type: string
                  format: uuid
                offer_id:
                  type: string
                  format: uuid
                shift_id:
                  type: string
                  format: uuid
                care_type:
                  $ref: '#/components/schemas/CareTypeCore'
                referral_type:
                  $ref: '#/components/schemas/ReferralTypeCore'
                start_at:
                  type: string
                  format: date-time
                end_at:
                  type: string
                  format: date-time
                status:
                  $ref: '#/components/schemas/ReferralStatusCore'
                created_at:
                  type: string
                  format: date-time
                updated_at:
                  type: string
                  format: date-time
              required:
                - id
                # sequence_id was made optional as a simple way for AC Cloud api.intake to
                # process referrals. But sequence_id must be required in all referral
                # responses from AlayaMarket. The OpenAPI spec should be updated to reflect
                # this requirement as soon as possible to reduce confusion.
                # - sequence_id
                - care_type
                - referral_type
                - start_at
                - status
                - created_at
        revision:
          title: InboxReferralCollectionRevisionResponse
          type: object
          properties:
            revision_group_id:
              type: string
              format: uuid
            revision_number:
              type: integer
              minimum: 1
          required:
            - revision_group_id
            - revision_number
      required:
        - referral
        - revision

    InboxOfferCore:
      description: |
        Core representation of an offer on the inbox API.
        Meant to be used in the nested `offer` in a top level (API) response schema.
      allOf:
        - $ref: '#/components/schemas/OfferReasonCodeCore'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            shift_id:
              type: string
              format: uuid
            care_type:
              $ref: '#/components/schemas/CareTypeCore'
            offer_type:
              $ref: '#/components/schemas/OfferTypeCore'
            expires_at:
              type: string
              format: date-time
            start_at:
              type: string
              format: date-time
            end_at:
              type: string
              format: date-time
            comment:
              type: string
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required:
            - id
            - care_type
            - offer_type
            - expires_at
            - start_at
            - created_at

    InboxOfferDetailResponse:
      description: |
        API response for the anonymous representation of an offer on the inbox API.
        Similarly to the `InboxOfferCore`, this schema is meant to be used in the nested `offer`
        in a top level (API) response schema, e.g. the `InboxOfferScalarApiResponse`
        This includes everything from the `InboxOfferCore` along with some additional information
        on the client, service and visits.
        Not all client information is included here, hence the "anon" (anonymous) prefix.
      type: object
      properties:
        offer:
          $ref: '#/components/schemas/InboxOfferCore'
        alayacare:

          type: array
          items:
            type: string
            format: uuid
        price:
          title: SysAdminOfferDetailPriceResponse
          type: object
          properties:
            default:
              $ref: '#/components/schemas/SysAdminPriceCore'
            custom:
              type: array
              items:
                title: SysAdminOfferPriceCustomCore
                allOf:
                  - $ref: '#/components/schemas/SysAdminPriceCore'
                  - type: object
                    properties:
                      supply_persona_id:
                        type: string
                        format: uuid
                    required:
                      - supply_persona_id
          required:
            - default
        client:
          title: SysAdminOfferDetailClientResponse
          type: object
          properties:
            outbox_id:
              type: string
              minLength: 1
            address:
              $ref: '#/components/schemas/AddressCore'
            contacts:
              # separate personal, medical contacts like CCAC?
              title: SysAdminOfferDetailClientContactResponse
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    # format: uuid
                  first_name:
                    type: string
                  last_name:
                    type: string
                  address:
                    title: SysAdminOfferDetailClientContactAddressResponse
                    type: object
                    properties:
                      city:
                        type: string
                      state:
                        type: string
                      zip:
                        type: string
                      country:
                        type: string
                      name:
                        type: string
                      address:
                        type: string
                      address_suite:
                        type: string
                      latitude:
                        type: number
                        format: double
                        minimum: -90
                        maximum: 90
                      longitude:
                        type: number
                        format: double
                        minimum: -180
                        maximum: 180
                  contact_type:
                    type: string
                  email:
                    type: string
                    format: email
                  is_active:
                    type: boolean
                    default: true
                  is_emergency:
                    type: boolean
                  phone_number:
                    description: Main phone number.
                    type: string
                  phone_other:
                    type: string
                  phone_personal:
                    type: string
                  language:
                    # should this be enum?
                    type: string
                  relationship:
                    # should this be enum?
                    type: string
            demographics:
              title: SysAdminOfferDetailClientDemographicsResponse
              type: object
              properties:
                first_name:
                  type: string
                  minLength: 1
                last_name:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
                phone_number:
                  description: Main phone number.
                  type: string
                phone_other:
                  type: string
                phone_personal:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                gender:
                  # should this be enum?
                  type: string
                language:
                  # should this be enum?
                  type: string
                  # health card, etc?
              required:
                - first_name
                - last_name
            allergies:
              title: SysAdminOfferDetailClientAllergiesResponse
              type: array
              items:
                $ref: '#/components/schemas/AllergyCore'
            risks:
              title: SysAdminOfferDetailClientRisksResponse
              type: array
              items:
                $ref: '#/components/schemas/RiskCore'
            diagnoses:
              title: SysAdminOfferDetailClientDiagnosesResponse
              type: array
              items:
                type: object
                # Based on AlayaCare: medical_history.health_history.current_medical_history
                properties:
                  name:
                    # AlayaCare calls this diagnosis, combines CCAC code and description
                    type: string
                  description:
                    # AlayaCare doesn't use this for the CCAC
                    type: string
                  is_primary:
                    type: boolean
                  start_date:
                    type: string
                    format: date
                  end_date:
                    type: string
                    format: date
                  treatment:
                    type: string
            surgeries:
              title: SysAdminOfferDetailClientSurgeriesResponse
              type: array
              items:
                # Based on AlayaCare: medical_history.surgery.past_surgery_history
                type: object
                properties:
                  name:
                    # AlayaCare combines CCAC code and description
                    type: string
                  description:
                    # AlayaCare combines CCAC location and surgeon
                    type: string
                  details:
                    type: string
                  start_date:
                    type: string
                    format: date
                  end_date:
                    type: string
                    format: date
            custom_fields:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldCore'
            referral_only_custom_fields:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldCore'
          required:
            - outbox_id
            - demographics
            - address
        service:
          title: SysAdminOfferDetailServiceResponse
          type: object
          properties:
            id:
              type: string
              format: uuid
            outbox_id:
              type: string
              minLength: 1
            name:
              type: string
              minLength: 1
            use_client_address:
              type: boolean
            address:
              $ref: '#/components/schemas/AddressCore'
            start_at:
              type: string
              format: date-time
            expected_start_at:
              type: string
              format: date-time
            end_at:
              type: string
              format: date-time
            instructions:
              # CCAC includes goals and other items in ServiceInstructions
              type: string
            notes:
              type: string
            skills:
              # should this live here or at root level or client level?
              # should this be a string or list of strings or list of objects?
              type: array
              items:
                type: string
            custom_fields:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldCore'
            referral_only_custom_fields:
              type: array
              items:
                $ref: '#/components/schemas/CustomFieldCore'
            # CCAC service includes priority, some other codes, and nests Frequencies in Service
          required:
            - id
            - outbox_id
            - name
        visits:
          type: array
          items:
            title: SysAdminOfferDetailVisitResponse
            type: object
            properties:
              id:
                type: string
                format: uuid
              outbox_id:
                type: string
                minLength: 1
              start_at:
                type: string
                format: date-time
              end_at:
                type: string
                format: date-time
              instructions:
                type: string
              tasks:
                type: array
                items:
                  title: SysAdminOfferDetailVisitTaskResponse
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    outbox_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    description:
                      type: string
                    is_required:
                      type: boolean
                  required:
                    - id
                    - outbox_id
                    - name
                    - is_required
            required:
              - id
              - outbox_id
              - start_at
              - end_at
        response_counts:
          $ref: '#/components/schemas/OfferResponseCountsCore'
      required:
        - response_counts
        - offer
        - demand
        - client
        - service


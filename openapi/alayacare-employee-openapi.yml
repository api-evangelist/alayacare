        description: AlayaCare ID for display in-app
        example: AC000000024
      external_id:
        type: string
        x-nullable: true
      profile_id:
        type: integer
        example: 7890
      branch_id:
        type: integer
      status:
        $ref: "#/definitions/EmployeeStatus"
      roles:
        type: array
        description: Employee roles
        items:
          $ref: '#/definitions/Role'
      groups:
        type: array
        description: Employee groups
        items:
          $ref: '#/definitions/Group'
      departments:
        type: array
        description: Employee departments
        items:
          $ref: '#/definitions/Department'
      designation:
        type: string
        x-nullable: true
      max_biweekly_capacity:
        type: number
        x-nullable: true
        example: 50.5
      min_biweekly_capacity:
        type: number
        example: 20.5
      max_weekly_capacity:
        type: string
        x-nullable: true
        example: "24.5"
      min_weekly_capacity:
        type: string
        example : "10"
      max_daily_capacity:
        type: string
        x-nullable: true
        example: 10
      min_daily_capacity:
        type: string
        example: 0
      default_availability:
        type: string
        example: "available"
      username:
        type: string
      skills:
        type: array
        description: List of skills associated to an employee
        items:
          $ref: '#/definitions/Skill'

      - ac_id
      - external_id
      - demographics
      - branch_id
      - status
      - contacts

  EmployeeStatus:
    description: |
        Enum of the status of an employee
    type: string
    enum:
    - active
    - pending
    - on_hold
    - suspended
    - terminated
    - applicant
    - rejected
    - unknown

  EmployeeStatusCreate:
    description: |
        Enum of the status of an employee
    type: string
    enum:
    - active
    - pending
    - on_hold
    - suspended
    - terminated
    - applicant
    - rejected

  EmployeeStatusUpdate:
    description: AlayaCare employee entity data for status update
    type: object
    properties:
      status:
        description: Updatable status of an employee
        type: string
        example: terminated
        enum:
          - active
          - pending
          - on_hold
          - suspended
          - terminated
          - applicant
          - rejected
      comment:
        description: Can only be set for employee termination  
        type: string
        example: Employee is moving to another agency
    required:
      - status

  EmployeeList:
    allOf:
    - $ref: '#/definitions/PaginatedList'
    description: |
      List of employees
    type: object
    properties:
      items:
        type: array
        items:
          allOf:
          - $ref: "#/definitions/Employee"
          properties:
            branch:
              $ref: '#/definitions/BranchSummary'

  Employee:
    description: |
      AlayaCare employee list view
    type: object
    properties:
      id:
        type: integer
        example: 1
      ac_id:
        type: string
        description: AlayaCare ID for display in-app
        example: AC000000024
      external_id:
        type: string
        example: external_id_1
        x-nullable: true
      profile_id:
        type: integer
        example: 7890
      first_name:
        type: string
        example: John
      last_name:
        type: string
        example: Smith
        x-nullable: true
      status:
        $ref: "#/definitions/EmployeeStatus"
      job_title:
        type: string
        x-nullable: true
      email:
        type: string
        example: john@smith.com
      phone:
        type: string
        x-nullable: true
        example: "+15555555555"
      phone_other:
        type: string
        x-nullable: true
        example: "+15555555555"
      designation:
        type: string
        x-nullable: true
      departments:
        type: array
        items:
          type: integer
          description: ID of a department
      _link:
        type: string

  EmployeeUpdate:
    description: AlayaCare employee entity data for creation
    type: object
    properties:
      demographics:
        $ref: '#/definitions/EmployeeDemographics'
      external_id:
        type: string
      username:
        type: string
        example: john.smith
      roles:
        description: |
          List of roles. Role objects have ID for convenience
          of input, but only the IDs are used here. For valid IDs,
          request /roles.
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
              example: 1
      groups:
        description: |
          List of groups. Group objects have ID for convenience
          of input, but only the IDs are used here. For valid IDs,
          request /groups.
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
              example: 1
      departments:
        description: |
          List of departments. Department objects have ID for convenience
          of input, but only the IDs are used here. For valid IDs,
          request /departments.
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
              example: 1
      designation:
        type: string
        example: Nurse
      payroll_number:
        type: string
        example: A123
      seniority:
        description: |
          The employee seniority value is determined by the Employee Seniority Type defined in the system settings. 
          This value must correspond to the selected type, which can be RANK, DATE, or NUMBER.
        type: string
        example: 897563
      max_biweekly_capacity:
        type: number
        example: 50.5
      min_biweekly_capacity:
        type: number
        example: 20.5
      max_weekly_capacity:
        type: string
        example : "24.5"
      min_weekly_capacity:
        type: string
        example : "10"
      max_daily_capacity:
        type: string
        example : 10
      min_daily_capacity:
        type: string
        example : 2
      default_availability:
        type: string
        description: |
          Default employee's availability. If not set, will inherit the branch default availability.
          Accepted values: "available", "unavailable"
        example: "available"
      employment_type:
        type: object
        properties:
          id:
            type: integer
            example: 1
      timezone:
        description: |
          Timezone name in IANA format (iana.org/time-zones). If set to null, will inherit the branch timezone.
        type: string
        example: America/Toronto

  EmployeeCreate:
    allOf:
    - $ref: "#/definitions/EmployeeUpdate"
    properties:
      branch_id:
        type: integer
        description: |
          Set employee branch. If not specified, will default to branch of the user creating the employee.
      profile_id:
        description: |
          Use an existing client or contact profile ID when creating an employee.
          Demographics will be shared between this employee and the previously
          existing entity.
          A unique username is still required for any new employee.
        type: integer
        example: 7890
      status:
        $ref: '#/definitions/EmployeeStatusCreate'
    required:
      - username

  BranchProfile:
    description: |
      Collection of key/value pairs where keys are existing attributes in the agency profile, defined through
      the AlayaCare web application.
      On the example below default profile keys for the agency profile are used.

      Example profile attributes:
      + `first_name`: string
      + `last_name`: string
      + `city`: string
      + `title`: string
      + `state`: string
      + `gender`: string
      + `relationship`: string
      + `contact_type`: string
      + `fax`: string
      + `company`: string
      + `phone_other`: string
      + `phone_main`: string
      + `address`: string
      + `country`: string
      + `zip`: string
      + `address_suite`: string
      + `remarks`: string
    type: object
    properties:
      name:
        description: Branch company name
        type: string
        example: Alayacare
      phone_main:
        description: Branch main phone number
        type: string
        example: 514-999-9999

  EmployeeDemographics:
    description: |
      Collection of key/value pairs where keys are existing attributes in the employee profile, defined through the AlayaCare webapp.
      On the example below default profile keys for the employee are used.

      Example profile attributes:

      + `address_suite`: string
      + `address`: string
      + `birthday`: string
      + `city`: string
      + `company`: string
      + `country`: string
      + `department`: string
      + `email_preferred`: string
      + `email`: string
      + `employee_id`: string
      + `fax`: string
      + `first_name`: string
      + `gender`: string
      + `group`: string
      + `last_name`: string
      + `phone_main`: string
      + `phone_other`: string
      + `phone_personal`: string
      + `remarks`: string
      + `salutation`: string
      + `state`: string
      + `timeframe`: string
      + `title`: string
      + `zip`: string
      + `termination_date`: string
    type: object
    required:
    - first_name
    - last_name
    - email
    properties:
      first_name:
        type: string
      last_name:
        type: string
      email:
        type: string
        format: email
      location:
        $ref: '#/definitions/Location'
    example:
      first_name: John
      last_name: Doe
      email: john@doe.com
      salutation: Mr.
      gender: M

  EmployeeContactDemographics:
      description: |
        Collection of key/value pairs where keys are existing attributes in the employee contact profile, defined through the AlayaCare web application.
        On the example below default profile keys for the employeecontact are used.

        Example profile attributes:
        + `first_name`: string
        + `last_name`: string
        + `city`: string
        + `title`: string
        + `state`: string
        + `gender`: string
        + `relationship`: string
        + `contact_type`: string
        + `fax`: string
        + `company`: string
        + `phone_other`: string
        + `phone_main`: string
        + `address`: string
        + `country`: string
        + `zip`: string
        + `address_suite`: string
        + `remarks`: string
      type: object
      properties:
        first_name:
          description: Employee first name
          type: string
          example: Jane
        last_name:
          description: Employee last name
          type: string
          example: Smith

  EmployeeContact:
    type: object
    properties:
      id:
        type: integer
        description: Employee contact ID
        example: 1
      ac_id:
        type: string
        description: AlayaCare ID for display in-app
        example: AC000000024  
      external_id:
        type: string
        example: crm_employee_contact_external_id_1
        description: Employee contact external ID
        x-nullable: true
      status:
        description: Status of a contact
        type: string
        enum:
        - enabled
        - disabled
      contact_type:
        type: string
        example: Medical
        x-nullable: true
      relationship:
        type: string
        example: Doctor
        x-nullable: true
      language:
        type: string
        example: en
      demographics:
        $ref: '#/definitions/EmployeeContactDemographics'
    required:
    - id
    - ac_id
    - external_id
    - status
    - demographics

  EmployeeContactDetails:
    description: AlayaCare employee list item  
    type: object
    allOf:
    - $ref: '#/definitions/EmployeeContact'
    properties:  
      employees:
        type: array
        items:
          $ref: "#/definitions/EmployeeContactListDetails"

  EmployeeContactListDetails:
    description: Employee contact list details
    type: object          
    properties:
      id:
        description: AlayaCare employee ID
        type: integer
        example: 1000
      ac_id:
        type: string
        description: AlayaCare employee ID for display in-app
        example: AC000000024
      branch:
        type: object
        description: AlayaCare branch
        properties:
          id:
            description: Branch ID
            type: integer
            example: 1000
          name:
            description: Branch name
            type: string
            example: "Toronto branch"
      email:
        type: string
        description: employee email address
        example: "employee@homecare.com"
      external_id:
        description: External employee ID
        type: string
        example: employee_external_id_1
        x-nullable: true
      first_name:
        description: employee first name
        type: string
        example: John
      last_name:
        description: employee last name
        type: string
        example: Smith         
      status:
        $ref: '#/definitions/EmployeeStatus'        
      contact_relationship:
        $ref: '#/definitions/EmployeeContactRelationship'
      _link:
        description: employee link on the web application
        type: string
        example: "https://demo3.alayacare.ca/permalink/employee/b1"
  
  EmployeeContactRelationship:
    description: AlayaCare employee contact relationship specific properties details
    type: object
    properties:
        contact_type:
          type: string
          example: Medical
          x-nullable: true
        relationship:
          type: string
          example: Doctor
          x-nullable: true
        status:
          $ref: '#/definitions/EmployeeContactStatus'

  EmployeeContactStatus:
    type: string
    enum:
    - enabled
    - disabled

  EmployeeContactCreate:
    allOf:
    - $ref: "#/definitions/EmployeeContactUpdate"
    type: object
    description: |
      When creating an employee contact, either `employee_id` or
      `external_employee_id` must be provided; that will be the
      employee to which the contact is associated.
      If a `profile_id` is provided
    properties:
      profile_id:
        description: AlayaCare profile ID
        type: integer
        example: 7890

  EmployeeContactUpdate:
    type: object
    properties:
      external_id:
        type: string
        example: crm_employee_contact_external_id_1
        description: Employee contact external ID
      status:
        description: Status of a contact
        type: string
        enum:
        - enabled
        - disabled
      contact_type:
        type: string
        example: Medical
      relationship:
        type: string
        example: Doctor
      employee_id:
        type: integer
        description: AlayaCare employee ID
        example: 1001
      external_employee_id:
        type: string
        description: External employee ID
        example: sor_employee_external_id_1
      demographics:
        $ref: '#/definitions/EmployeeContactDemographics'

  PaginatedList:
    description: Base model of all paginated lists
    type: object
    properties:
      count:
        type: integer
        description: Number of items in the response
        example: 1
      page:
        type: integer
        description: Current page number
        example: 1
      total_pages:
        type: integer
        description: Total number of pages availbale
        example: 1
    required:
    - count
    - page
    - total_pages
    - items

  Location:
    description: Location information
    type: object
    x-nullable: true
    properties:
      lat:
        type: number
        description: latitude
        example: 45.518
      lon:
        type: number
        description: longitude
        example: -73.582
      zip:
        type: string
        description: postal code
        example: H0H 0H0

  CostCentre:
    description: Details of a cost centre
    type: object
    x-nullable: true
    properties:
      description:
        type: string
        description: Cost centre description
        example: Montreal
      id:
        type: integer
        description: Cost centre ID
        example: 2
      number:
        type: string
        description: Cost centre number for display in-app
        example: "5555"
      status:
        type: string
        description: Cost centre status
        example: enabled
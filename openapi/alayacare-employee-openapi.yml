parameters:
  page:
    description: Filter by page number.
    name: page
    default: 1
    in: query
    required: false
    type: integer
  count:
    description: Number of items per page.
    name: count
    default: 100
    in: query
    required: false
    type: integer
  branch:
    description: 'Filter by branch ID'
    name: branch
    in: query
    required: false
    type: integer
  branch_id:
    description: 'Filter by branch ID'
    name: branch_id
    in: query
    required: false
    type: integer
  status:
    description: 'Filter by employee status, one or more using **OR**'
    name: status
    in: query
    type: array
    items:
      type: string
      enum:
        - active
        - terminated
        - suspended
        - on_hold
        - pending
        - applicant
        - rejected
        - unknown
    collectionFormat: multi
  ttl:
    description: 'Pre-authorized URL time to live in seconds. `(default: 86400)`'
    name: ttl
    in: query
    type: integer
    required: false
    default: 86400

responses:

  SuccessResponseEmployeeCreate:
    description: Employee created successfuly
    schema:
      $ref: '#/definitions/SuccessResponse'
    examples:
      application/json:
        {
          "id": 1001,
          "external_id": "sor_employee_external_id_1"
        }

  SuccessResponseEmployeeUpdate:
    description: Employee updated successfuly
    schema:
      $ref: '#/definitions/SuccessResponse'
    examples:
      application/json:
        {
          "id": 1001,
          "external_id": "sor_employee_external_id_1"
        }

  SuccessResponseEmployeeContactCreate:
    description: Employee contact created successfuly
    schema:
      $ref: '#/definitions/SuccessResponse'
    examples:
      application/json:
        {
          "id": 1001,
          "external_id": "crm_employee_contact_external_id_1"
        }

  SuccessResponseEmployeeContactUpdate:
    description: Employee contact updated successfuly
    schema:
      $ref: '#/definitions/SuccessResponse'
    examples:
      application/json:
        {
          "id": 1001,
          "external_id": crm_employee_contact_external_id_1
        }
  
  SuccessResponseDirectoryContent:
    description: Content of a directory
    schema:
      type: array
      items:
        type: object
        properties:
            code:
              type: integer
              description: http status response code
              example: 200
            name:
              type: string
              description: Path to directory
              example: 'employee/1002/report.pdf'
            last_modified:
              type: string
              format: 'date-time'
              description: |
                When the directory was last modified (ISO 8601)
                example: '2020-07-08T13:30:00+00:00'
            size:
              type: integer
              description: Size of the file in bytes
    examples:
            application/json:
              {
                "employee_id": 1002,
                "employee_external_id": "ext_id",
                "entries": [
                  {
                    "last_modified": "2020-01-14T18:58:44+00:00",
                    "name": "Physician Order/",
                    "size": 0
                  },
                  {
                    "last_modified": "2020-01-14T18:58:44+00:00",
                    "name": "Physician Order/file.pdf",
                    "size": 123456
                  }
                ]
              }
              
  SuccessResponseAttachmentDirectoryCreate:
    description: Directory created
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 201
        name:
          type: string
          description: Url to the directory created
          example: /new_directory/
  
  SuccessResponseAttachmentDirectoryUpdate:
    description: Directory copied, moved or renamed
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 200
        name:
          type: string
          description: |
            Url to the new location of the copied or moved directory
          example: /new_directory_copied/
  
  SuccessResponseFileUpload:
    description: File uploaded
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 201
        name:
          type: string
          description: Url to the file uploaded
          example: Physician Order/file.pdf
          
  SuccessResponseAttachmentFileUpdate:
    description: File copied, moved or renamed
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 200
        name:
          type: string
          description: |
            Url to the new location of the copied or move file
          example: /new_location.txt
          
  ErrorResponseDirectoryInvalidRequest:
    description: Can't post a file when creating a directory
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 400
        message:
          type: string
          description: Detail on the error
          example: Can't post a file when creating a directory
          
  ErrorResponseDirectoryStructureInvalidRequest:
    description: Can't move a directory to one of its own sub-directories
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 400
        message:
          type: string
          description: Detail on the error
          example: Can't move a directory to one of its own sub-directories
          
  ErrorResponseDirectoryContainsContent:
    description: This directory contains an underlying directory or file. Confirmation to delete directory required.
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 409
        message:
          type: string
          description: Detail on the error
          example: Existing underlying directory or files. Directory cannot be deleted
          
  ErrorResponseHeaderMissing:
    description: |
      Missing `forced-delete` set to true in body.
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 400
        message:
          type: string
          description: Detail on the error
          example:
            This action will delete the directory and its content. Please confirm.
  
  ErrorResponseDirectoryAlreadyExists:
    description: Directory already exists.
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 409
        message:
          type: string
          description: Detail on the error
          example: Directory "Ghost Directory" already exists.
          
  ErrorResponseFileAlreadyExists:
    description: File already exists.
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 409
        message:
          type: string
          description: Detail on the error
          example: File "/path/file.txt" already exists
  
  ErrorResponseFileMissing:
    description: File missing
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 400
        message:
          type: string
          description: Detail on the error
          example: Could not find a file to upload
          
  ErrorResponseInvalidFileName:
    description: The file name contains unsupported characters
    schema:
      type: object
      properties:
        code:
          type: integer
          description: http status response code
          example: 400
        message:
          type: string
          description: Detail on the error
          example: Invalid file name

  ErrorResponseEmployeeContactInvalidRequest:
    description: Invalid request
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        {
          "code": 400,
          "message": "Only employee_id or external_employee_id can be specified"
        }

  ErrorResponseAuthentication:
    description: Authorization required
    schema:
      $ref: '#/definitions/ErrorResponse'
    examples:
      application/json:
        {
          "code": 401,
          "message": "Authorization required."
        }

  ErrorResponseEmployeeNotFound:
    description: Employee not found

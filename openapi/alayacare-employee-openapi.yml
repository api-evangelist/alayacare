swagger: '2.0'
info:
  title: External Employee API
  version: 1.0.8
  description: |
    **AlayaCare IDs:**
    The following terms are used to reference IDs that identify resources in AlayaCare:
    - employee_id
    - contact_id

    **External IDs**
    The following terms are used to reference IDs that identify resources systems external to AlayaCare:
    - external_employee_id
    - external_contact_id

    External IDs are required to be unique.
    No other assumptions are made regarding their format they are treated as strings.

    **Remarks**
    - All dates must be in ISO 8601 format with timezone data
    
    **Employee Status Considerations**
    - When updating the `status` of an employee to `terminated`, it is possible to add a `comment`. This `comment` is saved as an Employee Note with a `note_type` of type `terminated`.
    - Updating the `status` of an employee will have repercussions in the AlayaCare application. Please refer to this link for more information: 
      https://alayacare.zendesk.com/hc/en-us/articles/360020774691

host: homecare.alayacare.ca
basePath: /ext/api/v2/employees
securityDefinitions:
  basic_auth:
    type: basic
    description: Basic HTTP auth over https
schemes:
- https
consumes:
- application/json
produces:
- application/json

paths:
  /note_types:
    parameters:
      - name: filter
        description: Substring search on note types
        in: query
        type: string
    get:
      tags: [Note Types]
      summary: A list of employee note types
      responses:
        200:
          description: A list of employee note types
          schema:
            $ref: '#/definitions/NoteTypesList'
        401:
          $ref: '#/responses/ErrorResponseAuthentication'
          
  /branches:
      get:
        tags: [Branches]
        parameters:
          - $ref: '#/parameters/page'
          - $ref: '#/parameters/count'
        summary: |
          Get a list of available branches
        responses:
          '200':
            description: A list of branches
            schema:
              $ref: '#/definitions/BranchList'
          "401":
            $ref: '#/responses/ErrorResponseAuthentication'

  /departments:
    get:
      tags: [Departments]
      summary: |
        Get a list of available departments
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - $ref: '#/parameters/branch_id'
      responses:
        "200":
          description: A list of departments
          schema:
            $ref: '#/definitions/DepartmentList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /groups:
    get:
      tags: [Groups]
      summary: |
        Get a list of available groups
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - $ref: '#/parameters/branch_id'
      responses:
        "200":
          description: A list of groups
          schema:
            $ref: '#/definitions/GroupList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /designations:
    get:
      tags: [Designations]
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      summary: |
        Get a list of available employee designations
      responses:
        "200":
          description: A list of designations
          schema:
            $ref: '#/definitions/DesignationList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /roles:
    get:
      tags: [Roles]
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      summary: |
        Get a list of available employee roles
      responses:
        "200":
          description: A list of roles
          schema:
            $ref: '#/definitions/RoleList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /employee_notes/{employee_id}:
    parameters:
    - name: employee_id
      description: AlayaCare ID of the employee
      in: path
      type: string
      required: true
    get:
      tags: [Employee Notes]
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - name: note_type
          description: Filter on the employee note type category
          in: query
          type: string
        - name: created_at
          description: |
              Filter employee notes by creation date greater or equal than specified value.
              Expected format is ISO 8601.
              Ex: `2018-02-03T08:00:00-05:00`
          type: string
          format: 'date-time'
          in: query
      summary: Get a list of employee notes by the employee's AlayaCare ID
      responses:
        "200":
          description: A list of employee notes
          schema:
            $ref: '#/definitions/EmployeeNotesDetailsList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
    post:
      summary: Create an employee note by the employee's AlayaCare ID
      tags: [Employee Notes]
      description: |
        * A subset of HTML is accepted in the content. Supported HTML is based upon the following library: https://bleach.readthedocs.io/en/latest/
        * Note `status` is optional, if omitted the employee note will be created with status set to `Active`.
      parameters:
      - name: body
        description: Employee note data in JSON format
        in: body
        required: true
        schema:
          $ref: '#/definitions/EmployeeNotesCreate'
      responses:
        201:
          description: Employee note created successfully
          schema:
            $ref: '#/definitions/EmployeeNotesDetails'
        401:
          $ref: '#/responses/ErrorResponseAuthentication'
        400:
          $ref: '#/responses/ErrorResponseCreateNoteInvalidRequest'
        404:
          $ref: '#/responses/ErrorResponseEmployeeNotFound'
  
  /employee_notes/by_id/{external_employee_id}:
    parameters:
    - name: external_employee_id
      description: External ID of the employee
      in: path
      type: string
      required: true
    get:
      tags: [Employee Notes]
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - name: note_type
          description: Filter on the employee note type category
          in: query
          type: string
        - name: created_at
          description: |
              Filter employee notes by creation date greater or equal than specified value.
              Expected format is ISO 8601.
              Ex: `2018-02-03T08:00:00-05:00`
          type: string
          format: 'date-time'
          in: query
      summary: Get a list of employee notes by the employee's external ID
      responses:
        "200":
          description: A list of employee notes
          schema:
            $ref: '#/definitions/EmployeeNotesDetailsList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
    post:
      summary: Create an employee note by the employee's external ID
      tags: [Employee Notes]
      description: |
        * A subset of HTML is accepted in the content. Supported HTML is based upon the following library: https://bleach.readthedocs.io/en/latest/
        * Note `status` is optional, if omitted the employee note will be created with status set to `Active`.
      parameters:
      - name: body
        description: Employee note data in JSON format
        in: body
        required: true
        schema:
          $ref: '#/definitions/EmployeeNotesCreate'
      responses:
        201:
          description: Employee note created successfully
          schema:
            $ref: '#/definitions/EmployeeNotesDetails'
        401:
          $ref: '#/responses/ErrorResponseAuthentication'
        400:
          $ref: '#/responses/ErrorResponseCreateNoteInvalidRequest'
        404:
          $ref: '#/responses/ErrorResponseEmployeeNotFound'

  /employment_types:
    get:
      tags: [Employment Types]
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
      summary: Get a list of employment types
      responses:
        "200":
          description: A list of employment types
          schema:
            $ref: '#/definitions/EmploymentTypeDetailsList'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /profile/employee:
    parameters:
    - $ref: '#/parameters/page'
    - $ref: '#/parameters/count'
    get:
      tags:
      - Profile
      summary: Get a list of employee profile attributes
      responses:
        '200':
          description: A list of profile attributes
          schema:
            $ref: '#/definitions/ProfileAttributeList'
        '401':
          $ref: '#/responses/ErrorResponseAuthentication'

  /profile/employee_contact:
    get:
      tags: [Profile]
      parameters:
      - $ref: '#/parameters/page'
      - $ref: '#/parameters/count'
      summary: Get a list of employee contact profile attributes
      responses:
        '200':
          description: A list of profile attributes
          schema:
            $ref: '#/definitions/ProfileAttributeList'
        '401':
          $ref: '#/responses/ErrorResponseAuthentication'


  /employees:
    get:
      tags: [Employees]
      summary: |
        Get a list of employees.
      parameters:
        - $ref: '#/parameters/page'
        - $ref: '#/parameters/count'
        - $ref: '#/parameters/branch'
        - $ref: '#/parameters/status'
        - name: filter
          in: query
          description: Substring search on profile attributes
          type: string
        - name: group
          in: query
          description: Filter by group ID, one or more using **OR**
          type: array
          items:
            type: integer
          collectionFormat: multi
        - name: department
          in: query
          description: |
            Filter by department ID. For available departments
            see resource `/departments`
          type: integer
        - name: designation
          in: query
          description: |
            Filter by designation. For available designations
            see resource `/designations`
          type: string
      responses:
        "200":
          description: A list of employees
          schema:
            $ref: "#/definitions/EmployeeList"
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'
    post:
      tags: [Employees]
      summary: |
        Create an employee.
      description: |
        - `branch_id` is optional, if omitted employee will be created in the default branch.
        - `status` is optional, if omitted employee will be created with an `active` status.
        - `branch_id` and `status` can only be set at creation.
        - Only one of `profile_id` or a `demographics` object can be specified.
        - Adding a `comment` when creating an employee with a `status` set to `terminated` is not supported by this endpoint. Any `comment` sent will be ignored.
      parameters:
      - name: body
        description: Employee definition in JSON format
        in: body
        required: true
        schema:
          $ref: "#/definitions/EmployeeCreate"
      responses:
        "201":
          $ref: '#/responses/SuccessResponseEmployeeCreate'
        "409":
          description: Conflict
          examples:
            application/json:
              {
                  'code': 409,
                  'message': 'Employee already exists with external ID: external_id_3'
              }
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
          examples:
            application/json:
              code: 400
              message: 'Field first_name is required in demographics'
        "401":
          $ref: '#/responses/ErrorResponseAuthentication'

  /employees/{employee_id}:
    parameters:
    - name: employee_id
      description: AlayaCare ID of the employee
      in: path
      type: string
      required: true
    get:
      tags: [Employees]
      summary: Get employee details using its AlayaCare ID
      responses:
        "200":
          description: Employee details
          schema:
            $ref: "#/definitions/EmployeeDetails"
        "404":
          $ref: '#/responses/ErrorResponseEmployeeNotFound'

    put:
      tags: [Employees]
      summary: Modify employee details using its AlayaCare ID
      description: |
        * Changing the `branch_id` of an employee is not supported by this API. Any `branch_id` sent will be ignored.
        * Changing the `status` of an employee is not supported by this endpoint. Any `status` sent will be ignored.
      parameters:
      - name: body
        description: Object with fields to be updated
        in: body
        schema:
          $ref: "#/definitions/EmployeeUpdate"
      responses:
        "200":
          $ref: '#/responses/SuccessResponseEmployeeUpdate'
        "404":
          $ref: '#/responses/ErrorResponseEmployeeNotFound'

  /employees/by_id/{external_employee_id}:
    parameters:
    - name: external_employee_id
      description: External ID of the employee to retrieve
      in: path
      type: string
      required: true
    get:
      tags: [Employees]
      summary: |
        Get employee using an external ID provided on creation
      responses:
        "200":
          description: Employee details
          schema:
            $ref: "#/definitions/EmployeeDetails"
        "404":
          $ref: '#/responses/ErrorResponseEmployeeNotFound'

    put:
      tags: [Employees]
      summary: |
        Modify employee details using an external ID provided on creation
      description: |
        * Changing the `branch_id` of an employee is not supported by this API. Any `branch_id` sent will be ignored.
        * Changing the `status` of an employee is not supported by this endpoint. Any `status` sent will be ignored.
      parameters:
      - name: body
        description: Object with fields to be updated
        in: body
        schema:
          $ref: "#/definitions/EmployeeUpdate"
      responses:
        "200":
          $ref: '#/responses/SuccessResponseEmployeeUpdate'
        "404":
          $ref: '#/responses/ErrorResponseEmployeeNotFound'
          
          
  /employees/{employee_id}/status:
    parameters:
    - name: employee_id
      description: AlayaCare ID of the employee
      in: path
      type: string
      required: true
    put:
      tags: [Employees]
      summary: |
        Update employee status using its AlayaCare ID
      description: |
        * A `comment` can only be set when updating an employee status to `terminated`.
      parameters:
      - name: body
        description: Object with status to be updated
        in: body
        schema:
          $ref: '#/definitions/EmployeeStatusUpdate'
      responses:
        "200":
          $ref: '#/responses/SuccessResponseEmployeeUpdate'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
          examples:
            application/json:
              code: 400
              message: 'Field status is required'
        "404":
          $ref: '#/responses/ErrorResponseEmployeeNotFound'      
      

  /employees/by_id/{external_employee_id}/status:
    parameters:
    - name: external_employee_id
      description: External ID of the employee
      in: path
      type: string
      required: true
    put:
      tags: [Employees]
      summary: |
        Update employee status using an external ID provided on creation
      description: |
        * A `comment` can only be set when updating an employee status to `terminated`.
      parameters:
      - name: body
        description: Object with status to be updated
        in: body
        schema:
          $ref: '#/definitions/EmployeeStatusUpdate'
      responses:
        "200":
          $ref: '#/responses/SuccessResponseEmployeeUpdate'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
          examples:
            application/json:
              code: 400
              message: 'Field status is required'
        "404":
          $ref: '#/responses/ErrorResponseEmployeeNotFound' 

  /employees/{employee_id}/picture:
    parameters:
    - name: employee_id
      description: AlayaCare ID of the employee
      in: path
      type: string
      required: true
    get:
      tags: [Employees]
      summary: Get employee profile picture pre-authorized URL.
      parameters:
        - $ref: '#/parameters/ttl'
      responses:
        "200":
          description: Profile picture URL.
          schema:
            $ref: "#/definitions/ProfilePictureUrl"
        "404":
          $ref: '#/responses/ErrorResponseEmployeeNotFound'

  /employees/by_id/{external_employee_id}/picture:
    parameters:
    - name: external_employee_id
      description: External ID of the employee
      in: path
      type: string
      required: true
    get:
      tags: [Employees]
      summary: Get employee profile picture pre-authorized URL.
      parameters:
        - $ref: '#/parameters/ttl'
      responses:
        "200":
          description: Profile picture URL.
          schema:
            $ref: "#/definitions/ProfilePictureUrl"
        "404":
          $ref: '#/responses/ErrorResponseEmployeeNotFound'

  /contacts:
    post:
      tags: [Employee Contacts]
      summary: Create employee contact
      description: |
        - Only one of `employee_id` or `external_employee_id` can be specified
      parameters:
      - name: body
        description: Employee contact data in JSON format
        in: body
        required: true
        schema:
          $ref: '#/definitions/EmployeeContactCreate'
      responses:
        '201':
          $ref: '#/responses/SuccessResponseEmployeeContactCreate'
        '400':
          $ref: '#/responses/ErrorResponseEmployeeContactInvalidRequest'
        '401':
          $ref: '#/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/responses/ErrorResponseEmployeeNotFound'

  /contacts/{contact_id}:
    parameters:
    - name: contact_id
      description: AlayaCare ID of the employee contact
      in: path
      type: string
      required: true
    get:
      tags: [Employee Contacts]
      summary: Get employee contact details using AlayaCare ID
      description: |
        A contact may be shared by more than one employee or client. Some
        properties of a contact are tied to the specific relation between
        a given employee and their contact. These properties include:
          - `contact_type`
          - `relationship`

        For backward compatibility, the employee ID parameters can be
        omitted, but this operation will only succeed if the contact is
        not shared, therefore ensuring the employee ID is unambiguous.
        
         The relationship properties will be specified in the employees array of the response schema.
        
      parameters:
      - name: employee_id
        in: query
        type: integer
        required: false
      - name: external_employee_id
        in: query
        type: string
        required: false
      responses:
        '200':
          description: Contact details
          schema:
            $ref: '#/definitions/EmployeeContactDetails'
        '400':
          $ref: '#/responses/ErrorResponseEmployeeContactInvalidRequest'
        '401':
          $ref: '#/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/responses/ErrorResponseEmployeeContactNotFound'
    put:
      tags: [Employee Contacts]
      summary: Update employee contact details using AlayaCare ID
      description: |
        A contact may be shared by more than one employee or client. Some
        properties of a contact are tied to the specific relation between
        a given employee and their contact. These properties include:
          - `contact_type`
          - `relationship`

        For backward compatibility, the employee ID attribute can be omitted
        from the payload, but the operation will only succeed if the contact
        is not shared, therefore ensuring the employee ID is unambiguos.
      parameters:
      - name: body
        description: Employee contact data in JSON format
        in: body
        required: true
        schema:
          $ref: '#/definitions/EmployeeContactUpdate'
      responses:
        '200':
          $ref: '#/responses/SuccessResponseEmployeeContactUpdate'
        '400':
          $ref: '#/responses/ErrorResponseEmployeeContactInvalidRequest'
        '401':
          $ref: '#/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/responses/ErrorResponseEmployeeContactNotFound'

  /contacts/by_id/{external_contact_id}:
    parameters:
    - name: external_contact_id
      description: External ID of the employee contact
      in: path
      type: string
      required: true
    get:
      tags: [Employee Contacts]
      summary: Get employee contact details using external ID
      description: |
        A contact may be shared by more than one employee or client. Some
        properties of a contact are tied to the specific relation between
        a given employee and their contact. These properties include:
          - `contact_type`
          - `relationship`

        For backward compatibility, the employee ID attribute can be omitted
        from the payload, but the operation will only succeed if the contact
        is not shared, therefore ensuring the employee ID is unambiguos.
      responses:
        '200':
          description: Contact details
          schema:
            $ref: '#/definitions/EmployeeContactDetails'
        '400':
          $ref: '#/responses/ErrorResponseEmployeeContactInvalidRequest'
        '401':
          $ref: '#/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/responses/ErrorResponseEmployeeContactNotFound'
    put:
      tags: [Employee Contacts]
      summary: Update employee contact details using external ID
      description: |
        A contact may be shared by more than one employee or client. Some
        properties of a contact are tied to the specific relation between
        a given employee and their contact. These properties include:
          - `contact_type`
          - `relationship`

        For backward compatibility, the employee ID attribute can be omitted
        from the payload, but the operation will only succeed if the contact
        is not shared, therefore ensuring the employee ID is unambiguos.
      parameters:
      - name: body
        description: Employee contact data in JSON format
        in: body
        required: true
        schema:
          $ref: '#/definitions/EmployeeContactUpdate'
      responses:
        '200':
          $ref: '#/responses/SuccessResponseEmployeeContactUpdate'
        '400':
          $ref: '#/responses/ErrorResponseEmployeeContactInvalidRequest'
        '401':
          $ref: '#/responses/ErrorResponseAuthentication'
        '404':
          $ref: '#/responses/ErrorResponseEmployeeContactNotFound'

  /employees/{employee_id}/attachments/{directory_path}/:
    parameters:
      - name: employee_id
        in: path
        required: true
        type: integer
        description: |
          AlayaCare internal ID of the employee
      - name: directory_path
        in: path
        required: true
        type: string
        description: |
          Path where the directory lives
    get:
      tags: [Attachment Directory]
      summary: Get the content of a directory
      produces:
        - application/json
      responses:
        200:
          $ref: '#/responses/SuccessResponseDirectoryContent'
        404:
          description: Directory not found
          schema:
            $ref: '#/definitions/DirectoryNotFoundSchema'
    post:
      tags: [Attachment Directory]
      summary: Create a new directory
      description: |
        Create a directory at the `path` location, along with the underlying directory structure if it doesn't exist already.
        The path location represents the destination of the directory.
      produces:
        - application/json
      responses:
        201:
          $ref: '#/responses/SuccessResponseAttachmentDirectoryCreate'
        400:
          $ref: '#/responses/ErrorResponseDirectoryInvalidRequest'
        404:
          $ref: '#/responses/ErrorResponseEmployeeNotFound'
        409:
          $ref: '#/responses/ErrorResponseDirectoryAlreadyExists'
    put:
      tags: [Attachment Directory]
      summary: Copy, move or rename directory
      description: |
        Copy, move or rename a directory and create the underlying directory structure of the new location if it doesn't already exist.
        
        The url of the `PUT` request is the path to the source location.
        
        The payload must indicate whether the intention of the action is to copy, move or rename the file.
        
        If a directory is being copied or moved, the destination is mandatory in the payload.

        The url of the `PUT` request is the path to the source location.
        i.e., if we have the following directories:
        - `dir1/child1/`
        - `dir2/child2/`
        
        and we want to copy `child1/` inside `dir2/` (the goal is to have `dir2/child1/`), the action to copy must be specified in the payload and must be: `dir2/child1/`. The `source` URL request has to be `dir1/child1/`.
        
      parameters:
        - name: body
          description: Object with fields to be updated
          in: body
          required: true
          schema:
            $ref: '#/definitions/AttachmentAction'
      responses:
        200:
            $ref: '#/responses/SuccessResponseAttachmentDirectoryUpdate'
        400:
            $ref: '#/responses/ErrorResponseDirectoryStructureInvalidRequest'
        404:
          description: Source Directory not found
          schema:
            $ref: '#/definitions/DirectoryNotFoundSchema'
        409:
            $ref: '#/responses/ErrorResponseDirectoryAlreadyExists'
    delete:
      tags: [Attachment Directory]
      summary: Delete a directory
      description: |
        Delete a directory which does not contain underlying directory or files.
        
        If the directory contains underlying directories or files, a `forced-delete` field set to `true` must be provided in the request payload for the directory to be deleted. 
        .
      parameters:
        - name: forced-delete
          in: body
          required: false
          description: required to delete a directory
          schema:
            $ref: '#/definitions/DeleteDirectoryActionSchema'
          
      produces:
        - application/json
      responses:
        204:
          description: Directory deleted
        400:
          $ref: '#/responses/ErrorResponseHeaderMissing'
        404:
          description: Directory not found
          schema:
            $ref: '#/definitions/DirectoryNotFoundSchema'

            
  /employees/by_id/{external_employee_id}/attachments/{directory_path}/:
    parameters:
      - name: external_employee_id
        in: path
        required: true
        type: string
      - name: directory_path
        in: path
        required: true
        type: string
    get:
      tags: [Attachment Directory]
      summary: Get the content of a directory
      produces:
        - application/json
      responses:
        200:
          $ref: '#/responses/SuccessResponseDirectoryContent'
        404:
          description: Directory not found
          schema:
            $ref: '#/definitions/DirectoryNotFoundSchema'
            
    post:
      tags: [Attachment Directory]
      summary: Create a new directory
      description: |
        Create a directory at the `path` location, along with the underlying directory structure if it doesn't exist already
      produces:
        - application/json
      responses:
        201:
          $ref: '#/responses/SuccessResponseAttachmentDirectoryCreate'
        400:
          $ref: '#/responses/ErrorResponseDirectoryInvalidRequest'
        404:
          $ref: '#/responses/ErrorResponseEmployeeNotFound'
        409:
          $ref: '#/responses/ErrorResponseDirectoryAlreadyExists'      
        
    put:
      tags: [Attachment Directory]
      summary: Copy, move or rename a directory
      description: |
        Copy, move or rename a directory and create the underlying directory structure of the new location if it doesn't already exist.
        
        The url of the `PUT` request is the path to the source location.
        
        The payload must indicate whether the intention of the action is to copy, move or rename the file.
        
        If a directory is being copied or moved, the destination is mandatory in the payload.

        The url of the `PUT` request is the path to the source location.
        i.e., if we have the following directories:
        - `dir1/child1/`
        - `dir2/child2/`
        
        and we want to copy `child1/` inside `dir2/` (the goal is to have `dir2/child1/`), the action to copy must be specified in the payload and must be: `dir2/child1/`. The `source` URL request has to be `dir1/child1/`.

      parameters:
        - name: body
          description: Object with fields to be updated
          in: body
          required: true
          schema:
            $ref: '#/definitions/AttachmentAction'
      responses:
        200:
            $ref: '#/responses/SuccessResponseAttachmentDirectoryUpdate'
        400:
            $ref: '#/responses/ErrorResponseDirectoryStructureInvalidRequest'
        404:
          description: Source Directory not found
          schema:
            $ref: '#/definitions/DirectoryNotFoundSchema'
        409:
          $ref: '#/responses/ErrorResponseDirectoryAlreadyExists'
    delete:
      tags: [Attachment Directory]
      summary: Delete a directory
      description: |
        Delete a directory which does not contain underlying directory or files.
        
        If the directory contains underlying directories or files, a `forced-delete` field set to `true` must be provided in the request payload for the directory to be deleted. 
        
      parameters:
        - name: forced-delete
          in: body
          required: false
          description: required to delete a directory
          schema:
            $ref: '#/definitions/DeleteDirectoryActionSchema'
      produces:
        - application/json
      responses:
        204:
          description: Directory deleted
        400:
          $ref: '#/responses/ErrorResponseHeaderMissing'
        404:
          description: Directory not found
          schema:
            $ref: '#/definitions/DirectoryNotFoundSchema'

  /employees/{employee_id}/attachments/{file_path}:
    parameters:
      - name: employee_id
        in: path
        required: true
        type: integer
      - name: file_path
        in: path
        required: true
        type: string
    get:
      tags: [Attachment File]
      summary: Get the content of a file (download a file)
      responses:
        200:
          description: Content of the file
        400:
          description: File not found
          schema:
            $ref: '#/definitions/FileNotFoundSchema'
    post:
      tags: [Attachment File]
      summary: Upload a file
      description: |
        Upload a file at the `path` location and create the underlying directory structure if it doesn't exist already.

        `path` **cannot** end with `/` in order to create a file based on the request body.

        **Note:** This consumes `multipart form-data` as defined in the parameters below. 
        
        **Note on content attributes:** When specifying the key that references the file, the key must be set as `file` in the request in order for the API to find the file and the file must be attached as well.
        

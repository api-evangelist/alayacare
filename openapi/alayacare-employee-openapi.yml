definitions:

  ErrorResponse:
    description: Error response
    type: object
    properties:
      code:
        type: integer
        description: Response code
      message:
        type: string
        description: Detailed error message
    required:
    - code
    - message
    
  DirectoryNotFoundSchema:
    type: object
    properties:
      code:
        type: integer
        description: http status response code
        example: 404
      message:
        type: string
        description: Detail on the error
        example: Directory "Ghost Directory" not found
        
  DeleteDirectoryActionSchema:
    type: object
    properties:
      forced-delete:
          type: boolean
          description: required to delete a non-empty directory
          example: true
 
        
  FileNotFoundSchema:
    type: object
    properties:
      code:
        type: integer
        description: http status response code
        example: 404
      message:
        type: string
        description: Detail on the error
        example:
          File "/path/file.txt" not found

  SuccessResponse:
    description: Success response.
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare ID
      external_id:
        type: string
        description: External ID
        x-nullable: true
    required:
    - id
    - external_id

  Branch:
    description: AlayaCare branch.
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare branch ID
        example: 1
      name:
        type: string
        description: AlayaCare branch name
        example: Toronto branch
      profile:
        $ref: '#/definitions/BranchProfile'
    required:
    - id
    - name
    
  AttachmentAction:
    description: Attachment actions
    type: object
    properties:
      action: 
        type: string
        example: move
        enum:
          - move
          - copy
          - rename
      destination:
        type: string
        example: dir2/child1/
  
  BranchList:
    allOf:
    - $ref: "#/definitions/PaginatedList"
    description: Paginated list of branches
    type: object
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/Branch'

  Department:
    description: AlayaCare department.
    type: object
    properties:
      id:
        type: integer
        description: AlayaCare department ID
        example: 1
      name:
        type: string
        description: AlayaCare department name
        example: Nursing
    required:
    - id
    - name

  DepartmentListItem:
    allOf:
    - $ref: '#/definitions/Department'

name: AlayaCare API Plans and Pricing
description: >
  AlayaCare offers enterprise home and community care management software with custom pricing
  based on the modules selected, number of service hours per month, and geographic region.
  Pricing is not publicly disclosed; organizations must contact AlayaCare for a tailored
  quote. The platform includes core REST API access as part of its cloud subscription.
  The AlayaCare Connector is a premium add-on enabling no-code workflow integrations with
  external systems. API Developer access is governed by the AlayaCare API Developer Access
  Terms agreement. Historical third-party estimates place base platform costs around
  $1,000/month with custom enterprise agreements for larger agencies.
specificationVersion: '0.1'
url: https://alayacare.com/pricing/
plans:
  - name: AlayaCare Cloud (Core)
    description: >
      Core AlayaCare Cloud subscription including access to the REST External APIs for
      clients, employees, scheduling, clinical documentation, tasks, forms, medications,
      accounting, and file management. Provides Basic Authentication credentials per
      tenant environment and access to integration documentation on GitHub Pages and
      SwaggerHub API specifications.
    url: https://alayacare.com/pricing/
    pricing: Contact for pricing
    pricingModel: custom
    contact: https://alayacare.com/pricing/
    features:
      - Client (Patient) API access
      - Employee API access
      - Scheduler API access
      - Clinical API access
      - Tasks API (v1 and v2)
      - Forms API
      - Medication API
      - Accounting API
      - Files API
      - Employee Skills and Unavailabilities APIs
      - HTTP Basic Authentication with tenant credentials
      - Pagination and date-range filtering
      - AWS SQS event streaming (optional)
      - Sandbox environment access
      - SwaggerHub API specifications
  - name: AlayaCare Connector (Premium Add-on)
    description: >
      AlayaCare Connector is a premium feature within AlayaCare Cloud that enables users
      to integrate external applications and automate workflows with minimal coding.
      Allows agencies to connect third-party tools from the AlayaSphere integration
      marketplace, synchronize data between systems, and build automated workflows
      without deep API integration expertise.
    url: https://alayacare.com/connector/
    pricing: Contact for pricing
    pricingModel: custom
    contact: https://alayacare.com/pricing/
    features:
      - No-code workflow automation
      - AlayaSphere third-party integration access (27+ categories)
      - Bi-directional data synchronization
      - Applicant tracking and onboarding integrations
      - Billing and payments integrations
      - Payroll and time and attendance integrations
      - CRM integrations
      - Learning management system integrations
  - name: AlayaMarket Marketplace API
    description: >
      Access to the AlayaMarket staffing marketplace API for supply and demand organizations
      participating in the AlayaCare shift-matching network. Available across Australia,
      Canada, and USA regions with dedicated production and sandbox environments. Contact
      your Customer Success Manager or team-alayamarket@alayacare.com to onboard.
    url: https://alayacare.github.io/alayamarket-external-docs/docs/user_guide/
    pricing: Contact for pricing
    pricingModel: custom
    contact: team-alayamarket@alayacare.com
    features:
      - Outbox API (demand organization shift publishing)
      - Inbox API (supply organization shift responses)
      - AWS SNS event-driven notifications
      - Australia, Canada, and USA regional endpoints
      - Production and sandbox environments
      - Username/password + IdToken authentication
  - name: AlayaCare Residential (Resi)
    description: >
      AlayaCare's residential aged care product with dedicated REST API access for managing
      resident records, care documentation, and client extensions specific to residential
      facility operations. Primarily serving the Australian market with separate hosting
      at residential.alayacare.com.au.
    url: https://acresi-api-docs.residential.alayacare.com/
    pricing: Contact for pricing
    pricingModel: custom
    contact: https://alayacare.com/pricing/
    features:
      - Resident client management API
      - Client extensions API
      - Residential care documentation
      - Australian market focus
